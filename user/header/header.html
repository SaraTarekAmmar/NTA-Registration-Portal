<header class="nta-header">
    <!-- Right side: logo -->
    <a href="index.html" class="nta-header__logo">
        <img src="images/logo2.png" alt="" class="nta-header__logo-img"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span class="nta-header__logo-fallback">NTA</span>
        <div class="nta-header__logo-text">
            <span class="nta-header__logo-main">NTA</span>
            <span class="nta-header__logo-sub">NATIONAL TRAINING ACADEMY</span>
            <span class="nta-header__logo-ar">الأكاديمية الوطنية للتدريب</span>
        </div>
    </a>

    <!-- Center: section label + tabs -->
    <div class="nta-header__center">
        <span class="nta-header__section-label" id="headerSectionLabel">إدارة المهارات</span>
        <nav class="nta-header__nav">
            <a href="index.html" class="nta-header__chip" data-page="available-courses" id="headerHomeChip">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 11l9-7 9 7M5 12h14v7a2 2 0 01-2 2H7a2 2 0 01-2-2z" />
                </svg>
                <span>الرئيسية</span>
            </a>
            <a href="courses.html" class="nta-header__chip" data-page="enrolled-courses" id="headerCoursesChip">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h10M4 18h7" />
                </svg>
                <span>دوراتي</span>
            </a>
            <a href="profile.html" class="nta-header__chip" data-page="profile" id="headerProfileChip">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM4 21a8 8 0 0116 0" />
                </svg>
                <span>الملف الشخصي</span>
            </a>
            <a href="admin-users.html" class="nta-header__chip" data-page="admin-users" id="headerUsersChip"
                style="display:none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <span>قائمة المرشحين</span>
            </a>
            <a href="admin.html" class="nta-header__chip" data-page="admin" id="headerAdminChip" style="display:none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                <span>خط التقديم</span>
            </a>
        </nav>
    </div>

    <!-- Left: theme + auth actions -->
    <div class="nta-header__actions">
        <a href="index.html#loginCard" class="nta-header__btn nta-header__btn--login" id="headerLoginBtn">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <span>تسجيل الدخول</span>
        </a>
        <button type="button" class="nta-header__btn nta-header__btn--logout" id="logoutBtn">
            تسجيل الخروج
        </button>
        <button type="button" class="nta-header__theme" id="themeToggle" aria-label="تبديل الوضع">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
        </button>
    </div>
</header>
