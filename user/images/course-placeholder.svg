<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">NTA course placeholder</title>
  <desc id="desc">A branded fallback image for courses without an uploaded image.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.55" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#7f1d1d"/>
    </linearGradient>
    <radialGradient id="orb" cx="0.25" cy="0.2" r="0.8">
      <stop offset="0" stop-color="#ef4444" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#orb)"/>
  <circle cx="1000" cy="100" r="220" fill="#ffffff" opacity="0.04"/>
  <circle cx="190" cy="570" r="180" fill="#ffffff" opacity="0.035"/>
  <g transform="translate(110 120)">
    <rect width="980" height="435" rx="44" fill="#030712" opacity="0.44" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="490" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="88" font-weight="800" fill="#ffffff">NTA</text>
    <text x="490" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" letter-spacing="5" fill="#fecaca">NATIONAL TRAINING ACADEMY</text>
    <text x="490" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff">الأكاديمية الوطنية للتدريب</text>
  </g>
</svg>
