<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script src="/common/js/theme.js"></script>
    <link rel="stylesheet" href="/common/css/theme.css?v=4" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل دخول المتدربين - الأكاديمية الوطنية للتدريب</title>
    <link rel="stylesheet" href="styles.css?v=3" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* ══ Premium dark navy background ══ */
      body.has-header {
        background: #030712 !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        align-items: center !important;
        min-height: 100vh !important;
        padding: 2rem 1rem !important;
      }

      .login-bg {
        background:
          radial-gradient(ellipse 80% 55% at 15% 10%, rgba(185,28,28,0.06), transparent 55%),
          radial-gradient(ellipse 55% 40% at 90% 85%, rgba(185,28,28,0.04), transparent 60%),
          radial-gradient(ellipse 60% 35% at 80% 5%,  rgba(20,30,70,0.35), transparent 65%) !important;
        animation: none !important;
      }

      /* ══ Premium glass card ══ */
      .login-card {
        max-width: 480px !important;
        background: rgba(5,8,20,0.88) !important;
        backdrop-filter: blur(42px) saturate(140%) !important;
        -webkit-backdrop-filter: blur(42px) saturate(140%) !important;
        border: 1px solid rgba(255,255,255,0.065) !important;
        border-top-color: rgba(185,28,28,0.38) !important;
        border-radius: 18px !important;
        box-shadow:
          0 0 0 1px rgba(185,28,28,0.06),
          0 32px 80px rgba(0,0,0,0.55),
          0 8px 24px rgba(0,0,0,0.4) !important;
      }

      /* ══ Background orbs ══ */
      .login-bg::before {
        content: "";
        position: fixed;
        top: -18%; right: -10%;
        width: 560px; height: 560px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(185,28,28,0.06) 0%, transparent 65%);
        pointer-events: none;
        animation: loginOrbA 12s ease-in-out infinite alternate;
      }
      .login-bg::after {
        content: "";
        position: fixed;
        bottom: -14%; left: -10%;
        width: 460px; height: 460px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(20,30,90,0.1) 0%, transparent 65%);
        pointer-events: none;
        animation: loginOrbA 15s ease-in-out infinite alternate-reverse;
      }
      @keyframes loginOrbA {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(32px, 20px) scale(1.1); }
      }

      /* ══ Heading override ══ */
      .login-card h1 {
        background: linear-gradient(135deg, #f87171 0%, #fca5a5 60%, #fecaca 100%) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
        font-size: 1.28rem !important;
      }

      /* ══ Submit button — crimson ══ */
      .login-btn {
        background: linear-gradient(135deg, #991b1b 0%, #b91c1c 50%, #dc2626 100%) !important;
        box-shadow: 0 4px 20px rgba(185,28,28,0.38) !important;
      }
      .login-btn::before {
        background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%) !important;
      }
      .login-btn:hover:not(.loading) {
        box-shadow: 0 8px 28px rgba(185,28,28,0.52) !important;
      }

      /* ══ Error / field-error ══ */
      .login-error-msg {
        background: rgba(239,68,68,0.1);
        border: 1px solid rgba(239,68,68,0.35);
        border-radius: 10px;
        padding: 0.65rem 1rem;
        font-size: 0.84rem;
        color: #fca5a5;
        margin-top: 0.75rem;
      }
      .field-error {
        font-size: 0.76rem;
        color: #fca5a5;
        margin-top: 0.3rem;
      }

      /* ══ Input focus: crimson glow ══ */
      .login-input-wrap:focus-within {
        border-color: rgba(185,28,28,0.55) !important;
        box-shadow: 0 0 0 2px rgba(185,28,28,0.18) !important;
      }
      .login-input-wrap:focus-within .login-input-icon { color: #f87171 !important; }

      /* ══ Bottom link ══ */
      .login-footer-link {
        text-align: center;
        margin-top: 1.1rem;
        font-size: 0.84rem;
        color: rgba(255,255,255,0.45);
      }
      .login-footer-link a {
        color: #f87171;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s;
      }
      .login-footer-link a:hover { color: #fca5a5; }

      /* ══ Light mode overrides ══ */
      html.light-mode body.has-header {
        background: #f1f5f9 !important;
      }
      html.light-mode .login-bg {
        background:
          radial-gradient(ellipse 80% 55% at 15% 10%, rgba(185,28,28,0.04), transparent 55%),
          radial-gradient(ellipse 55% 40% at 90% 85%, rgba(185,28,28,0.03), transparent 60%) !important;
      }
      html.light-mode .login-card {
        background: rgba(255,255,255,0.97) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
        border-top-color: rgba(185,28,28,0.2) !important;
        box-shadow: 0 4px 32px rgba(0,0,0,0.1), 0 1px 4px rgba(0,0,0,0.06) !important;
      }
      html.light-mode .login-card h1 {
        background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%) !important;
        -webkit-background-clip: text !important;
        background-clip: text !important;
      }
      html.light-mode .login-footer-link { color: rgba(0,0,0,0.45); }
    </style>
  </head>
  <body class="has-header">
    <a href="#loginForm" class="skip-link">الانتقال إلى نموذج تسجيل الدخول</a>
    <div class="login-bg"></div>

    <div class="login-card" id="loginCard">
      <div class="logo-container">
        <img src="/images/logo2.png" alt="الأكاديمية الوطنية للتدريب" class="login-logo" onerror="this.style.display='none'" />
        <div class="logo-subtitle">بوابة المتدربين</div>
      </div>

      <h1>تسجيل دخول المتدرب</h1>
      <p class="subtitle">الأكاديمية الوطنية للتدريب — منصة التعلم والتطوير</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">البريد الإلكتروني</label>
          <div class="login-input-wrap">
            <span class="login-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 6h16v12H4V6Z"/><path d="m4 7 8 6 8-6"/>
              </svg>
            </span>
            <input type="email" id="email" name="email" required autocomplete="email" placeholder="trainee@example.com" aria-describedby="emailError" />
          </div>
          <p id="emailError" class="field-error" style="display:none;" aria-live="polite">البريد الإلكتروني مطلوب.</p>
        </div>

        <div class="form-group">
          <label for="nationalId">الرقم القومي</label>
          <div class="login-input-wrap">
            <span class="login-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Zm6-10.125a1.875 1.875 0 1 1-3.75 0 1.875 1.875 0 0 1 3.75 0Zm1.294 6.336a6.721 6.721 0 0 1-3.17.789 6.721 6.721 0 0 1-3.168-.789 3.376 3.376 0 0 1 6.338 0Z"/>
              </svg>
            </span>
            <input type="text" id="nationalId" name="nationalId" required autocomplete="off" placeholder="14 رقماً" maxlength="14" inputmode="numeric" pattern="[0-9]{14}" aria-describedby="nationalIdError" />
          </div>
          <p id="nationalIdError" class="field-error" style="display:none;" aria-live="polite">الرقم القومي مطلوب (14 رقماً).</p>
        </div>

        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <div class="login-input-wrap">
            <span class="login-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 11V8a5 5 0 0 1 10 0v3"/><path d="M6 11h12v10H6V11Z"/><path d="M12 15v2"/>
              </svg>
            </span>
            <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="أدخل كلمة المرور" aria-describedby="passwordError" />
          </div>
          <p id="passwordError" class="field-error" style="display:none;" aria-live="polite">كلمة المرور مطلوبة.</p>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span class="login-btn-text">دخول بوابة المتدربين</span>
          <span class="arrow-icon">←</span>
          <span class="login-btn-loader" aria-hidden="true"></span>
        </button>
      </form>

      <div id="loginError" class="login-error-msg" role="alert" aria-live="assertive" style="display:none;"></div>

      <p class="login-footer-link">
        ليس لديك حساب؟ <a href="registration.html">إنشاء حساب جديد</a>
      </p>
      <p class="login-footer-link">
        مدرب؟ <a href="http://127.0.0.1:8006/">بوابة المدربين ←</a>
      </p>
    </div>

    <script>
      (function () {
        var TOKEN_KEY = "ntaTrainee";

        // Auto-redirect if already logged in
        (function() {
          var raw = localStorage.getItem(TOKEN_KEY);
          if (raw) {
            try {
              var s = JSON.parse(raw);
              var p = JSON.parse(atob(s.token.split(".")[1]));
              if (p.role === "trainee" && p.exp > Date.now() / 1000) {
                location.replace("courses.html");
              }
            } catch(e) {}
          }
        })();

        var form = document.getElementById("loginForm");
        var btn = document.getElementById("loginBtn");
        var errorBox = document.getElementById("loginError");

        function showFieldError(id, msg) {
          var el = document.getElementById(id);
          if (el) { el.textContent = msg; el.style.display = "block"; }
          var inputId = id.replace("Error", "");
          var inp = document.getElementById(inputId);
          if (inp) inp.setAttribute("aria-invalid", "true");
        }
        function hideFieldError(id) {
          var el = document.getElementById(id);
          if (el) { el.style.display = "none"; }
          var inputId = id.replace("Error", "");
          var inp = document.getElementById(inputId);
          if (inp) inp.removeAttribute("aria-invalid");
        }
        function showError(msg) {
          errorBox.textContent = msg;
          errorBox.style.display = "block";
        }
        function clearErrors() {
          errorBox.style.display = "none";
          hideFieldError("emailError");
          hideFieldError("nationalIdError");
          hideFieldError("passwordError");
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          clearErrors();

          var email = document.getElementById("email").value.trim();
          var nationalId = document.getElementById("nationalId").value.trim();
          var password = document.getElementById("password").value;
          var valid = true;

          if (!email) { showFieldError("emailError", "البريد الإلكتروني مطلوب."); valid = false; }
          if (!nationalId || !/^\d{14}$/.test(nationalId)) { showFieldError("nationalIdError", "الرقم القومي مطلوب (14 رقماً)."); valid = false; }
          if (!password) { showFieldError("passwordError", "كلمة المرور مطلوبة."); valid = false; }
          if (!valid) return;

          btn.classList.add("loading");
          btn.disabled = true;

          fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, nationalId: nationalId, password: password, role: "trainee" })
          })
            .then(function (res) {
              if (!res.ok) return res.json().then(function (err) { throw new Error(err.detail || "فشل تسجيل الدخول"); });
              return res.json();
            })
            .then(function (data) {
              if (!data.access_token || data.role !== "trainee") {
                throw new Error("هذا الحساب غير مصرح له بالوصول إلى بوابة المتدربين.");
              }
              localStorage.setItem(TOKEN_KEY, JSON.stringify({
                token: data.access_token,
                userId: data.userId,
                role: data.role,
                email: email,
                nationalId: nationalId,
                fullName: data.fullName || ""
              }));
              window.location.replace("courses.html");
            })
            .catch(function (err) {
              btn.classList.remove("loading");
              btn.disabled = false;
              var msg = err.message || "خطأ في تسجيل الدخول";
              if (msg.toLowerCase().includes("failed to fetch") || msg.toLowerCase().includes("network")) {
                showError("خطأ في الاتصال، يرجى المحاولة مرة أخرى.");
              } else {
                showError(msg);
              }
            });
        });
      })();
    </script>
  </body>
</html>
