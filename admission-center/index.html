<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script src="/common/js/theme.js"></script>
    <link rel="stylesheet" href="/common/css/theme.css?v=4" />
    <!-- data-nta-theme-injected -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل دخول مركز القبول - الأكاديمية الوطنية للتدريب</title>
    <link rel="stylesheet" href="login.css" />
    <link rel="stylesheet" href="chat/chat.css?v=3" />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body.has-header {
        background: #030712 !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        align-items: center !important;
        min-height: 100vh !important;
        padding: 2rem 1rem !important;
      }

      .login-bg {
        background:
          radial-gradient(
            ellipse 80% 55% at 15% 10%,
            rgba(185, 28, 28, 0.07),
            transparent 55%
          ),
          radial-gradient(
            ellipse 55% 40% at 90% 85%,
            rgba(185, 28, 28, 0.05),
            transparent 60%
          ),
          radial-gradient(
            ellipse 60% 35% at 80% 5%,
            rgba(30, 40, 80, 0.4),
            transparent 65%
          ) !important;
        animation: none !important;
      }

      .login-bg::before {
        content: "";
        position: fixed;
        top: -18%;
        right: -10%;
        width: 560px;
        height: 560px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(185, 28, 28, 0.07) 0%,
          transparent 65%
        );
        pointer-events: none;
        animation: loginOrbA 11s ease-in-out infinite alternate;
      }

      .login-bg::after {
        content: "";
        position: fixed;
        bottom: -14%;
        left: -10%;
        width: 460px;
        height: 460px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(30, 40, 100, 0.12) 0%,
          transparent 65%
        );
        pointer-events: none;
        animation: loginOrbA 14s ease-in-out infinite alternate-reverse;
      }

      @keyframes loginOrbA {
        from {
          transform: translate(0, 0) scale(1);
        }

        to {
          transform: translate(32px, 20px) scale(1.1);
        }
      }

      .login-card {
        max-width: 480px !important;
        background: rgba(5, 8, 20, 0.88) !important;
        backdrop-filter: blur(42px) saturate(140%) !important;
        -webkit-backdrop-filter: blur(42px) saturate(140%) !important;
        border: 1px solid rgba(255, 255, 255, 0.065) !important;
        border-top-color: rgba(185, 28, 28, 0.38) !important;
        border-radius: 18px !important;
        box-shadow:
          0 0 0 1px rgba(185, 28, 28, 0.06),
          0 32px 80px rgba(0, 0, 0, 0.55),
          0 8px 24px rgba(0, 0, 0, 0.4) !important;
      }

      .login-card h1 {
        background: linear-gradient(
          135deg,
          #f87171 0%,
          #fca5a5 60%,
          #fecaca 100%
        ) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
        font-size: 1.28rem !important;
      }

      .login-btn {
        background: linear-gradient(
          135deg,
          #991b1b 0%,
          #b91c1c 50%,
          #dc2626 100%
        ) !important;
        box-shadow: 0 4px 20px rgba(185, 28, 28, 0.38) !important;
      }

      .login-btn::before {
        background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%) !important;
      }

      .login-btn:hover:not(.loading) {
        box-shadow: 0 8px 28px rgba(185, 28, 28, 0.52) !important;
      }

      .login-error-msg {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.35);
        border-radius: 10px;
        padding: 0.65rem 1rem;
        font-size: 0.84rem;
        color: #fca5a5;
        margin-top: 0.75rem;
      }

      .login-input-wrap:focus-within {
        border-color: rgba(185, 28, 28, 0.55) !important;
        box-shadow: 0 0 0 2px rgba(185, 28, 28, 0.18) !important;
      }

      .login-input-wrap:focus-within .login-input-icon {
        color: #f87171 !important;
      }

      html.light-mode body.has-header {
        background: #f1f5f9 !important;
      }

      html.light-mode .login-bg {
        background:
          radial-gradient(
            ellipse 80% 55% at 15% 10%,
            rgba(185, 28, 28, 0.04),
            transparent 55%
          ),
          radial-gradient(
            ellipse 55% 40% at 90% 85%,
            rgba(185, 28, 28, 0.03),
            transparent 60%
          ) !important;
      }

      html.light-mode .login-card {
        background: rgba(255, 255, 255, 0.97) !important;
        border: 1px solid rgba(0, 0, 0, 0.08) !important;
        border-top-color: rgba(185, 28, 28, 0.2) !important;
        box-shadow:
          0 4px 32px rgba(0, 0, 0, 0.1),
          0 1px 4px rgba(0, 0, 0, 0.06) !important;
      }

      html.light-mode .login-card h1 {
        background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%) !important;
        -webkit-background-clip: text !important;
        background-clip: text !important;
      }
    </style>
  </head>

  <body class="has-header">
    <div class="login-bg"></div>

    <div class="login-card" id="loginCard">
      <div class="logo-container">
        <img
          src="images/logo2.png"
          alt="الأكاديمية الوطنية للتدريب"
          class="login-logo"
        />
        <div class="logo-subtitle">بوابة القبول</div>
      </div>

      <h1>تسجيل دخول مدير القبول</h1>
      <p class="subtitle">بوابة إدارة المرشحين ومراحل التقييم</p>

      <form id="loginForm">
        <!-- Admission portal: role is always 'admission_manager' -->
        <input type="hidden" name="loginRole" value="admission_manager" />

        <div class="form-group">
          <label>الرقم القومى</label>
          <div class="login-input-wrap">
            <span class="login-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M7 3h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M9 8h6M9 12h6M9 16h6"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            <input
              type="text"
              name="nationalId"
              required
              inputmode="numeric"
              autocomplete="username"
              placeholder="أدخل الرقم القومي"
            />
          </div>
        </div>

        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <div class="login-input-wrap">
            <span class="login-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M4 6h16v12H4V6Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="m4 7 8 6 8-6"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            <input
              type="email"
              name="email"
              required
              autocomplete="email"
              placeholder="name@example.com"
            />
          </div>
        </div>

        <div class="form-group" id="passwordGroup">
          <label>كلمة المرور</label>
          <div class="login-input-wrap">
            <span class="login-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M7 11V8a5 5 0 0 1 10 0v3"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M6 11h12v10H6V11Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M12 15v2"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <input
              type="password"
              name="password"
              required
              autocomplete="current-password"
              placeholder="أدخل كلمة المرور"
            />
          </div>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span class="login-btn-text">دخول لوحة القبول</span>
          <span class="arrow-icon">←</span>
          <span class="login-btn-loader" aria-hidden="true"></span>
        </button>
      </form>

      <div id="loginError" class="login-error-msg" role="alert" aria-live="assertive" style="display:none;"></div>
    </div>

    <script>
      (function () {
        var form = document.getElementById("loginForm");
        var btn = document.getElementById("loginBtn");
        if (form && btn) {
          form.addEventListener("submit", function (e) {
            e.preventDefault();
            btn.classList.add("loading");

            // Admission portal: role is always 'admission_manager'
            var role = 'admission_manager';
            var nationalId = form.nationalId.value.trim();
            var email = form.email.value.trim();
            var password = form.password.value;

            // Points to standalone Admin API (Relative path for same-origin)
            fetch("/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                email: email,
                nationalId: nationalId,
                role: role,
                password: password,
              }),
            })
              .then((response) => {
                if (!response.ok)
                  return response.json().then((err) => {
                    throw new Error(err.detail || "Login failed");
                  });
                return response.json();
              })
              .then((data) => {
                sessionStorage.setItem(
                  "ntaTrainee",
                  JSON.stringify({
                    token: data.access_token,
                    userId: data.userId,
                    role: data.role,
                    email: email,
                    nationalId: nationalId,
                  }),
                );
                // Admission portal redirects to candidates.html
                window.location.href = "candidates.html";
              })
              .catch((err) => {
                btn.classList.remove("loading");
                var errEl = document.getElementById("loginError");
                if (errEl) {
                  errEl.textContent = "خطأ في تسجيل الدخول: " + err.message;
                  errEl.style.display = "block";
                }
              });
          });
        }
      })();
    </script>
  </body>
</html>
