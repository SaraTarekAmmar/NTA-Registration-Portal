<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <script src="/common/js/theme.js"></script>
  <link rel="stylesheet" href="/common/css/theme.css?v=3" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تخطيط الدورة - بوابة المحرر</title>
  <link rel="stylesheet" href="editor.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="js/editor-guard.js"></script>
  <style>
    .pl-page { max-width: 860px; margin: 2rem auto; padding: 0 1.25rem; }
    .pl-breadcrumb { display: flex; align-items: center; gap: .5rem; font-size: .82rem; color: var(--text-subtle); margin-bottom: 1.5rem; }
    .pl-breadcrumb a { color: var(--color-info, #60a5fa); text-decoration: none; }
    .pl-breadcrumb a:hover { text-decoration: underline; }
    .pl-breadcrumb__sep { opacity: .4; }

    .pl-hero { margin-bottom: 2rem; }
    .pl-hero__label { font-size: .75rem; font-weight: 600; color: var(--text-subtle); letter-spacing: .04em; margin-bottom: .3rem; }
    .pl-hero__title { font-size: 1.5rem; font-weight: 800; color: var(--text-main); margin: 0 0 .3rem; }
    .pl-hero__sub { color: var(--text-subtle); font-size: .88rem; margin: 0; }

    .pl-card {
      background: var(--bg-card, rgba(15,23,42,.6));
      border: 1px solid var(--border-subtle); border-radius: 20px;
      padding: 1.75rem; margin-bottom: 1.25rem;
    }
    .pl-card__title { font-size: 1rem; font-weight: 700; color: var(--text-main); margin: 0 0 1.25rem; display: flex; align-items: center; gap: .5rem; }
    .pl-card__title-icon { font-size: 1.1rem; }

    .pl-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .pl-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
    @media(max-width:600px){ .pl-grid-2, .pl-grid-3 { grid-template-columns: 1fr; } }

    .pl-field { margin-bottom: 1rem; }
    .pl-field label { display: block; font-size: .82rem; font-weight: 600; color: var(--text-subtle); margin-bottom: .4rem; }
    .pl-field input,
    .pl-field select,
    .pl-field textarea {
      width: 100%; padding: .65rem .9rem; box-sizing: border-box;
      background: var(--surface-input, rgba(30,41,59,.8));
      border: 1px solid var(--border-subtle); border-radius: 10px;
      color: var(--text-main); font-family: inherit; font-size: .88rem;
      outline: none; resize: vertical; transition: border-color .2s;
    }
    .pl-field input:focus,
    .pl-field select:focus,
    .pl-field textarea:focus { border-color: var(--border-accent); }

    /* Domain pills */
    .pl-domain-pills { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .25rem; }
    .pl-domain-pill {
      padding: .35rem .9rem; border-radius: 999px; cursor: pointer;
      font-size: .82rem; font-weight: 600; border: 2px solid var(--border-subtle);
      background: transparent; color: var(--text-subtle);
      font-family: inherit; transition: all .2s;
    }
    .pl-domain-pill.active { border-width: 2px; font-weight: 700; }
    .pl-domain-pill[data-domain="technical"].active { border-color: #60a5fa; background: rgba(96,165,250,.12); color: #60a5fa; }
    .pl-domain-pill[data-domain="financial"].active { border-color: #fbbf24; background: rgba(251,191,36,.12); color: #fbbf24; }
    .pl-domain-pill[data-domain="political"].active { border-color: #a78bfa; background: rgba(167,139,250,.12); color: #a78bfa; }
    .pl-domain-pill[data-domain="other"].active { border-color: #9ca3af; background: rgba(156,163,175,.12); color: #9ca3af; }

    /* Tags input */
    .pl-tags-wrap {
      display: flex; flex-wrap: wrap; gap: .4rem; align-items: center;
      padding: .5rem .75rem; min-height: 42px;
      background: var(--surface-input, rgba(30,41,59,.8));
      border: 1px solid var(--border-subtle); border-radius: 10px;
      cursor: text; transition: border-color .2s;
    }
    .pl-tags-wrap:focus-within { border-color: var(--border-accent); }
    .pl-tag {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .2rem .6rem; border-radius: 999px; font-size: .75rem; font-weight: 600;
      background: rgba(59,130,246,.15); color: #60a5fa;
      border: 1px solid rgba(59,130,246,.3);
    }
    .pl-tag__remove { cursor: pointer; opacity: .6; font-size: .8rem; line-height: 1; }
    .pl-tag__remove:hover { opacity: 1; }
    .pl-tag-input {
      flex: 1; min-width: 80px; border: none; outline: none;
      background: transparent; color: var(--text-main); font-family: inherit; font-size: .82rem;
    }

    /* Schedule list */
    .pl-schedule-list { display: flex; flex-direction: column; gap: .6rem; }
    .pl-schedule-row {
      display: grid; grid-template-columns: 1fr 1fr auto; gap: .6rem; align-items: center;
    }
    .pl-schedule-row input {
      padding: .5rem .75rem; border-radius: 8px;
      background: var(--surface-input, rgba(30,41,59,.8));
      border: 1px solid var(--border-subtle); color: var(--text-main);
      font-family: inherit; font-size: .82rem; outline: none; transition: border-color .2s;
    }
    .pl-schedule-row input:focus { border-color: var(--border-accent); }
    .pl-remove-btn {
      width: 28px; height: 28px; border-radius: 8px; border: none; cursor: pointer;
      background: rgba(248,113,113,.1); color: #f87171;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .pl-remove-btn:hover { background: rgba(248,113,113,.2); }

    /* Save bar */
    .pl-save-bar {
      position: sticky; bottom: 1.5rem; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; padding: 1rem 1.5rem; border-radius: 16px;
      background: var(--bg-card, rgba(15,23,42,.95));
      border: 1px solid var(--border-accent);
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      backdrop-filter: blur(12px);
    }
    .pl-save-status { font-size: .82rem; color: var(--text-subtle); }
    .pl-save-actions { display: flex; gap: .6rem; }
    .btn-save {
      padding: .65rem 1.75rem; border-radius: 12px; border: none; cursor: pointer;
      background: linear-gradient(180deg, #3b82f6 0%, #1d4ed8 100%);
      color: white; font-family: inherit; font-weight: 700; font-size: .9rem;
      transition: opacity .2s; box-shadow: 0 2px 8px rgba(59,130,246,.3);
    }
    .btn-save:hover { opacity: .9; }
    .btn-back {
      padding: .65rem 1.25rem; border-radius: 12px; cursor: pointer;
      background: transparent; border: 1px solid var(--border-subtle);
      color: var(--text-subtle); font-family: inherit; font-weight: 600; font-size: .88rem;
      transition: border-color .2s, color .2s;
    }
    .btn-back:hover { border-color: var(--border-accent); color: var(--text-main); }
  </style>
</head>
<body data-page="courses">
  <a href="#main-content" class="skip-to-main">انتقل إلى المحتوى الرئيسي</a>
  <div id="editorSidebar"></div>
  <main id="main-content" class="pl-page">

    <div class="pl-breadcrumb">
      <a href="editor-courses.html">الدورات</a>
      <span class="pl-breadcrumb__sep">›</span>
      <span id="breadcrumbCourse">تحميل...</span>
      <span class="pl-breadcrumb__sep">›</span>
      <span>التخطيط والتصنيف</span>
    </div>

    <div class="pl-hero">
      <p class="pl-hero__label">التخطيط والتصنيف</p>
      <h1 class="pl-hero__title" id="heroTitle">تخطيط الدورة</h1>
      <p class="pl-hero__sub">حدد المجال والجدول الزمني والمتطلبات والمخرجات</p>
    </div>

    <!-- Domain & Classification -->
    <div class="pl-card">
      <h2 class="pl-card__title"><span class="pl-card__title-icon" id="_plIconTag"></span>التصنيف</h2>
      <div class="pl-field">
        <label>المجال</label>
        <div class="pl-domain-pills" id="domainPills">
          <button type="button" class="pl-domain-pill active" data-domain="technical" onclick="selectDomain('technical')">تقني</button>
          <button type="button" class="pl-domain-pill" data-domain="financial" onclick="selectDomain('financial')">مالي</button>
          <button type="button" class="pl-domain-pill" data-domain="political" onclick="selectDomain('political')">سياسي</button>
          <button type="button" class="pl-domain-pill" data-domain="other" onclick="selectDomain('other')">أخرى</button>
        </div>
      </div>
      <div class="pl-grid-2">
        <div class="pl-field">
          <label>المستوى</label>
          <select id="fLevel">
            <option value="">— اختر —</option>
            <option value="مبتدئ">مبتدئ</option>
            <option value="متوسط">متوسط</option>
            <option value="متقدم">متقدم</option>
          </select>
        </div>
        <div class="pl-field">
          <label>الطاقة الاستيعابية (عدد المتدربين)</label>
          <input type="number" id="fCapacity" min="1" placeholder="30" />
        </div>
      </div>
      <div class="pl-field">
        <label>الكلمات الدالة (Tags)</label>
        <div class="pl-tags-wrap" id="tagsWrap" onclick="document.getElementById('tagInput').focus()">
          <input type="text" id="tagInput" class="pl-tag-input" placeholder="اكتب ثم اضغط Enter لإضافة..." />
        </div>
      </div>
    </div>

    <!-- Schedule -->
    <div class="pl-card">
      <h2 class="pl-card__title"><span class="pl-card__title-icon" id="_plIconCal"></span>الجدول الزمني</h2>
      <div class="pl-grid-2">
        <div class="pl-field">
          <label>تاريخ البدء</label>
          <input type="date" id="fStart" />
        </div>
        <div class="pl-field">
          <label>تاريخ الانتهاء</label>
          <input type="date" id="fEnd" />
        </div>
      </div>
      <div class="pl-field">
        <label>المدرب المسؤول</label>
        <input type="text" id="fInstructor" placeholder="اسم المدرب أو المسؤول" />
      </div>
      <div class="pl-field">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;">
          <label style="margin:0;">جدول الجلسات</label>
          <button type="button" onclick="addScheduleRow()"
            style="font-size:.78rem;padding:.3rem .8rem;border-radius:8px;border:1px solid rgba(59,130,246,.4);
                   background:transparent;color:#60a5fa;cursor:pointer;font-family:inherit;">
            + إضافة
          </button>
        </div>
        <div class="pl-schedule-list" id="scheduleList"></div>
      </div>
    </div>

    <!-- Prerequisites & Outcomes -->
    <div class="pl-card">
      <h2 class="pl-card__title"><span class="pl-card__title-icon" id="_plIconClip"></span>المتطلبات والمخرجات</h2>
      <div class="pl-field">
        <label>المتطلبات المسبقة</label>
        <textarea id="fPrereqs" rows="3" placeholder="ما يجب أن يعرفه المتدرب قبل الالتحاق..."></textarea>
      </div>
      <div class="pl-field">
        <label>المنهج التفصيلي (Syllabus)</label>
        <textarea id="fSyllabus" rows="5" placeholder="الموضوعات الرئيسية التي تغطيها الدورة..."></textarea>
      </div>
      <div class="pl-field">
        <label>المخرجات التعليمية</label>
        <textarea id="fOutcomes" rows="4" placeholder="ما الذي سيتمكن المتدرب من فعله بعد إتمام الدورة..."></textarea>
      </div>
    </div>

    <!-- Save bar -->
    <div class="pl-save-bar">
      <span class="pl-save-status" id="saveStatus">لم يتم الحفظ بعد</span>
      <div class="pl-save-actions">
        <a href="editor-courses.html" class="btn-back">العودة للدورات</a>
        <button type="button" class="btn-save" onclick="savePlanning()">حفظ التخطيط</button>
      </div>
    </div>

  </main>

  <script src="js/editor-layout.js"></script>
  <script src="js/icons.js"></script>
  <script>
    document.getElementById('_plIconTag').innerHTML  = NTAIcons('tag', 18);
    document.getElementById('_plIconCal').innerHTML  = NTAIcons('calendar', 18);
    document.getElementById('_plIconClip').innerHTML = NTAIcons('clipboard', 18);
  </script>
  <script>
    var courseId = null;
    var selectedDomain = 'technical';
    var tags = [];
    var scheduleRows = [];

    (function() {
      var params = new URLSearchParams(window.location.search);
      courseId = parseInt(params.get('id')) || null;
      if (!courseId) {
        showCoursePicker();
        return;
      }
      loadCourse();
      loadPlanning();
    })();

    function showCoursePicker() {
      document.querySelectorAll('.pl-card, .pl-save-bar').forEach(function(el){ el.style.display = 'none'; });
      document.getElementById('breadcrumbCourse').textContent = '—';
      document.getElementById('heroTitle').textContent = 'اختر دورة للتخطيط';
      var card = document.createElement('div');
      card.className = 'pl-card';
      card.innerHTML = '<h2 class="pl-card__title">الدورات المتاحة</h2><div class="pl-field"><label>الدورة</label><select id="pickCourse"><option value="">— اختر دورة —</option></select></div>';
      document.querySelector('.pl-hero').after(card);
      editorAuth.fetch('/api/courses')
        .then(function(r){ return r.json(); })
        .then(function(list) {
          var sel = document.getElementById('pickCourse');
          (Array.isArray(list) ? list : (list.courses || [])).forEach(function(c) {
            var o = document.createElement('option');
            o.value = c.id;
            o.textContent = c.title_ar || c.title || ('دورة #' + c.id);
            sel.appendChild(o);
          });
          sel.addEventListener('change', function() {
            if (sel.value) window.location.href = 'editor-planning.html?id=' + sel.value;
          });
        })
        .catch(function(){ showEditorToast('تعذر تحميل الدورات', 'error'); });
    }

    function loadCourse() {
      editorAuth.fetch('/api/courses/' + courseId)
        .then(function(r){ return r.json(); })
        .then(function(c) {
          var name = c.title_ar || c.title || 'دورة #' + courseId;
          document.getElementById('breadcrumbCourse').textContent = name;
          document.getElementById('heroTitle').textContent = 'تخطيط: ' + name;
          document.title = 'تخطيط: ' + name;
        })
        .catch(function(){});
    }

    function loadPlanning() {
      editorAuth.fetch('/api/planning/' + courseId)
        .then(function(r){ return r.json(); })
        .then(function(p) {
          if (!p || !p.domain) return;
          selectDomain(p.domain);
          document.getElementById('fLevel').value = p.level || '';
          document.getElementById('fCapacity').value = p.capacity || '';
          document.getElementById('fStart').value = p.start_date ? p.start_date.split('T')[0] : '';
          document.getElementById('fEnd').value = p.end_date ? p.end_date.split('T')[0] : '';
          document.getElementById('fInstructor').value = p.instructor || '';
          document.getElementById('fPrereqs').value = p.prerequisites || '';
          document.getElementById('fSyllabus').value = p.syllabus || '';
          document.getElementById('fOutcomes').value = p.outcomes || '';
          tags = Array.isArray(p.tags) ? p.tags : [];
          renderTags();
          scheduleRows = Array.isArray(p.schedule_json) ? p.schedule_json : [];
          renderSchedule();
          document.getElementById('saveStatus').textContent = 'آخر حفظ: ' + new Date().toLocaleTimeString('ar-EG');
        })
        .catch(function(){});
    }

    function selectDomain(domain) {
      selectedDomain = domain;
      document.querySelectorAll('.pl-domain-pill').forEach(function(b){
        b.classList.toggle('active', b.dataset.domain === domain);
      });
    }

    // ── Tags ──
    document.getElementById('tagInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        var val = this.value.trim().replace(',', '');
        if (val && !tags.includes(val)) { tags.push(val); renderTags(); }
        this.value = '';
      } else if (e.key === 'Backspace' && !this.value && tags.length) {
        tags.pop(); renderTags();
      }
    });

    function renderTags() {
      var wrap = document.getElementById('tagsWrap');
      var input = document.getElementById('tagInput');
      wrap.querySelectorAll('.pl-tag').forEach(function(t){ t.remove(); });
      tags.forEach(function(tag, i) {
        var el = document.createElement('span');
        el.className = 'pl-tag';
        el.innerHTML = tag + ' <span class="pl-tag__remove" onclick="removeTag(' + i + ')">×</span>';
        wrap.insertBefore(el, input);
      });
    }
    function removeTag(i) { tags.splice(i, 1); renderTags(); }

    // ── Schedule ──
    function addScheduleRow(day, time) {
      scheduleRows.push({ day: day || '', time: time || '' });
      renderSchedule();
    }

    function renderSchedule() {
      var list = document.getElementById('scheduleList');
      list.innerHTML = scheduleRows.map(function(r, i) {
        return '<div class="pl-schedule-row">' +
          '<input type="text" value="' + (r.day || '') + '" placeholder="اليوم (مثال: الأحد)" ' +
            'oninput="scheduleRows[' + i + '].day=this.value" />' +
          '<input type="time" value="' + (r.time || '') + '" ' +
            'oninput="scheduleRows[' + i + '].time=this.value" />' +
          '<button class="pl-remove-btn" onclick="removeScheduleRow(' + i + ')" title="حذف">' +
            '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="12" height="12"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>' +
          '</button>' +
        '</div>';
      }).join('');
      if (!scheduleRows.length) {
        list.innerHTML = '<p style="font-size:.8rem;color:var(--text-subtle);margin:0;">لا توجد جلسات مضافة بعد</p>';
      }
    }
    function removeScheduleRow(i) { scheduleRows.splice(i, 1); renderSchedule(); }

    // ── Save ──
    function savePlanning() {
      if (!courseId) return;
      var btn = document.querySelector('.btn-save');
      btn.disabled = true; btn.textContent = 'جاري الحفظ...';
      var payload = {
        domain: selectedDomain,
        tags: tags,
        level: document.getElementById('fLevel').value || null,
        capacity: parseInt(document.getElementById('fCapacity').value) || null,
        start_date: document.getElementById('fStart').value || null,
        end_date: document.getElementById('fEnd').value || null,
        instructor: document.getElementById('fInstructor').value.trim() || null,
        prerequisites: document.getElementById('fPrereqs').value.trim() || null,
        syllabus: document.getElementById('fSyllabus').value.trim() || null,
        outcomes: document.getElementById('fOutcomes').value.trim() || null,
        schedule_json: scheduleRows.length ? scheduleRows : null,
      };
      editorAuth.fetch('/api/planning/' + courseId, {
        method: 'PUT',
        body: JSON.stringify(payload),
      })
      .then(function(r){ if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(function() {
        showEditorToast('تم حفظ التخطيط بنجاح', 'success');
        document.getElementById('saveStatus').textContent = 'آخر حفظ: ' + new Date().toLocaleTimeString('ar-EG');
      })
      .catch(function(){ showEditorToast('فشل في الحفظ', 'error'); })
      .finally(function(){ btn.disabled = false; btn.textContent = 'حفظ التخطيط'; });
    }

    document.addEventListener('DOMContentLoaded', function() { renderSchedule(); });
  </script>
</body>
</html>
