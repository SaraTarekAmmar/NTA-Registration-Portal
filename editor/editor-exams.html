<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script src="/common/js/theme.js"></script>
    <link rel="stylesheet" href="/common/css/theme.css?v=3" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الاختبارات - بوابة المحرر</title>
    <link rel="stylesheet" href="editor.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="js/editor-guard.js"></script>
  </head>
  <body data-page="exams">
    <a href="#main-content" class="skip-to-main">انتقل إلى المحتوى الرئيسي</a>
    <div id="editorSidebar"></div>
    <main id="main-content" class="editor-main">
      <div class="editor-page-header">
        <h1 class="editor-page-header__title">الاختبارات والاختبارات القصيرة</h1>
        <p class="editor-page-header__sub">إنشاء وإدارة الاختبارات المرتبطة بالدورات</p>
      </div>

      <div style="display:flex;gap:0.75rem;margin-bottom:1.5rem;align-items:center;flex-wrap:wrap;">
        <div class="editor-form-group" style="margin:0;flex:1;min-width:240px;">
          <select id="courseSelect" class="editor-select" onchange="loadExams()">
            <option value="">— اختر دورة —</option>
          </select>
        </div>
        <button type="button" class="btn btn--primary" id="addExamBtn" onclick="openAddExam()" disabled>+ اختبار جديد</button>
      </div>

      <div id="pageBanner" class="editor-banner editor-banner--error" style="display:none;"><span id="pageBannerText"></span></div>

      <div id="emptyState" class="editor-state">
        <div class="editor-state__icon">📝</div>
        <div class="editor-state__title">اختر دورة أولاً</div>
        <div class="editor-state__text">اختر دورة لعرض وإدارة اختباراتها.</div>
      </div>
      <div id="examsList" style="display:none;"></div>

      <!-- Add/Edit Exam Modal -->
      <div id="examModal" class="editor-modal-overlay" style="display:none;" role="dialog" aria-modal="true">
        <div class="editor-modal" style="max-width:600px;">
          <h2 class="editor-modal__title" id="examModalTitle">اختبار جديد</h2>

          <div class="editor-form-group">
            <label for="examTitle">عنوان الاختبار <span class="required">*</span></label>
            <input type="text" id="examTitle" class="editor-input" placeholder="اختبار نهاية الدورة" />
            <p id="examTitleError" class="inline-error" style="display:none;">عنوان الاختبار مطلوب.</p>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="editor-form-group">
              <label for="examDuration">المدة (دقيقة)</label>
              <input type="number" id="examDuration" class="editor-input" min="5" placeholder="60" />
            </div>
            <div class="editor-form-group">
              <label for="examPassScore">درجة النجاح (%)</label>
              <input type="number" id="examPassScore" class="editor-input" min="0" max="100" placeholder="60" />
            </div>
          </div>

          <!-- Questions -->
          <div style="margin-top:1rem;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
              <span style="font-size:0.85rem;font-weight:700;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.04em;">الأسئلة</span>
              <button type="button" class="btn btn--secondary btn--sm" onclick="addQuestion()">+ سؤال</button>
            </div>
            <div id="questionsList"></div>
            <p id="questionsError" class="inline-error" style="display:none;">يجب إضافة سؤال واحد على الأقل قبل النشر.</p>
          </div>

          <div class="editor-modal__actions" style="margin-top:1.5rem;">
            <button type="button" class="btn btn--secondary" onclick="closeExamModal()">إلغاء</button>
            <button type="button" class="btn btn--secondary" onclick="saveExam('draft')">حفظ مسودة</button>
            <button type="button" class="btn btn--primary" onclick="saveExam('published')">نشر الاختبار</button>
          </div>
        </div>
      </div>
    </main>

    <div id="editorToastContainer" class="editor-toast-container"></div>
    <script src="js/editor-layout.js"></script>
    <script>
      var EDITOR_TOKEN_KEY = "editor_token";
      var exams = [];
      var questions = [];
      var editingExamIdx = -1;

      function authFetch(url, opts) {
        opts = opts || {};
        var token = sessionStorage.getItem(EDITOR_TOKEN_KEY);
        var headers = Object.assign({"Content-Type":"application/json"}, opts.headers||{});
        if (token) headers["Authorization"] = "Bearer " + token;
        return fetch(url, Object.assign({}, opts, {headers:headers}));
      }

      authFetch("/api/courses")
        .then(function(r){return r.json();})
        .then(function(courses){
          var sel = document.getElementById("courseSelect");
          courses.forEach(function(c){
            var o = document.createElement("option");
            o.value = c.id; o.textContent = c.title_ar||c.title; sel.appendChild(o);
          });
          var p = new URLSearchParams(window.location.search);
          var cid = p.get("course_id");
          if (cid){sel.value=cid;loadExams();}
        }).catch(function(){});

      function loadExams(){
        var cid = document.getElementById("courseSelect").value;
        document.getElementById("addExamBtn").disabled = !cid;
        if(!cid){
          exams=[];
          document.getElementById("examsList").style.display="none";
          document.getElementById("emptyState").style.display="flex";
          document.getElementById("emptyState").querySelector(".editor-state__title").textContent="اختر دورة أولاً";
          return;
        }
        document.getElementById("pageBanner").style.display="none";
        authFetch("/api/exams?course_id=" + cid)
          .then(function(r){ return r.ok ? r.json() : []; })
          .then(function(data){ exams = data || []; renderExams(); })
          .catch(function(){ exams=[]; renderExams(); });
      }

      function renderExams(){
        var list = document.getElementById("examsList");
        var empty = document.getElementById("emptyState");
        if(!exams.length){
          list.style.display="none"; empty.style.display="flex";
          empty.querySelector(".editor-state__title").textContent = "لا توجد اختبارات";
          empty.querySelector(".editor-state__text").textContent = "اضغط \"اختبار جديد\" للبدء.";
          return;
        }
        empty.style.display="none";
        var html="<div class='editor-table-wrap'><table class='editor-table'>" +
          "<caption class='sr-only'>قائمة الاختبارات</caption>" +
          "<thead><tr><th scope='col'>العنوان</th><th scope='col'>الأسئلة</th><th scope='col'>المدة</th><th scope='col'>الحالة</th><th scope='col'>الإجراءات</th></tr></thead><tbody>";
        exams.forEach(function(ex,i){
          html+="<tr><td style='font-weight:600;'>"+ex.title+"</td>";
          html+="<td>"+(ex.questions?ex.questions.length:0)+" سؤال</td>";
          html+="<td>"+(ex.duration||"—")+" د</td>";
          html+="<td><span class='editor-course-card__badge editor-course-card__badge--"+(ex.status==="published"?"published":"draft")+"'>"+(ex.status==="published"?"منشور":"مسودة")+"</span></td>";
          html+="<td style='display:flex;gap:0.5rem;'>";
          html+="<button type='button' class='btn btn--secondary btn--sm' onclick='openEditExam("+i+")'>تعديل</button>";
          html+="<button type='button' class='btn btn--danger btn--sm' onclick='deleteExam("+i+")'>حذف</button>";
          html+="</td></tr>";
        });
        html+="</tbody></table></div>";
        list.innerHTML=html; list.style.display="block";
      }

      function openAddExam(){
        editingExamIdx=-1; questions=[];
        document.getElementById("examModalTitle").textContent="اختبار جديد";
        document.getElementById("examTitle").value="";
        document.getElementById("examDuration").value="";
        document.getElementById("examPassScore").value="";
        document.getElementById("examTitleError").style.display="none";
        document.getElementById("questionsError").style.display="none";
        renderQuestions();
        document.getElementById("examModal").style.display="flex";
        document.getElementById("examTitle").focus();
      }

      function openEditExam(idx){
        editingExamIdx=idx;
        var ex=exams[idx];
        questions=JSON.parse(JSON.stringify(ex.questions||[]));
        document.getElementById("examModalTitle").textContent="تعديل الاختبار";
        document.getElementById("examTitle").value=ex.title||"";
        document.getElementById("examDuration").value=ex.duration||"";
        document.getElementById("examPassScore").value=ex.pass_score||"";
        document.getElementById("examTitleError").style.display="none";
        document.getElementById("questionsError").style.display="none";
        renderQuestions();
        document.getElementById("examModal").style.display="flex";
      }

      function closeExamModal(){ document.getElementById("examModal").style.display="none"; }

      function addQuestion(){
        questions.push({text:"",options:["","","",""],correct:0});
        renderQuestions();
      }

      function renderQuestions(){
        var list=document.getElementById("questionsList");
        if(!questions.length){list.innerHTML='<p style="font-size:0.82rem;color:var(--text-subtle);padding:0.5rem 0;">لا توجد أسئلة. اضغط "+ سؤال" للإضافة.</p>';return;}
        var html="";
        questions.forEach(function(q,qi){
          html+='<div style="background:rgba(8,12,32,0.4);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:1rem;margin-bottom:0.75rem;">';
          html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem;">';
          html+='<span style="font-size:0.75rem;font-weight:700;color:var(--text-subtle);">السؤال '+(qi+1)+'</span>';
          html+='<button type="button" class="btn btn--danger btn--sm" onclick="removeQuestion('+qi+')">حذف</button></div>';
          html+='<input type="text" class="editor-input" style="margin-bottom:0.75rem;" placeholder="نص السؤال" value="'+q.text+'" oninput="questions['+qi+'].text=this.value" />';
          q.options.forEach(function(opt,oi){
            html+='<div style="display:flex;gap:0.5rem;align-items:center;margin-bottom:0.4rem;">';
            html+='<input type="radio" name="correct_'+qi+'" '+(q.correct===oi?"checked":"")+ ' aria-label="الإجابة الصحيحة للخيار '+(oi+1)+'" onchange="questions['+qi+'].correct='+oi+'" style="width:16px;height:16px;flex-shrink:0;" />';
            html+='<input type="text" class="editor-input" placeholder="الخيار '+(oi+1)+'" value="'+opt+'" oninput="questions['+qi+'].options['+oi+']=this.value" />';
            html+='</div>';
          });
          html+='</div>';
        });
        list.innerHTML=html;
      }

      function removeQuestion(idx){ questions.splice(idx,1); renderQuestions(); }

      function saveExam(status){
        var title=document.getElementById("examTitle").value.trim();
        if(!title){document.getElementById("examTitleError").style.display="block";return;}
        document.getElementById("examTitleError").style.display="none";
        if(status==="published"&&!questions.length){document.getElementById("questionsError").style.display="block";return;}
        document.getElementById("questionsError").style.display="none";
        var cid = parseInt(document.getElementById("courseSelect").value) || 0;
        var exam={
          title:title,
          duration:parseInt(document.getElementById("examDuration").value)||null,
          pass_score:parseInt(document.getElementById("examPassScore").value)||null,
          questions:JSON.parse(JSON.stringify(questions)),
          status:status
        };
        var apiPayload={
          subject: (editingExamIdx>=0 && exams[editingExamIdx].subject) || ("course_"+cid+"_"+Date.now()),
          title: title,
          title_ar: title,
          questions: exam.questions,
          duration_minutes: exam.duration || 60,
          pass_score: exam.pass_score || 60,
          course_id: cid
        };
        if(editingExamIdx>=0){
          exam.subject = exams[editingExamIdx].subject;
          if(exam.subject){
            authFetch("/api/exams/"+exam.subject,{method:"PUT",body:JSON.stringify(apiPayload)})
              .then(function(r){ return r.ok ? r.json() : r.json().then(function(e){ throw new Error(e.detail||"فشل الحفظ"); }); })
              .then(function(){ exams[editingExamIdx]=exam; closeExamModal(); renderExams(); showEditorToast(status==="published"?"تم نشر الاختبار.":"تم حفظ المسودة.","success"); })
              .catch(function(err){ showEditorToast(err.message||"فشل حفظ الاختبار.","error"); });
          } else {
            exams[editingExamIdx]=exam; closeExamModal(); renderExams();
            showEditorToast("تم الحفظ محلياً.","success");
          }
        } else {
          authFetch("/api/exams",{method:"POST",body:JSON.stringify(apiPayload)})
            .then(function(r){ return r.ok ? r.json() : r.json().then(function(e){ throw new Error(e.detail||"فشل الإنشاء"); }); })
            .then(function(data){ if(data) exam.subject=data.subject||apiPayload.subject; exams.push(exam); renderExams(); closeExamModal(); showEditorToast(status==="published"?"تم نشر الاختبار.":"تم حفظ المسودة.","success"); })
            .catch(function(err){ showEditorToast(err.message||"فشل إنشاء الاختبار.","error"); });
        }
      }

      function deleteExam(idx){
        editorConfirm({title:"حذف الاختبار؟",body:"هل تريد حذف <strong>"+exams[idx].title+"</strong>؟",okLabel:"حذف",cancelLabel:"إلغاء",danger:true})
          .then(function(ok){
            if(ok){
              var subj = exams[idx].subject;
              if(subj) authFetch("/api/exams/"+subj,{method:"DELETE"}).catch(function(){});
              exams.splice(idx,1); renderExams();
              showEditorToast("تم الحذف.","success");
            }
          });
      }

      document.addEventListener("keydown",function(e){
        var modal=document.getElementById("examModal");
        if(e.key==="Escape" && modal && modal.style.display==="flex") closeExamModal();
      });
    </script>
  </body>
</html>
