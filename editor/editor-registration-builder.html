    <style>
      .adm-step-card {
        background: rgba(8,12,32,0.4);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 12px;
        padding: 1rem;
        margin-bottom: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .adm-step-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .adm-step-title {
        font-weight: 700;
        font-size: 0.95rem;
        color: var(--text-main);
      }
      .adm-step-actions {
        display: flex;
        gap: 0.5rem;
      }
      .builder-container {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
        align-items: start;
      }
      @media (max-width: 900px) {
        .builder-container {
          grid-template-columns: 1fr;
        }
      }
      .builder-settings-panel {
        background: #0d1222;
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 12px;
        padding: 1.25rem;
        position: sticky;
        top: 2rem;
      }
      .builder-settings-panel h3 {
        font-size: 1.05rem;
        margin: 0 0 1.25rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .builder-settings-group {
        margin-bottom: 1.25rem;
      }
      .builder-settings-group label {
        display: block;
        font-size: 0.8rem;
        color: var(--text-subtle);
        margin-bottom: 0.4rem;
      }
      .builder-steps-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .builder-step-card {
        background: #111827;
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 12px;
        padding: 1rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .builder-step-card:hover {
        background: #1f2937;
        border-color: rgba(255,255,255,0.1);
      }
      .builder-step-card.selected {
        background: rgba(59,130,246,0.05);
        border-color: rgba(59,130,246,0.3);
      }
      .builder-step-num {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 0.9rem;
        color: #9ca3af;
      }
      .builder-step-card.selected .builder-step-num {
        background: rgba(59,130,246,0.15);
        color: #60a5fa;
      }
      .builder-step-info {
        flex: 1;
      }
      .builder-step-title {
        font-weight: 700;
        font-size: 0.95rem;
        margin-bottom: 0.25rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .builder-step-meta {
        font-size: 0.75rem;
        color: var(--text-subtle);
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .badge {
        font-size: 0.7rem;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        font-weight: 600;
      }
      .badge--red { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
      .badge--blue { background: rgba(59,130,246,0.1); color: #60a5fa; border: 1px solid rgba(59,130,246,0.2); }
      .badge--green { background: rgba(16,185,129,0.1); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
      
      .builder-header {

        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }
      .builder-header-title {
        font-size: 1.2rem;
        font-weight: 800;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

    <a href="#main-content" class="skip-to-main">انتقل إلى المحتوى الرئيسي</a>
    <div id="editorSidebar"></div>
    <main id="main-content" class="editor-main">
      <div class="editor-page-header">
        <h1 class="editor-page-header__title">مسار التسجيل</h1>
        <p class="editor-page-header__sub">إعداد وتكوين خطوات التقييم والقبول لكل دورة</p>
      </div>

      <!-- Course selector -->
      <div class="editor-form-group" style="max-width:360px;margin-bottom:1.5rem;">
        <label for="courseSelect">اختر الدورة</label>
        <select id="courseSelect" class="editor-select" onchange="loadRegistrationSteps()">
          <option value="">— اختر دورة —</option>
        </select>
      </div>

      <div id="pageBanner" class="editor-banner editor-banner--error" style="display:none;" role="alert">
        <span id="pageBannerText"></span>
        <button type="button" onclick="loadRegistrationSteps()" style="margin-right:auto;background:none;border:none;cursor:pointer;color:inherit;font-weight:700;font-size:0.82rem;">إعادة المحاولة</button>
      </div>

      <div id="loadingState" class="editor-state" style="display:none;">
        <div class="editor-state__icon" id="_loadIcon"></div>
        <div class="editor-state__title">جاري التحميل...</div>
      </div>
      <div id="emptyState" class="editor-state">
        <div class="editor-state__icon" id="_stateIcon"></div>
        <div class="editor-state__title">اختر دورة أولاً</div>
        <div class="editor-state__text">اختر دورة من القائمة أعلاه لعرض مسار التسجيل الخاص بها وإدارته.</div>
      </div>

      <!-- Builder area -->
      <div id="builderArea" style="display:none;">
        <div class="builder-header">
          <h2 class="builder-header-title">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            مسار التسجيل — الخطوات
          </h2>
          <div style="display:flex;gap:0.75rem;">
            <button type="button" class="btn btn--primary" onclick="addAdmStep()">+ خطوة</button>
          </div>
        </div>

        <div class="builder-container">
          <!-- Left Pane removed -->

          <!-- Right Pane: Steps List -->
          <div>
              <div id="admStepsList" class="builder-steps-list"></div>
              <div id="noAdmStepsMsg" style="text-align:center;padding:3rem 1rem;color:var(--text-subtle);font-size:0.9rem;background:rgba(255,255,255,0.02);border-radius:12px;border:1px dashed rgba(255,255,255,0.1);">
                لم تتم إضافة خطوات. استخدم زر "+ خطوة" للبدء في بناء مسار التسجيل.
              </div>
              
              <div style="display:flex;justify-content:flex-end;margin-top:2rem;">
                <button type="button" class="btn btn--primary" onclick="saveRegistrationSteps()">حفظ مسار التسجيل</button>
              </div>
          </div>
        </div>
      </div>

    </main>

      function authFetch(url, opts) {
        opts = opts || {};
        var token = localStorage.getItem(EDITOR_TOKEN_KEY);
        var headers = Object.assign({"Content-Type":"application/json"}, opts.headers || {});
        if (token) headers["Authorization"] = "Bearer " + token;
        return fetch(url, Object.assign({}, opts, {headers: headers}));
      }

      function notify(msg, type) {
        if (window.showEditorToast) window.showEditorToast(msg, type || "success");
      }

      // Load courses
      authFetch("/api/courses")
        .then(function(r) { return r.json(); })
        .then(function(courses) {
          var sel = document.getElementById("courseSelect");
          courses.forEach(function(c) {
            var opt = document.createElement("option");
            opt.value = c.id;
            opt.textContent = c.title_ar || c.title;
            sel.appendChild(opt);
          });
          var params = new URLSearchParams(window.location.search);
          var cid = params.get("course_id");
          if (cid) { sel.value = cid; loadRegistrationSteps(); }
        })
        .catch(function() {});

      var draggedIndex = -1;

      function handleDragStart(e, index) {
          draggedIndex = index;
          e.dataTransfer.effectAllowed = 'move';
      }

      function handleDragOver(e) {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
      }

      function handleDrop(e, dropIndex) {
          e.preventDefault();
          if (draggedIndex === -1 || draggedIndex === dropIndex) return;

          var item = registrationSteps.splice(draggedIndex, 1)[0];
          registrationSteps.splice(dropIndex, 0, item);
          
          if (selectedStepIndex === draggedIndex) {
              selectedStepIndex = dropIndex;
          } else if (selectedStepIndex > draggedIndex && selectedStepIndex <= dropIndex) {
              selectedStepIndex--;
          } else if (selectedStepIndex < draggedIndex && selectedStepIndex >= dropIndex) {
              selectedStepIndex++;
          }

          draggedIndex = -1;
          renderAdmSteps();
      }

      var selectedStepIndex = -1;


      function addAdmStep() {
        var num = registrationSteps.length + 1;
        var key = 'step_' + num;
        registrationSteps.push({
            step_type: 'fullName',
            step_key: key,
            title_ar: 'الاسم الكامل',
            description_ar: '',
            is_required: true,
            config_json: {
                is_active: true
            }
        });
        selectedStepIndex = registrationSteps.length - 1;
        renderAdmSteps();
      }
      
      function selectStep(idx) {
          if (selectedStepIndex === idx) {
              selectedStepIndex = -1;
          } else {
              selectedStepIndex = idx;
          }
          renderAdmSteps();
      }
      
      function updateSelectedStep(field, value) {
          if (selectedStepIndex === -1) return;
          registrationSteps[selectedStepIndex][field] = value;
          renderStepsListOnly();
      }
      
      function updateSelectedConfig(field, value) {
          if (selectedStepIndex === -1) return;
          if (!registrationSteps[selectedStepIndex].config_json) {
              registrationSteps[selectedStepIndex].config_json = {};
          }
          registrationSteps[selectedStepIndex].config_json[field] = value;
          renderStepsListOnly();
      }
      
      
      function removeStepDirectly(e, idx) {
          e.stopPropagation();
          if(confirm("هل أنت متأكد من حذف هذه الخطوة؟")) {
              registrationSteps.splice(idx, 1);
              if (selectedStepIndex === idx) {
                  selectedStepIndex = -1;
              } else if (selectedStepIndex > idx) {
                  selectedStepIndex--;
              }
              renderAdmSteps();
          }
      }

      function removeSelectedStep() {
          if (selectedStepIndex === -1) return;
          if(confirm("هل أنت متأكد من حذف هذه الخطوة؟")) {
              registrationSteps.splice(selectedStepIndex, 1);
              selectedStepIndex = -1;
              renderAdmSteps();
          }
      }

      function renderAdmSteps() {
        renderStepsListOnly();
      }
      
      function renderStepsListOnly() {
        var list = document.getElementById("admStepsList");
        var noMsg = document.getElementById("noAdmStepsMsg");
        
        if (!registrationSteps.length) { 
            list.innerHTML = ""; 
            noMsg.style.display = "block"; 
            return; 
        }
        noMsg.style.display = "none";
        
        var html = "";
        registrationSteps.forEach(function(s, i) {
          var isSelected = i === selectedStepIndex;
          var activeBadge = (s.config_json && s.config_json.is_active === false) 
              ? '<span class="badge badge--red">غير نشط</span>' 
              : '<span class="badge badge--green">نشط</span>';
              
          var reqBadge = s.is_required 
              ? '<span class="badge badge--red">إجباري</span>' 
              : '<span class="badge" style="background:rgba(255,255,255,0.05);color:#9ca3af;border:1px solid rgba(255,255,255,0.1)">اختياري</span>';
              
          var typeLabel = ADM_TYPE_LABELS[s.step_type] || s.step_type;
          
          html += '<div class="builder-step-card '+(isSelected?'selected':'')+'" style="cursor:pointer;" onclick="selectStep('+i+')" draggable="true" ondragstart="handleDragStart(event, '+i+')" ondragover="handleDragOver(event)" ondrop="handleDrop(event, '+i+')">';
          html += '  <div style="display:flex; justify-content:space-between; align-items:center;">';
          html += '    <div style="display:flex; align-items:center; gap:1rem;">';
          html += '      <div class="builder-step-num">'+(i+1)+'</div>';
          html += '      <div class="builder-step-info">';
          html += '        <div class="builder-step-title">';
          html += '          ' + (s.title_ar || 'خطوة بدون عنوان');
          html += '        </div>';
          html += '        <div class="builder-step-meta">';
          html += '          <span style="color:#60a5fa;font-family:monospace;">'+(s.step_key || 'step_'+(i+1))+'</span>';
          html += '          <span style="opacity:0.5">•</span>';
          html += '          <span>'+typeLabel+'</span>';
          html += '        </div>';
          html += '      </div>';
          html += '    </div>';
          html += '    <div style="display:flex; align-items:center; gap:0.75rem;">';
          html += '      <div style="display:flex;gap:0.4rem;">' + reqBadge + activeBadge + '</div>';
          html += '      <div style="color:var(--text-subtle);opacity:0.5;cursor:grab;" class="drag-handle" title="سحب لإعادة الترتيب">';
          html += '        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24" style="opacity:0.6;"><path d="M11 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm-2-8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6 4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"></path></svg>';
          html += '      </div>';
          html += '      <button type="button" onclick="removeStepDirectly(event, '+i+')" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:4px;color:#ef4444;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;" onmouseover="this.style.background=\'rgba(239,68,68,0.2)\'" onmouseout="this.style.background=\'rgba(239,68,68,0.1)\'" title="حذف الخطوة">';
          html += '        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>';
          html += '      </button>';
          html += '      <div style="color:var(--text-subtle); margin-right: 0.5rem;">';
          html += '        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="transition: transform 0.3s; transform: rotate('+(isSelected?180:0)+'deg);"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>';
          html += '      </div>';
          html += '    </div>';
          html += '  </div>';

          // Render Fields Checklist inside the card if selected
          if (isSelected) {
            html += '  <div style="margin-top:1.5rem; padding-top:1.5rem; border-top:1px dashed rgba(255,255,255,0.1);" onclick="event.stopPropagation()">';
            html += '    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">';
            html += '      <h4 style="font-size:0.9rem; color:var(--text-subtle); margin:0;">الحقول (اختر لإظهارها في هذه الخطوة):</h4>';
            if (s.config_json && s.config_json.fields && s.config_json.fields.length > 0) {
               var allSelected = s.config_json.fields.every(f => f.is_active !== false);
               html += '      <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer;" title="تحديد/إلغاء تحديد جميع الحقول">';
               html += '        <input type="checkbox" onchange="toggleAllFields(' + i + ', this.checked)" ' + (allSelected ? 'checked' : '') + ' style="width:16px;height:16px;accent-color:var(--primary);cursor:pointer;">';
               html += '        <span style="font-size:0.85rem; color:var(--text-main);">تحديد الكل</span>';
               html += '      </label>';
            }
            html += '    </div>';
            html += '    <div style="display:flex; flex-direction:column; gap:0.5rem; max-height: 250px; overflow-y: auto; padding-right: 0.5rem;" class="custom-scrollbar">';
            if (s.config_json && s.config_json.fields && s.config_json.fields.length > 0) {
              s.config_json.fields.forEach(function(f, fIdx) {
                  var isChecked = f.is_active !== false ? "checked" : "";
                  html += '<label style="display:flex; align-items:center; gap:0.75rem; cursor:pointer; padding:0.6rem; border-radius:6px; background:rgba(255,255,255,0.02); transition:background 0.2s;" onmouseover="this.style.background=\'rgba(255,255,255,0.06)\'" onmouseout="this.style.background=\'rgba(255,255,255,0.02)\'">';
                  html += '  <input type="checkbox" onchange="toggleFieldActive(' + i + ', ' + fIdx + ', this.checked)" ' + isChecked + ' style="width:18px;height:18px;accent-color:var(--primary);cursor:pointer;">';
                  html += '  <span style="font-size:0.9rem; color:var(--text-main); flex:1;">' + (f.label || f.field_id) + '</span>';
                  html += '  <span style="font-size:0.75rem; color:var(--text-subtle); font-family:monospace;">' + f.field_id + '</span>';
                  html += '</label>';
              });
            } else {
              html += '      <span style="color:#9ca3af; font-size:0.85rem;">لا توجد حقول قابلة للتعديل في هذه الخطوة.</span>';
            }
            html += '    </div>';
            html += '  </div>';
          }
          
          html += '</div>';
        });
        list.innerHTML = html;
        
        var dependsSelect = document.getElementById("settingDependsOn");
        if (dependsSelect) {
            var opts = '<option value="">لا يوجد (مفتوحة دائماً)</option>';
            registrationSteps.forEach(function(s, idx) {
                if (idx !== selectedStepIndex) {
                    opts += '<option value="'+(s.step_key || 'step_'+(idx+1))+'">'+(s.title_ar || s.step_key)+'</option>';
                }
            });
            dependsSelect.innerHTML = opts;
            if (selectedStepIndex !== -1 && registrationSteps[selectedStepIndex].config_json && registrationSteps[selectedStepIndex].config_json.depends_on) {
                dependsSelect.value = registrationSteps[selectedStepIndex].config_json.depends_on;
            } else {
                dependsSelect.value = "";
            }
        }
      }

      
      function toggleFieldActive(stepIdx, fieldIdx, isChecked) {
          if(registrationSteps[stepIdx] && registrationSteps[stepIdx].config_json && registrationSteps[stepIdx].config_json.fields) {
              registrationSteps[stepIdx].config_json.fields[fieldIdx].is_active = isChecked;
              renderAdmSteps();
          }
      }

      function toggleAllFields(stepIdx, isChecked) {
          if(registrationSteps[stepIdx] && registrationSteps[stepIdx].config_json && registrationSteps[stepIdx].config_json.fields) {
              registrationSteps[stepIdx].config_json.fields.forEach(function(f) {
                  f.is_active = isChecked;
              });
              renderAdmSteps();
          }
      }



      function saveRegistrationSteps() {
        var courseId = document.getElementById("courseSelect").value;
        if (!courseId) return;

        // Re-assign step_order
        registrationSteps.forEach(function(s, i) { s.step_order = i; if(!s.step_key) s.step_key = "step_" + (i+1); });
          
        fetch("/api/courses/" + courseId + "/registration-steps", {
          method: "PUT",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + localStorage.getItem(EDITOR_TOKEN_KEY) },
          body: JSON.stringify(registrationSteps)
        })
          .then(function(r) { if (!r.ok) return r.json().then(function(e) { throw new Error(e.detail||"فشل الحفظ"); }); return r.json(); })
          .then(function() {
            showEditorToast("تم حفظ مسار التسجيل بنجاح", "success");
          })
          .catch(function(err) { showEditorToast(err.message || "حدث خطأ أثناء الحفظ.", "error"); });
      }
    </script>
  </body>
</html>
