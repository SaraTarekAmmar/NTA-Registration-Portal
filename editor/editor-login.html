<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script src="/common/js/theme.js"></script>
    <link rel="stylesheet" href="/common/css/theme.css?v=3" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل دخول محرر المحتوى - الأكاديمية الوطنية للتدريب</title>
    <link rel="stylesheet" href="/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      .login-role-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.35rem 0.9rem;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 700;
        background: rgba(16, 185, 129, 0.15);
        border: 1px solid rgba(16, 185, 129, 0.35);
        color: #6ee7b7;
        margin-bottom: 0.5rem;
        letter-spacing: 0.04em;
      }
      .login-role-badge svg { width: 14px; height: 14px; }
      .login-admin-link {
        display: block;
        text-align: center;
        margin-top: 1.25rem;
        font-size: 0.82rem;
        color: var(--text-subtle);
        text-decoration: none;
        transition: color 0.2s;
      }
      .login-admin-link:hover { color: var(--accent-hover); }
      .login-error-msg {
        background: rgba(239,68,68,0.1);
        border: 1px solid rgba(239,68,68,0.35);
        border-radius: 12px;
        padding: 0.7rem 1rem;
        font-size: 0.85rem;
        color: var(--color-error-soft, #fca5a5);
        margin-top: 0.75rem;
      }
      .field-error {
        font-size: 0.78rem;
        color: var(--color-error-soft, #fca5a5);
        margin-top: 0.3rem;
      }
    </style>
  </head>

  <body class="has-header">
    <div class="login-bg"></div>

    <div class="login-card" id="loginCard">
      <div class="logo-container">
        <img src="/images/logo2.png" alt="الأكاديمية الوطنية للتدريب" class="login-logo" onerror="this.style.display='none'" />
        <div class="logo-subtitle">بوابة تحرير المحتوى</div>
      </div>

      <div style="text-align:center; margin-bottom:1rem;">
        <span class="login-role-badge">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
          </svg>
          Editor Login
        </span>
      </div>

      <h1>تسجيل دخول محرر المحتوى</h1>
      <p class="subtitle">بوابة إدارة الدورات والمواد التعليمية</p>

      <form id="editorLoginForm" novalidate>
        <div class="form-group">
          <label for="editorEmail">البريد الإلكتروني</label>
          <div class="login-input-wrap">
            <span class="login-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 6h16v12H4V6Z"/><path d="m4 7 8 6 8-6"/>
              </svg>
            </span>
            <input type="email" id="editorEmail" name="email" required autocomplete="email"
              placeholder="editor@example.com" aria-describedby="editorEmailError" />
          </div>
          <p id="editorEmailError" class="field-error" style="display:none;" aria-live="polite">البريد الإلكتروني مطلوب.</p>
        </div>

        <div class="form-group">
          <label for="editorPassword">كلمة المرور</label>
          <div class="login-input-wrap">
            <span class="login-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 11V8a5 5 0 0 1 10 0v3"/><path d="M6 11h12v10H6V11Z"/><path d="M12 15v2"/>
              </svg>
            </span>
            <input type="password" id="editorPassword" name="password" required autocomplete="current-password"
              placeholder="أدخل كلمة المرور" aria-describedby="editorPasswordError" />
          </div>
          <p id="editorPasswordError" class="field-error" style="display:none;" aria-live="polite">كلمة المرور مطلوبة.</p>
        </div>

        <button type="submit" class="login-btn" id="editorLoginBtn">
          <span class="login-btn-text">دخول بوابة المحرر</span>
          <span class="arrow-icon">←</span>
          <span class="login-btn-loader" aria-hidden="true"></span>
        </button>
      </form>

      <div id="loginError" class="login-error-msg" role="alert" aria-live="assertive" style="display:none;"></div>
      <a href="/admin-login.html" class="login-admin-link">هل أنت مشرف نظام؟ سجل دخول هنا ←</a>
    </div>

    <script>
      (function () {
        var EDITOR_TOKEN_KEY = "editor_token";

        var existingToken = sessionStorage.getItem(EDITOR_TOKEN_KEY);
        if (existingToken) {
          try {
            var p = JSON.parse(atob(existingToken.split(".")[1]));
            if (p && p.role === "editor" && (!p.exp || p.exp > Date.now() / 1000)) {
              window.location.replace("editor-dashboard.html");
            }
          } catch (e) {}
        }

        var form = document.getElementById("editorLoginForm");
        var btn = document.getElementById("editorLoginBtn");
        var errorBox = document.getElementById("loginError");

        function showFieldError(id, msg) {
          var el = document.getElementById(id);
          if (el) { el.textContent = msg; el.style.display = "block"; }
        }
        function hideFieldError(id) {
          var el = document.getElementById(id);
          if (el) { el.style.display = "none"; }
        }
        function showError(msg) {
          errorBox.textContent = msg;
          errorBox.style.display = "block";
        }
        function clearErrors() {
          errorBox.style.display = "none";
          hideFieldError("editorEmailError");
          hideFieldError("editorPasswordError");
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          clearErrors();

          var email = document.getElementById("editorEmail").value.trim();
          var password = document.getElementById("editorPassword").value;
          var valid = true;

          if (!email) { showFieldError("editorEmailError", "البريد الإلكتروني مطلوب."); valid = false; }
          if (!password) { showFieldError("editorPasswordError", "كلمة المرور مطلوبة."); valid = false; }
          if (!valid) return;

          btn.classList.add("loading");
          btn.disabled = true;

          fetch("/api/editor/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, password: password })
          })
            .then(function (res) {
              if (!res.ok) return res.json().then(function (err) { throw new Error(err.detail || "فشل تسجيل الدخول"); });
              return res.json();
            })
            .then(function (data) {
              if (!data.access_token || data.role !== "editor") {
                throw new Error("هذا الحساب غير مصرح له بالوصول إلى بوابة المحرر.");
              }
              sessionStorage.setItem(EDITOR_TOKEN_KEY, data.access_token);
              window.location.replace("editor-dashboard.html");
            })
            .catch(function (err) {
              btn.classList.remove("loading");
              btn.disabled = false;
              var msg = err.message || "خطأ في تسجيل الدخول";
              if (msg.toLowerCase().includes("not allowed") || msg.toLowerCase().includes("غير مصرح")) {
                showError("هذا الحساب غير مصرح له بالوصول إلى بوابة المحرر.");
              } else if (msg.includes("Invalid") || msg.includes("غير صحيحة")) {
                showError("البريد الإلكتروني أو كلمة المرور غير صحيحة.");
              } else {
                showError(msg);
              }
            });
        });
      })();
    </script>
  </body>
</html>
