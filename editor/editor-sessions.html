<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script src="/common/js/theme.js"></script>
    <link rel="stylesheet" href="/common/css/theme.css?v=3" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الجلسات - بوابة المحرر</title>
    <link rel="stylesheet" href="editor.css?v=3" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="js/editor-guard.js"></script>
    <style>
      .sd-tabs { display: flex; gap: .35rem; border-bottom: 1px solid var(--border-subtle); margin-bottom: 1.1rem; flex-wrap: wrap; }
      .sd-tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-subtle); font-family: inherit; font-size: .85rem; font-weight: 700; padding: .55rem .9rem; cursor: pointer; transition: color .2s, border-color .2s; }
      .sd-tab:hover { color: var(--text-main); }
      .sd-tab.active { color: #fca5a5; border-bottom-color: #b91c1c; }
      .sd-tab:disabled { opacity: .4; cursor: not-allowed; }
      .sd-mat-row { display: flex; align-items: center; gap: .6rem; padding: .55rem .7rem; border: 1px solid var(--border-subtle); border-radius: 10px; margin-bottom: .5rem; }
      .sd-mat-row__name { flex: 1; min-width: 0; font-size: .82rem; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .sd-mat-row__cat { font-size: .68rem; padding: .1rem .5rem; border-radius: 999px; background: rgba(255,255,255,.06); color: var(--text-subtle); flex-shrink: 0; }
      .sd-picker { border: 1px solid var(--border-subtle); border-radius: 12px; padding: .85rem; margin-top: .85rem; background: rgba(255,255,255,.02); }
      .sd-picker__filters { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .65rem; }
      .sd-picker__filters input, .sd-picker__filters select { padding: .4rem .6rem; border-radius: 8px; background: var(--surface-input,rgba(30,41,59,.8)); border: 1px solid var(--border-subtle); color: var(--text-main); font-family: inherit; font-size: .8rem; outline: none; }
      .sd-pick-item { display: flex; align-items: center; gap: .55rem; padding: .45rem .6rem; border-radius: 8px; cursor: pointer; }
      .sd-pick-item:hover { background: rgba(255,255,255,.04); }
      .sd-pick-item input { width: 16px; height: 16px; flex-shrink: 0; }
      .sd-pick-list { max-height: 230px; overflow-y: auto; }
    </style>
  </head>
  <body data-page="sessions">
    <a href="#main-content" class="skip-to-main">انتقل إلى المحتوى الرئيسي</a>
    <div id="editorSidebar"></div>
    <main id="main-content" class="editor-main">
      <div class="editor-page-header">
        <h1 class="editor-page-header__title">الجلسات</h1>
        <p class="editor-page-header__sub">إضافة وتعديل جلسات الدورات</p>
      </div>

      <!-- Course selector -->
      <div class="editor-form-group" style="max-width:360px;margin-bottom:1.5rem;">
        <label for="courseSelect">اختر الدورة</label>
        <select id="courseSelect" class="editor-select" onchange="loadSessions()">
          <option value="">— اختر دورة —</option>
        </select>
      </div>

      <div id="pageBanner" class="editor-banner editor-banner--error" style="display:none;" role="alert">
        <span id="pageBannerText"></span>
        <button type="button" onclick="loadSessions()" style="margin-right:auto;background:none;border:none;cursor:pointer;color:inherit;font-weight:700;font-size:0.82rem;">إعادة المحاولة</button>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <h2 style="font-size:1rem;font-weight:700;color:var(--text-main);margin:0;">قائمة الجلسات</h2>
        <button type="button" class="btn btn--primary btn--sm" onclick="addSession()" id="addSessionBtn" disabled>+ إضافة جلسة</button>
      </div>

      <div id="loadingState" class="editor-state" style="display:none;">
        <div class="editor-state__icon" id="_loadIcon"></div>
        <div class="editor-state__title">جاري التحميل...</div>
      </div>
      <div id="emptyState" class="editor-state">
        <div class="editor-state__icon" id="_stateIcon"></div>
        <div class="editor-state__title">اختر دورة أولاً</div>
        <div class="editor-state__text">اختر دورة من القائمة أعلاه لعرض وإدارة جلساتها.</div>
      </div>
      <div id="sessionsList" style="display:none;"></div>

      <!-- Session Details Drawer -->
      <div id="sessionModal" class="editor-modal-overlay" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="sessionModalTitle">
        <div class="editor-modal" style="max-width:660px;width:94%;">
          <h2 class="editor-modal__title" id="sessionModalTitle">تعديل الجلسة</h2>

          <div class="sd-tabs" role="tablist">
            <button type="button" class="sd-tab active" data-tab="details" onclick="sdTab('details')">تفاصيل الجلسة</button>
            <button type="button" class="sd-tab" data-tab="content" onclick="sdTab('content')">محتوى الجلسة</button>
            <button type="button" class="sd-tab" id="sdMaterialsTab" data-tab="materials" onclick="sdTab('materials')">مواد الجلسة</button>
          </div>

          <!-- Tab 1: Details -->
          <div id="sdPanel-details" class="sd-panel">
            <div class="editor-form-group">
              <label for="sessionTitle">عنوان الجلسة <span class="required">*</span></label>
              <input type="text" id="sessionTitle" class="editor-input" placeholder="عنوان الجلسة" />
              <p id="sessionTitleError" class="inline-error" style="display:none;">عنوان الجلسة مطلوب.</p>
            </div>
            <div class="editor-form-group">
              <label for="sessionDate">التاريخ والوقت</label>
              <input type="datetime-local" id="sessionDate" class="editor-input" />
            </div>
            <div class="editor-form-group">
              <label for="sessionStatus">الحالة</label>
              <select id="sessionStatus" class="editor-select">
                <option value="scheduled">مجدولة</option>
                <option value="completed">مكتملة</option>
                <option value="cancelled">ملغاة</option>
              </select>
            </div>
          </div>

          <!-- Tab 2: Content -->
          <div id="sdPanel-content" class="sd-panel" style="display:none;">
            <div class="editor-form-group">
              <label for="sessionDescription">الوصف</label>
              <textarea id="sessionDescription" class="editor-textarea" rows="2" placeholder="وصف موجز للجلسة..."></textarea>
            </div>
            <div class="editor-form-group">
              <label for="sessionContent">المحتوى</label>
              <textarea id="sessionContent" class="editor-textarea" rows="4" placeholder="محتوى الجلسة التفصيلي..."></textarea>
            </div>
            <div class="editor-form-group">
              <label for="sessionObjectives">الأهداف</label>
              <textarea id="sessionObjectives" class="editor-textarea" rows="3" placeholder="أهداف التعلم من هذه الجلسة..."></textarea>
            </div>
            <div class="editor-form-group">
              <label for="sessionNotes">ملاحظات</label>
              <textarea id="sessionNotes" class="editor-textarea" rows="2" placeholder="ملاحظات إضافية..."></textarea>
            </div>
          </div>

          <!-- Tab 3: Materials -->
          <div id="sdPanel-materials" class="sd-panel" style="display:none;">
            <div id="sdMaterialsHint" style="display:none;font-size:.82rem;color:var(--text-subtle);padding:1rem 0;">احفظ الجلسة أولاً ثم اربط بها مواداً تعليمية.</div>
            <div id="sdMaterialsBody">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">
                <span style="font-size:.85rem;font-weight:700;color:var(--text-main);">المواد المرتبطة</span>
                <div style="display:flex; gap:0.5rem">
                  <button type="button" class="btn btn--secondary btn--sm" onclick="openMaterialPicker()">ربط مواد موجودة</button>
                  <button type="button" class="btn btn--primary btn--sm" id="sessionUploadBtn" onclick="document.getElementById('sessionUploadInput').click()">رفع مادة جديدة</button>
                  <input type="file" id="sessionUploadInput" style="display:none;" onchange="uploadSessionMaterial(event)" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.jpg,.jpeg,.png,.zip,.rar,.mp4,.avi,.mov,.webm,.mkv" />
                </div>
              </div>
              <div id="sdLinkedList"></div>

              <div id="sdPicker" class="sd-picker" style="display:none;">
                <div class="sd-picker__filters">
                  <input type="text" id="sdSearch" placeholder="بحث..." oninput="renderPicker()" />
                  <select id="sdCatFilter" onchange="renderPicker()">
                    <option value="">كل التصنيفات</option>
                    <option value="technical">تقني</option>
                    <option value="financial">مالي</option>
                    <option value="political">سياسي</option>
                    <option value="supporting">داعم</option>
                  </select>
                  <select id="sdTypeFilter" onchange="renderPicker()">
                    <option value="">كل الأنواع</option>
                    <option value="pdf">PDF</option>
                    <option value="doc">Word</option>
                    <option value="ppt">PowerPoint</option>
                    <option value="xls">Excel</option>
                    <option value="image">صور</option>
                    <option value="video">فيديو</option>
                  </select>
                  <select id="sdLinkFilter" onchange="renderPicker()">
                    <option value="unlinked">غير المرتبطة</option>
                    <option value="all">الكل</option>
                    <option value="linked">المرتبطة</option>
                  </select>
                </div>
                <div id="sdPickList" class="sd-pick-list"></div>
                <div style="display:flex;justify-content:flex-end;gap:.5rem;margin-top:.65rem;">
                  <button type="button" class="btn btn--secondary btn--sm" onclick="closeMaterialPicker()">إغلاق</button>
                  <button type="button" class="btn btn--primary btn--sm" onclick="linkSelected()">ربط المحدد</button>
                </div>
              </div>
            </div>
          </div>

          <div class="editor-modal__actions">
            <button type="button" class="btn btn--secondary" onclick="closeSessionModal()">إلغاء</button>
            <button type="button" class="btn btn--primary" onclick="saveSession()" id="saveSessionBtn">حفظ الجلسة</button>
          </div>
        </div>
      </div>
    </main>

    <div id="editorToastContainer" class="editor-toast-container"></div>
    <script src="js/editor-layout.js?v=4"></script>
    <script src="js/icons.js"></script>
    <script>document.getElementById('_stateIcon').innerHTML = NTAIcons('calendar', 36);</script>
    <script>document.getElementById('_loadIcon').innerHTML = NTAIcons('sparkles', 36);</script>
    <script>
      var EDITOR_TOKEN_KEY = "editor_token";
      var sessions = [];
      var editingIdx = -1;
      var courseMaterials = [];  // all active materials of the current course (picker source)
      var linkedMaterials = [];  // materials linked to the open session
      var CAT_LABELS = { technical: "تقني", financial: "مالي", political: "سياسي", supporting: "داعم" };

      function sdTab(name) {
        ["details", "content", "materials"].forEach(function (t) {
          document.getElementById("sdPanel-" + t).style.display = (t === name) ? "block" : "none";
        });
        document.querySelectorAll(".sd-tab").forEach(function (b) {
          b.classList.toggle("active", b.getAttribute("data-tab") === name);
        });
      }

      function setSessionFields(s) {
        s = s || {};
        document.getElementById("sessionTitle").value = s.topic || s.title || "";
        document.getElementById("sessionDate").value = s.session_date ? String(s.session_date).slice(0, 16) : "";
        document.getElementById("sessionStatus").value = s.status || "scheduled";
        document.getElementById("sessionDescription").value = s.description || "";
        document.getElementById("sessionContent").value = s.content || "";
        document.getElementById("sessionObjectives").value = s.objectives || "";
        document.getElementById("sessionNotes").value = s.notes || "";
        document.getElementById("sessionTitleError").style.display = "none";
      }

      function authFetch(url, opts) {
        opts = opts || {};
        var token = localStorage.getItem(EDITOR_TOKEN_KEY);
        var headers = Object.assign({"Content-Type":"application/json"}, opts.headers || {});
        if (token) headers["Authorization"] = "Bearer " + token;
        return fetch(url, Object.assign({}, opts, {headers: headers}));
      }

      // Load courses into selector
      authFetch("/api/courses")
        .then(function(r) { return r.json(); })
        .then(function(courses) {
          var sel = document.getElementById("courseSelect");
          courses.forEach(function(c) {
            var opt = document.createElement("option");
            opt.value = c.id;
            opt.textContent = c.title_ar || c.title;
            sel.appendChild(opt);
          });
          // Check URL param
          var params = new URLSearchParams(window.location.search);
          var cid = params.get("course_id");
          if (cid) { sel.value = cid; loadSessions(); }
        })
        .catch(function() {});

      function loadSessions() {
        var courseId = document.getElementById("courseSelect").value;
        document.getElementById("addSessionBtn").disabled = !courseId;
        if (!courseId) {
          sessions = [];
          document.getElementById("emptyState").style.display = "flex";
          document.getElementById("sessionsList").style.display = "none";
          document.getElementById("emptyState").querySelector(".editor-state__title").textContent = "اختر دورة أولاً";
          document.getElementById("emptyState").querySelector(".editor-state__text").textContent = "اختر دورة من القائمة أعلاه لعرض وإدارة جلساتها.";
          return;
        }
        document.getElementById("pageBanner").style.display = "none";
        document.getElementById("loadingState").style.display = "flex";
        document.getElementById("emptyState").style.display = "none";
        document.getElementById("sessionsList").style.display = "none";

        authFetch("/api/sessions?course_id=" + courseId)
          .then(function(r) { if(!r.ok) throw new Error(); return r.json(); })
          .then(function(data) {
            sessions = data || [];
            document.getElementById("loadingState").style.display = "none";
            renderSessions();
          })
          .catch(function() {
            sessions = [];
            document.getElementById("loadingState").style.display = "none";
            renderSessions();
          });
      }

      function renderSessions() {
        var list = document.getElementById("sessionsList");
        var empty = document.getElementById("emptyState");
        if (!sessions.length) {
          list.style.display = "none";
          empty.style.display = "flex";
          empty.querySelector(".editor-state__title").textContent = "لا توجد جلسات";
          empty.querySelector(".editor-state__text").textContent = "اضغط \"إضافة جلسة\" لإنشاء أول جلسة.";
          return;
        }
        empty.style.display = "none";
        var statusMap = { scheduled:"مجدولة", completed:"مكتملة", cancelled:"ملغاة" };
        var html = '<div class="editor-table-wrap"><table class="editor-table">' +
          '<caption class="sr-only">قائمة الجلسات التدريبية</caption>' +
          '<thead><tr>' +
          '<th scope="col">#</th><th scope="col">عنوان الجلسة</th><th scope="col">التاريخ</th><th scope="col">الحالة</th><th scope="col">الإجراءات</th>' +
          '</tr></thead><tbody>';
        sessions.forEach(function(s, i) {
          html += '<tr>';
          html += '<td style="color:var(--text-subtle);">'+(i+1)+'</td>';
          html += '<td style="font-weight:600;">'+(s.topic||s.title||"جلسة "+(i+1))+'</td>';
          html += '<td>'+(s.session_date ? new Date(s.session_date).toLocaleDateString("ar-EG") : "—")+'</td>';
          html += '<td><span class="editor-course-card__badge editor-course-card__badge--'+(s.status==="completed"?"published":s.status==="cancelled"?"archived":"draft")+'">'+
            (statusMap[s.status]||"مجدولة")+'</span></td>';
          html += '<td style="display:flex;gap:0.5rem;">';
          html += '<button type="button" class="btn btn--secondary btn--sm" onclick="openEditSession('+i+')">تعديل</button>';
          html += '<button type="button" class="btn btn--danger btn--sm" onclick="deleteSession('+i+')">حذف</button>';
          html += '</td></tr>';
        });
        html += '</tbody></table></div>';
        list.innerHTML = html;
        list.style.display = "block";
      }

      function addSession() {
        editingIdx = -1;
        document.getElementById("sessionModalTitle").textContent = "إضافة جلسة جديدة";
        setSessionFields({});
        linkedMaterials = [];
        sdTab("details");
        document.getElementById("sdMaterialsTab").disabled = true;   // need a saved session first
        document.getElementById("sdMaterialsHint").style.display = "block";
        document.getElementById("sdMaterialsBody").style.display = "none";
        document.getElementById("sdPicker").style.display = "none";
        document.getElementById("sessionModal").style.display = "flex";
        document.getElementById("sessionTitle").focus();
      }

      function openEditSession(idx) {
        editingIdx = idx;
        var s = sessions[idx];
        document.getElementById("sessionModalTitle").textContent = "تعديل الجلسة";
        setSessionFields(s);
        sdTab("details");
        document.getElementById("sdPicker").style.display = "none";
        var hasId = !!s.id;
        document.getElementById("sdMaterialsTab").disabled = !hasId;
        document.getElementById("sdMaterialsHint").style.display = hasId ? "none" : "block";
        document.getElementById("sdMaterialsBody").style.display = hasId ? "block" : "none";
        linkedMaterials = [];
        renderLinkedMaterials();
        if (hasId) loadSessionMaterials(s.id);
        document.getElementById("sessionModal").style.display = "flex";
        document.getElementById("sessionTitle").focus();
      }

      function closeSessionModal() {
        document.getElementById("sessionModal").style.display = "none";
      }

      function saveSession() {
        var title = document.getElementById("sessionTitle").value.trim();
        if (!title) {
          document.getElementById("sessionTitleError").style.display = "block";
          return;
        }
        document.getElementById("sessionTitleError").style.display = "none";
        var courseId = parseInt(document.getElementById("courseSelect").value);
        var content = {
          description: document.getElementById("sessionDescription").value,
          content: document.getElementById("sessionContent").value,
          objectives: document.getElementById("sessionObjectives").value,
          notes: document.getElementById("sessionNotes").value
        };
        var obj = Object.assign({
          topic: title,
          title: title,
          session_date: document.getElementById("sessionDate").value || null,
          status: document.getElementById("sessionStatus").value
        }, content);
        var apiPayload = Object.assign({
          course_id: courseId,
          title: title,
          scheduled_date: obj.session_date || null,
          status: obj.status
        }, content);
        if (editingIdx >= 0) {
          var existingId = sessions[editingIdx].id;
          sessions[editingIdx] = Object.assign(sessions[editingIdx], obj);
          if (existingId) {
            authFetch("/api/sessions/" + existingId, {
              method: "PUT", body: JSON.stringify(Object.assign({}, apiPayload))
            }).catch(function() {});
          }
          showEditorToast("تم تحديث الجلسة.", "success");
          closeSessionModal();
          renderSessions();
        } else {
          authFetch("/api/sessions", { method: "POST", body: JSON.stringify(apiPayload) })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {
              if (data && data.id) obj.id = data.id;
              sessions.push(obj);
              renderSessions();
            })
            .catch(function() { sessions.push(obj); renderSessions(); });
          showEditorToast("تمت إضافة الجلسة.", "success");
          closeSessionModal();
        }
      }

      function deleteSession(idx) {
        var title = sessions[idx].topic || sessions[idx].title || "الجلسة";
        editorConfirm({
          title: "حذف الجلسة؟",
          body: "أنت على وشك حذف: <strong>" + title + "</strong>. لا يمكن التراجع عن هذا الإجراء.",
          okLabel: "حذف الجلسة",
          cancelLabel: "إلغاء",
          danger: true
        }).then(function(ok) {
          if (ok) {
            var existingId = sessions[idx].id;
            if (existingId) {
              authFetch("/api/sessions/" + existingId, { method: "DELETE" }).catch(function() {});
            }
            sessions.splice(idx, 1);
            renderSessions();
            showEditorToast("تم حذف الجلسة.", "success");
          }
        });
      }

      // ── Session ↔ materials linking (drawer tab 3) ──
      function loadSessionMaterials(sessionId) {
        authFetch("/api/sessions/" + sessionId + "/materials")
          .then(function (r) { return r.ok ? r.json() : []; })
          .then(function (list) { linkedMaterials = list || []; renderLinkedMaterials(); renderPicker(); })
          .catch(function () { linkedMaterials = []; renderLinkedMaterials(); });
        var courseId = document.getElementById("courseSelect").value;
        authFetch("/api/materials/" + courseId)
          .then(function (r) { return r.ok ? r.json() : []; })
          .then(function (list) { courseMaterials = list || []; renderPicker(); })
          .catch(function () { courseMaterials = []; });
      }

      function renderLinkedMaterials() {
        var el = document.getElementById("sdLinkedList");
        if (!el) return;
        if (!linkedMaterials.length) {
          el.innerHTML = '<p style="font-size:.82rem;color:var(--text-subtle);padding:.5rem 0;">لا توجد مواد مرتبطة بهذه الجلسة بعد.</p>';
          return;
        }
        el.innerHTML = linkedMaterials.map(function (m) {
          return '<div class="sd-mat-row">' +
            '<span class="sd-mat-row__name" title="' + (m.file_name || '') + '">' + (m.file_name || 'ملف') + '</span>' +
            '<span class="sd-mat-row__cat">' + (CAT_LABELS[m.category] || m.category || '') + '</span>' +
            '<button type="button" class="btn btn--danger btn--sm" onclick="unlinkMaterial(' + m.id + ')">إزالة</button>' +
            '</div>';
        }).join("");
      }

      function openMaterialPicker() { document.getElementById("sdPicker").style.display = "block"; renderPicker(); }
      function closeMaterialPicker() { document.getElementById("sdPicker").style.display = "none"; }

      function uploadSessionMaterial(event) {
        var file = event.target.files[0];
        if (!file) return;
        event.target.value = ""; // reset

        var sess = sessions[editingIdx];
        var sid = sess && sess.id;
        var courseId = document.getElementById("courseSelect").value;
        if (!sid || !courseId) return;

        var btn = document.getElementById("sessionUploadBtn");
        var origText = btn.textContent;
        btn.textContent = "جاري الرفع...";
        btn.disabled = true;

        var formData = new FormData();
        formData.append("file", file);
        formData.append("course_id", courseId);
        formData.append("category", "supporting");

        var token = localStorage.getItem(EDITOR_TOKEN_KEY);
        var headers = {};
        if (token) headers["Authorization"] = "Bearer " + token;

        fetch("/api/materials", {
          method: "POST",
          headers: headers,
          body: formData
        })
        .then(function(r) { return r.ok ? r.json() : Promise.reject(r); })
        .then(function(data) {
          if (!data || !data.id) throw new Error();
          var mid = data.id;
          return authFetch("/api/sessions/" + sid + "/materials", {
            method: "POST",
            body: JSON.stringify({ material_id: mid })
          });
        })
        .then(function() {
          showEditorToast("تم رفع وربط المادة بنجاح.", "success");
          loadSessionMaterials(sid);
        })
        .catch(function(err) {
          console.error(err);
          showEditorToast("فشل رفع المادة. قد يكون الملف كبيراً جداً أو بصيغة غير مدعومة.", "error");
        })
        .finally(function() {
          btn.textContent = origText;
          btn.disabled = false;
        });
      }

      function typeGroup(ext) {
        ext = (ext || "").toLowerCase();
        if (["doc", "docx"].indexOf(ext) >= 0) return "doc";
        if (["ppt", "pptx"].indexOf(ext) >= 0) return "ppt";
        if (["xls", "xlsx"].indexOf(ext) >= 0) return "xls";
        if (["jpg", "jpeg", "png", "gif", "webp"].indexOf(ext) >= 0) return "image";
        if (["mp4", "avi", "mov", "mkv"].indexOf(ext) >= 0) return "video";
        return ext;
      }

      function renderPicker() {
        var el = document.getElementById("sdPickList");
        if (!el) return;
        var q = (document.getElementById("sdSearch").value || "").toLowerCase();
        var cat = document.getElementById("sdCatFilter").value;
        var typ = document.getElementById("sdTypeFilter").value;
        var linkFilter = document.getElementById("sdLinkFilter").value;
        var linkedIds = {};
        linkedMaterials.forEach(function (m) { linkedIds[m.id] = true; });
        var rows = courseMaterials.filter(function (m) {
          if (q && (m.file_name || "").toLowerCase().indexOf(q) < 0) return false;
          if (cat && m.category !== cat) return false;
          if (typ && typeGroup(m.file_type) !== typ) return false;
          var isLinked = !!linkedIds[m.id];
          if (linkFilter === "linked" && !isLinked) return false;
          if (linkFilter === "unlinked" && isLinked) return false;
          return true;
        });
        if (!rows.length) { el.innerHTML = '<p style="font-size:.8rem;color:var(--text-subtle);padding:.5rem;">لا توجد مواد مطابقة.</p>'; return; }
        el.innerHTML = rows.map(function (m) {
          var isLinked = !!linkedIds[m.id];
          return '<label class="sd-pick-item">' +
            '<input type="checkbox" value="' + m.id + '" ' + (isLinked ? "checked disabled" : "") + '>' +
            '<span class="sd-mat-row__name">' + (m.file_name || 'ملف') + '</span>' +
            '<span class="sd-mat-row__cat">' + (CAT_LABELS[m.category] || m.category || '') + '</span>' +
            (isLinked ? '<span style="font-size:.68rem;color:#34d399;flex-shrink:0;">مرتبطة</span>' : '') +
            '</label>';
        }).join("");
      }

      function linkSelected() {
        var sess = sessions[editingIdx];
        var sid = sess && sess.id;
        if (!sid) return;
        var checks = [].slice.call(document.querySelectorAll("#sdPickList input:checked:not(:disabled)"));
        if (!checks.length) { showEditorToast("لم يتم اختيار مواد.", "error"); return; }
        var ids = checks.map(function (c) { return parseInt(c.value); });
        var done = 0;
        ids.forEach(function (mid) {
          authFetch("/api/sessions/" + sid + "/materials", { method: "POST", body: JSON.stringify({ material_id: mid }) })
            .then(function () { done++; if (done === ids.length) { loadSessionMaterials(sid); closeMaterialPicker(); showEditorToast("تم ربط " + ids.length + " مادة.", "success"); } })
            .catch(function () { done++; });
        });
      }

      function unlinkMaterial(materialId) {
        var sess = sessions[editingIdx];
        var sid = sess && sess.id;
        if (!sid) return;
        authFetch("/api/sessions/" + sid + "/materials/" + materialId, { method: "DELETE" })
          .then(function () { loadSessionMaterials(sid); showEditorToast("تم إلغاء ربط المادة.", "success"); })
          .catch(function () {});
      }

      // Close modal on Escape only when it is open
      document.addEventListener("keydown", function(e) {
        if (e.key === "Escape" && document.getElementById("sessionModal").style.display === "flex") closeSessionModal();
      });
    </script>
  </body>
</html>
