<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script src="/common/js/theme.js"></script>
    <link rel="stylesheet" href="/common/css/theme.css?v=4" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الدورات - بوابة المحرر</title>
    <link rel="stylesheet" href="editor.css?v=3" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="js/editor-guard.js?v=2"></script>
  </head>
  <body data-page="courses">
    <a href="#main-content" class="skip-to-main">انتقل إلى المحتوى الرئيسي</a>
    <div id="editorSidebar"></div>

    <main id="main-content" class="editor-main">
      <div class="editor-page-header" style="display: flex; justify-content: space-between; align-items: flex-start;">
        <div>
          <h1 class="editor-page-header__title">الدورات التعليمية</h1>
          <p class="editor-page-header__sub">إدارة وتحرير الدورات — مسودة / منشورة / مؤرشفة</p>
        </div>
        <a href="editor-course-form.html" class="btn btn--primary" style="margin-top: 0.5rem;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          إنشاء دورة جديدة
        </a>
      </div>

      <div id="pageBanner" class="editor-banner editor-banner--error" style="display:none;" role="alert">
        <span id="pageBannerText"></span>
        <button type="button" onclick="loadCourses()" style="margin-right:auto;background:none;border:none;cursor:pointer;color:inherit;font-weight:700;font-size:0.82rem;">إعادة المحاولة</button>
      </div>

      <!-- Tabs -->
      <div class="editor-tabs" id="statusTabs">
        <a href="#" class="editor-tab active" data-status="" onclick="setTabFilter('', event)">الكل <span class="editor-tab-count" id="countAll">0</span></a>
        <a href="#" class="editor-tab" data-status="draft" onclick="setTabFilter('draft', event)">مسودات <span class="editor-tab-count" id="countDraft">0</span></a>
        <a href="#" class="editor-tab" data-status="published" onclick="setTabFilter('published', event)">منشورة <span class="editor-tab-count" id="countPublished">0</span></a>
        <a href="#" class="editor-tab" data-status="archived" onclick="setTabFilter('archived', event)">مؤرشفة <span class="editor-tab-count" id="countArchived">0</span></a>
      </div>

      <!-- Filters row -->
      <div class="editor-filters" style="justify-content: flex-start; gap: 1rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1rem;">
        <div class="editor-search" style="margin-left: auto;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/></svg>
          <input type="text" id="searchInput" placeholder="البحث بالاسم..." oninput="filterCourses()" />
        </div>
      </div>

      <!-- States -->
      <div id="loadingState" class="editor-state">
        <div class="editor-state__icon" id="_loadIcon"></div>
        <div class="editor-state__title">جاري تحميل الدورات...</div>
      </div>
      <div id="emptyState" class="editor-state" style="display:none;">
        <div class="editor-state__icon" id="_stateIcon"></div>
        <div class="editor-state__title">لا توجد دورات</div>
        <div class="editor-state__text">جرّب تغيير الفلتر أو البحث. أو أنشئ أول دورة الآن.</div>
        <a href="editor-course-form.html" class="btn btn--primary">إنشاء دورة جديدة</a>
      </div>

      <!-- Grid -->
      <div class="editor-cards-grid" id="coursesGrid" style="display:none;"></div>
    </main>

    <div id="editorToastContainer" class="editor-toast-container"></div>
    <script src="js/editor-layout.js?v=7"></script>
    <script src="js/icons.js"></script>
    <script>document.getElementById('_stateIcon').innerHTML = NTAIcons('books', 36);</script>
    <script>document.getElementById('_loadIcon').innerHTML = NTAIcons('sparkles', 36);</script>
    <script>
      var EDITOR_TOKEN_KEY = "editor_token";
      var allCourses = [];

      function authFetch(url, opts) {
        opts = opts || {};
        var token = localStorage.getItem(EDITOR_TOKEN_KEY);
        var headers = Object.assign({"Content-Type":"application/json"}, opts.headers || {});
        if (token) headers["Authorization"] = "Bearer " + token;
        return fetch(url, Object.assign({}, opts, {headers: headers}));
      }

      var currentStatusFilter = "";

      function setTabFilter(status, evt) {
        if (evt) evt.preventDefault();
        currentStatusFilter = status;
        document.querySelectorAll(".editor-tab").forEach(function(el) {
          el.classList.toggle("active", el.dataset.status === status);
        });
        filterCourses();
      }

      function updateTabCounts() {
        var draft = 0, pub = 0, arch = 0;
        allCourses.forEach(function(c) {
          var s = c.status || "draft";
          if (s === "draft") draft++;
          else if (s === "published") pub++;
          else if (s === "archived") arch++;
        });
        document.getElementById("countAll").textContent = allCourses.length;
        document.getElementById("countDraft").textContent = draft;
        document.getElementById("countPublished").textContent = pub;
        document.getElementById("countArchived").textContent = arch;
        
        document.querySelectorAll(".editor-tab").forEach(function(el) {
          el.classList.toggle("active", el.dataset.status === currentStatusFilter);
        });
      }

      // Pre-select filter from URL param
      (function() {
        var params = new URLSearchParams(window.location.search);
        var s = params.get("status");
        if (s) {
          currentStatusFilter = s;
        }
      })();

      function statusBadge(status) {
        var map = { draft:["مسودة","draft"], published:["منشورة","published"], archived:["مؤرشفة","archived"] };
        var s = map[status] || [status,"draft"];
        return '<span class="editor-course-card__badge editor-course-card__badge--'+s[1]+'">'+s[0]+'</span>';
      }

      function renderCourses(list) {
        var grid = document.getElementById("coursesGrid");
        var empty = document.getElementById("emptyState");
        if (!list.length) {
          grid.style.display = "none";
          empty.style.display = "flex";
          return;
        }
        empty.style.display = "none";
        var html = "";
        list.forEach(function(c) {
          html += '<div class="editor-course-card">';
          var coverStyle = 'width:100%;height:140px;border-radius:12px;margin-bottom:0.85rem;background-size:cover;background-position:center;background-color:rgba(255,255,255,0.04);border:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:center;';
          if (c.image_url) {
            html += '<div class="editor-course-card__cover" style="'+coverStyle+'background-image:url(\''+String(c.image_url).replace(/'/g,"%27")+'\')"></div>';
          } else {
            html += '<div class="editor-course-card__cover" style="'+coverStyle+'background-image:url(\'/images/course-placeholder.svg\')"></div>';
          }
          html += '<h3 class="editor-course-card__title">'+(c.title_ar||c.title||"بدون عنوان")+'</h3>';
          html += '<div class="editor-course-card__meta">'+statusBadge(c.status||"draft")+'</div>';
          html += '<div class="editor-course-card__stats" style="flex-direction:column; gap:0.4rem; margin-bottom: 0.5rem;">';
          if(c.duration_weeks) html += '<span>'+c.duration_weeks+' أسابيع • '+(c.total_sessions||0)+' جلسة</span>';
          if((c.status || "draft") === "draft") html += '<span style="color:#fca5a5;">ناقص: المواد التعليمية</span>';
          html += '</div>';
          var status = c.status || "draft";
          html += '<div class="editor-course-card__actions" style="justify-content: space-between; align-items: center;">';
          
          html += '<div style="display:flex; gap:0.5rem;">';
          html += '<a href="editor-course-form.html?id='+c.id+'" class="btn btn--primary btn--sm">متابعة</a>';
          if(status !== "published" && status !== "archived") html += '<button type="button" class="btn btn--secondary btn--sm" onclick="publishCourse('+c.id+')">نشر</button>';
          html += '</div>';

          // More actions menu
          html += '<div class="ui-menu">';
          html += '<button type="button" class="ui-menu__trigger">المزيد ▾</button>';
          html += '<div class="ui-menu__content" hidden>';
          html += '<a href="editor-preview.html?id='+c.id+'" class="ui-menu__item">معاينة</a>';
          if(status === "archived") html += '<button type="button" class="ui-menu__item" onclick="unarchiveCourse('+c.id+')">إلغاء الأرشفة</button>';
          else html += '<button type="button" class="ui-menu__item" onclick="archiveCourse('+c.id+')">أرشفة</button>';
          html += '<button type="button" class="ui-menu__item is-danger" onclick="deleteCourse('+c.id+')">حذف</button>';
          html += '</div></div>';

          html += '</div></div>';
        });
        grid.innerHTML = html;
        grid.style.display = "grid";
        if (window.initUIMenus) window.initUIMenus(grid);
      }

      function setCourseStatus(id, newStatus) {
        return authFetch("/api/courses/" + id)
          .then(function(r) { return r.ok ? r.json() : Promise.reject("load failed"); })
          .then(function(course) {
            course.status = newStatus;
            return authFetch("/api/courses/" + id, { method: "PUT", body: JSON.stringify(course) });
          })
          .then(function(r) { return r.ok ? r.json() : r.json().then(function(e) { throw new Error(e.detail || "فشل العملية"); }); });
      }

      function publishCourse(id) {
        setCourseStatus(id, "published")
          .then(function() { window.location.href = "editor-final.html?action=published&id=" + id; })
          .catch(function(err) { showEditorToast(typeof err === "string" ? err : (err.message || "فشل النشر"), "error"); });
      }

      function archiveCourse(id) {
        editorConfirm({
          title: "أرشفة الدورة؟",
          body: "ستُنقل الدورة إلى الأرشيف ولن تظهر للمتدربين. يمكنك إلغاء الأرشفة لاحقاً.",
          okLabel: "أرشفة",
          cancelLabel: "إلغاء"
        }).then(function(ok) {
          if (!ok) return;
          setCourseStatus(id, "archived")
            .then(function() { window.location.href = "editor-final.html?action=archived&id=" + id; })
            .catch(function(err) { showEditorToast(typeof err === "string" ? err : (err.message || "فشل الأرشفة"), "error"); });
        });
      }

      function unarchiveCourse(id) {
        setCourseStatus(id, "draft")
          .then(function() {
            showEditorToast("تم إلغاء أرشفة الدورة. أصبحت الآن مسودة.", "success");
            loadCourses();
          })
          .catch(function(err) { showEditorToast(typeof err === "string" ? err : (err.message || "فشل العملية"), "error"); });
      }

      function deleteCourse(id) {
        var course = allCourses.filter(function(c){ return c.id === id; })[0];
        var name = course ? (course.title_ar || course.title || "هذه الدورة") : "هذه الدورة";
        editorConfirm({
          title: "حذف الدورة؟",
          body: "سيتم حذف <strong>" + name + "</strong> وكل جلساتها واختباراتها نهائياً. لا يمكن التراجع.",
          okLabel: "حذف نهائي",
          cancelLabel: "إلغاء",
          danger: true
        }).then(function(ok) {
          if (!ok) return;
          authFetch("/api/courses/" + id, { method: "DELETE" })
            .then(function(r) { return r.ok ? r.json() : r.json().then(function(e) { throw new Error(e.detail || "فشل الحذف"); }); })
            .then(function() {
              showEditorToast("تم حذف الدورة.", "success");
              loadCourses();
            })
            .catch(function(err) { showEditorToast(typeof err === "string" ? err : (err.message || "فشل الحذف"), "error"); });
        });
      }

      function filterCourses() {
        var q = (document.getElementById("searchInput").value || "").trim().toLowerCase();
        var s = currentStatusFilter;
        var filtered = allCourses.filter(function(c) {
          var title = (c.title_ar || c.title || "").toLowerCase();
          var matchQ = !q || title.includes(q);
          var matchS = !s || (c.status || "draft") === s;
          return matchQ && matchS;
        });
        renderCourses(filtered);
      }

      function loadCourses() {
        document.getElementById("pageBanner").style.display = "none";
        document.getElementById("loadingState").style.display = "flex";
        document.getElementById("coursesGrid").style.display = "none";
        document.getElementById("emptyState").style.display = "none";

        authFetch("/api/courses")
          .then(function(r) { if(!r.ok) throw new Error("فشل التحميل"); return r.json(); })
          .then(function(data) {
            allCourses = data;
            document.getElementById("loadingState").style.display = "none";
            updateTabCounts();
            filterCourses();
          })
          .catch(function(err) {
            document.getElementById("loadingState").style.display = "none";
            document.getElementById("pageBanner").style.display = "flex";
            document.getElementById("pageBannerText").textContent = "تعذّر تحميل الدورات. " + (err.message||"");
          });
      }

      loadCourses();
    </script>
  </body>
</html>
