            const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return (
                <i data-lucide={name} className={className} style={{ width: size, height: size, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}></i>
            );
        };

        const LogChart = ({ type, data, options, theme, className = "" }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (canvasRef.current && data) {
                    if (chartRef.current) {
                        chartRef.current.destroy();
                    }
                    const ctx = canvasRef.current.getContext('2d');
                    
                    const isDark = theme === 'dark';
                    const textColor = isDark ? '#94a3b8' : '#475569';
                    const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';

                    chartRef.current = new Chart(ctx, {
                        type,
                        data,
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    display: true,
                                    position: 'bottom',
                                    labels: { 
                                        color: textColor,
                                        font: { size: 10, weight: 'bold' },
                                        padding: 20
                                    }
                                },
                                tooltip: {
                                    backgroundColor: isDark ? 'rgba(15, 23, 42, 0.9)' : 'rgba(255, 255, 255, 0.9)',
                                    titleColor: isDark ? '#f8fafc' : '#0f172a',
                                    bodyColor: isDark ? '#94a3b8' : '#475569',
                                    borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)',
                                    borderWidth: 1,
                                    padding: 12,
                                    cornerRadius: 12,
                                    displayColors: true
                                }
                            },
                            scales: {
                                y: { 
                                    grid: { color: gridColor }, 
                                    ticks: { color: textColor, font: { size: 10 } } 
                                },
                                x: { 
                                    grid: { display: false }, 
                                    ticks: { color: textColor, font: { size: 10 } } 
                                }
                            },
                            ...options
                        }
                    });
                }
                return () => {
                    if (chartRef.current) chartRef.current.destroy();
                };
            }, [data, theme]);

            return <div className={className}><canvas ref={canvasRef}></canvas></div>;
        };

            const fetchQuizOverrides = async (quizId) => {
                if (!quizId) return;
                try {
                    const headers = { 'Authorization': `Bearer ${localStorage.getItem('superadmin_token')}` };
                    const resp = await fetch(`/api/ai/quiz/overrides/${quizId}`, { headers });
                    if (resp.ok) {
                        const data = await resp.json();
                        setQuizOverrides(data.overrides || []);
                    }
                } catch (err) {
                    console.error("Failed to fetch quiz overrides", err);
                }
            };

            const handleApplyOverride = async () => {
                if (!selectedQuizForOverride || !overrideTraineeId || !overrideDeadline) return;

                try {
                    const headers = {
                        'Authorization': `Bearer ${localStorage.getItem('superadmin_token')}`,
                        'Content-Type': 'application/json'
                    };
                    const resp = await fetch('/api/ai/quiz/override-trainee-access', {
                        method: 'POST',
                        headers,
                        body: JSON.stringify({
                            quiz_id: selectedQuizForOverride.id,
                            trainee_id: overrideTraineeId,
                            new_end_time: overrideDeadline,
                            reason: "Extended by Super Admin via Control Center"
                        })
                    });

                    if (resp.ok) {
                        addLog(`Override granted for Trainee #${overrideTraineeId}.`, 'success');
                        setOverrideTraineeId('');
                        setOverrideDeadline('');
                        fetchQuizOverrides(selectedQuizForOverride.id);
                    } else {
                        const err = await resp.json();
                        addLog(`Failed to grant override: ${err.detail || 'Unknown error'}`, 'error');
                    }
                } catch (err) {
                    addLog('Connection error during override application.', 'error');
                }
            };

            const handleGenerateMatrix = async () => {
                if (!selectedCourse) return;
                setMatrixJobStatus('processing');
                setMatrixJobError(null);
                setMatrixJobCourse(selectedCourse);
                addLog(`Dispatching Matrix Generation for Course #${selectedCourse}...`, 'dispatch');

                // Trigger generation via the dedicated Class Trainer Matrix handler (returns immediately)
                await simulateDispatch('Class Trainer Matrix', '/generate', { course_id: parseInt(selectedCourse) });

                // Poll for completion
                const pollInterval = setInterval(async () => {
                    try {
                        const resp = await fetch(`/api/ai/matrix-status/${selectedCourse}`, {
                            headers: { 'Authorization': `Bearer ${localStorage.getItem('superadmin_token')}` }
                        });
                        if (!resp.ok) return;
                        const data = await resp.json();
                        if (data.status === 'done') {
                            clearInterval(pollInterval);
                            setMatrixJobStatus('done');
                            addLog(`Matrix generation complete for Course #${selectedCourse}! ${data.result?.assignments_count || 0} assignments created.`, 'success');
                        } else if (data.status === 'error') {
                            clearInterval(pollInterval);
                            setMatrixJobStatus('error');
                            setMatrixJobError(data.error || 'Unknown error');
                            addLog(`Matrix generation FAILED: ${data.error}`, 'webhook');
                        }
                    } catch (e) { /* keep polling */ }
                }, 3000);
            };

            const logEndRef = useRef(null);
            const totalQuestions = quizEntries.reduce((sum, entry) => sum + (parseInt(entry.count) || 0), 0);
            const isTargetMet = totalQuestions === 20;

            const addQuizEntry = () => {
                setQuizEntries([...quizEntries, { id: Date.now(), sourceSessionId: '', type: 'mcq', count: 5, difficulty: 'medium', materials: [] }]);
            };

            const removeQuizEntry = (id) => {
                if (quizEntries.length > 1) {
                    setQuizEntries(quizEntries.filter(e => e.id !== id));
                }
            };

            const updateQuizEntry = (id, field, value) => {
                setQuizEntries(quizEntries.map(e => {
                    if (e.id === id) {
                        const updated = { ...e, [field]: value };
                        if (field === 'sourceSessionId') {
                            const session = sessions.find(s => String(s.id) === String(value));
                            let defaultMats = [];
                            if (session && session.materials) {
                                try {
                                    const mats = JSON.parse(session.materials);
                                    if (Array.isArray(mats)) {
                                        mats.forEach(m => {
                                            const p = m.filename || m.file_path || m.path;
                                            if (p) defaultMats.push(p);
                                        });
                                    } else if (mats && typeof mats === 'object') {
                                        const p = mats.file_path || mats.filename || mats.path;
                                        if (p) defaultMats.push(p);
                                    } else if (typeof mats === 'string') {
                                        defaultMats.push(mats);
                                    }
                                } catch (err) {}
                            }
                            if (defaultMats.length === 0) {
                                defaultMats = ["DUMMY_COURSE_GUIDE_V2.pdf"];
                            }
                            updated.materials = defaultMats;
                        }
                        return updated;
                    }
                    return e;
                }));
            };

            useEffect(() => {

                const pulse = setInterval(async () => {

                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        if (resp.ok) setHeartbeatStatus('online');
                        else setHeartbeatStatus('reconnecting');

                        setHeartbeatStatus('offline');
                    }
                }, 30000);
                return () => clearInterval(pulse);
            }, [isLoggedIn, token]);

            const fetchDashboardData = async () => {
                try {
                    const headers = { 'Authorization': `Bearer ${localStorage.getItem('superadmin_token')}` };

                    // Helper to handle unauthorized responses
                    const handleResp = async (resp) => {
                        if (resp.status === 401) {
                            addLog(lang === 'ar' ? 'انتهت الجلسة. جارٍ التحويل إلى صفحة الدخول...' : 'Session expired. Redirecting to login...', 'error');
                            setIsLoggedIn(false);
                            setToken(null);
                            localStorage.removeItem('superadmin_token');
                            return null;
                        }
                        return resp.ok ? await resp.json() : null;
                    };

                    // Fetch Stats
                    const statsResp = await fetch('/api/stats/overview', { headers });
                    const statsData = await handleResp(statsResp);
                    if (statsData) setStats(statsData);

                    // Fetch Files
                    const filesResp = await fetch('/api/stats/files', { headers });
                    const filesData = await handleResp(filesResp);
                    if (filesData) setAvailableFiles(filesData.files);

                    // Fetch Config
                    const configResp = await fetch('/api/stats/config', { headers });
                    const configData = await handleResp(configResp);
                    if (configData) setConfig(configData);

                    // Fetch Health
                    const healthResp = await fetch('/api/ai/health', { headers });
                    const healthData = await handleResp(healthResp);
                    if (healthData) {
                        setServiceHealth(healthData);
                        const offlineServices = Object.entries(healthData).filter(([_, status]) => status !== 'online');
                        if (offlineServices.length > 0) {
                            addLog(lang === 'ar' ? `تنبيه خدمة: عدد ${offlineServices.length} من عقد الذكاء الاصطناعي غير متاحة.` : `Service Alert: ${offlineServices.length} AI nodes are offline.`, 'error');
                        } else {
                            addLog(lang === 'ar' ? 'حالة النظام: جميع خدمات الذكاء الاصطناعي تعمل بشكل طبيعي.' : 'System Health: All AI microservices are responsive.', 'success');
                        }
                    }

                    // Fetch Courses
                    const coursesResp = await fetch('/api/stats/courses', { headers });
                    const coursesData = await handleResp(coursesResp);
                    if (coursesData) setCourses(coursesData.courses);

                    // Fetch Activity Stats
                    const logStatsResp = await fetch('/api/logs/stats', { headers });
                    const logStatsData = await handleResp(logStatsResp);
                    if (logStatsData) setActivityStats(logStatsData);

                    // Fetch Recent Activity Logs
                    const activityLogsResp = await fetch('/api/logs/activity?limit=10', { headers });
                    const activityLogsData = await handleResp(activityLogsResp);
                    if (activityLogsData) setRecentActivityLogs(activityLogsData.logs);

                    // Fetch Notifications
                    const notificationsResp = await fetch('/api/logs/notifications', { headers });
                    const notificationsData = await handleResp(notificationsResp);
                    if (notificationsData) setNotifications(notificationsData);

                    // Fetch Alerts
                    const alertsResp = await fetch('/api/alerts/', { headers });
                    const alertsData = await handleResp(alertsResp);
                    if (alertsData) setSystemAlerts(alertsData);

                    // Fetch Trainees
                    const traineesResp = await fetch('/api/stats/trainees', { headers });
                    const traineesData = await handleResp(traineesResp);
                    if (traineesData) setTraineesList(traineesData);

                    addLog(lang === 'ar' ? 'خطأ في المزامنة: تعذر الوصول إلى سجل خدمات الخلفية.' : 'Sync Error: Failed to reach backend service registry.', 'error');
                }
            };

            const fetchManagementUsers = async () => {
                try {
                    const resp = await fetch('/api/management/users', {
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('superadmin_token')}` }
                    });
                    if (resp.ok) {
                        const data = await resp.json();
                        setManagementUsers(data);
                    } else {
                        const err = await resp.json().catch(() => ({ detail: 'Unknown error' }));
                        addLog(lang === 'ar' ? `تعذر جلب مستخدمي الإدارة: ${err.detail}` : `Failed to fetch management users: ${err.detail}`, 'error');
                    }
                } catch (err) {
                    console.error("Failed to fetch management users", err);
                }
            };

            const handleDeleteManagementUser = async (userId) => {
                if (!confirm(lang === 'ar' ? 'هل تريد حذف هذا المستخدم؟ سيُفقد الوصول فورًا.' : 'Are you sure you want to delete this user? They will lose all access immediately.')) return;
                try {
                    const resp = await fetch(`/api/management/users/${userId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('superadmin_token')}` }
                    });
                    if (resp.ok) {
                        addLog(lang === 'ar' ? 'تم حذف المستخدم الإداري بنجاح.' : 'Administrative user removed successfully.', 'success');
                        fetchManagementUsers();
                    } else {
                        const err = await resp.json();
                        addLog(lang === 'ar' ? `فشل حذف المستخدم: ${err.detail || 'خطأ غير معروف'}` : `Failed to delete user: ${err.detail || 'Unknown error'}`, 'error');
                    }
                } catch (err) {
                    addLog(lang === 'ar' ? 'خطأ في الاتصال أثناء حذف المستخدم.' : 'Connection error during user deletion.', 'error');
                }
            };

            const fetchSessions = async (courseId) => {
                if (!courseId) return;
                try {
                    const headers = { 'Authorization': `Bearer ${localStorage.getItem('superadmin_token')}` };
                    const resp = await fetch(`/api/stats/sessions/${courseId}`, { headers });
                    if (resp.ok) {
                        const data = await resp.json();
                        setSessions(data.sessions);
                    }
                } catch (err) {
                    console.error("Failed to fetch sessions", err);
                }
            };

            useEffect(() => {
                if (selectedCourse) {
                    fetchSessions(selectedCourse);

                    setQuizEntries([{ id: Date.now(), sourceSessionId: '', type: 'mcq', count: 5, materials: [] }]);
                }

                logEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [logs]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
                if (activeTab === 'management' && isLoggedIn) {
                    fetchManagementUsers();
                }
            }, [activeTab, isLoggedIn, serviceHealth]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError('');
                try {
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: loginData.user, password: loginData.pass })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        localStorage.setItem('superadmin_token', data.access_token);
                        setToken(data.access_token);
                        setIsLoggedIn(true);
                        addLog(lang === 'ar' ? 'تم إنشاء جلسة المسؤول العام بنجاح باستخدام JWT آمن.' : 'Super Admin session established with secure JWT.', 'success');
                        fetchDashboardData();
                    } else {
                        const errData = await response.json().catch(() => ({ detail: 'Authentication failed' }));
                        setLoginError(errData.detail || 'Invalid email or password');
                    }
                } catch (err) {
                    setLoginError(lang === 'ar' ? 'خطأ في الاتصال بلوحة التحكم. فشل التحقق.' : 'Console connection error. Verification failed.');
                }
            };

            const addLog = (msg, type = 'dispatch') => {
                const time = new Date().toLocaleTimeString();
                setLogs(prev => [...prev, { id: Date.now(), time, type, msg }]);
            };

            // --- Batch Status Polling ---
            useEffect(() => {
                let interval;
                if (activeTab === 'ai-requirement-analyzer' && isLoggedIn) {
                    const fetchBatchStatus = async () => {
                        try {
                            const h = { 'Authorization': `Bearer ${localStorage.getItem('superadmin_token')}` };
                            const res = await fetch('/api/ai/batch-status', { headers: h });
                            if (res.ok) {
                                const data = await res.json();
                                setBatchStatus(data);
                                if (!data.is_running && batchStatus.is_running) {
                                    fetchDashboardData();
                                }
                            }
                        } catch (err) { }
                    };
                    fetchBatchStatus();
                    interval = setInterval(fetchBatchStatus, 2000);
                }
                return () => clearInterval(interval);
            }, [activeTab, batchStatus.is_running, isLoggedIn]);

            const simulateDispatch = async (serviceName, endpoint, dataPayload) => {
                setIsProcessing(serviceName);
                const timeStr = new Date().toLocaleTimeString();
                addLog(`Dispatching encrypted payload to ${endpoint}...`, 'dispatch');

                try {
                    const response = await fetch('/api/ai/dispatch', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            service: serviceName,
                            endpoint: endpoint,
                            data: dataPayload
                        })
                    });

                    const responseData = await response.json();

                    setWireLogs(prev => [{
                        id: Date.now(),
                        time: timeStr,
                        service: serviceName,
                        endpoint: endpoint,
                        input: JSON.stringify(dataPayload, null, 2),
                        output: JSON.stringify(responseData, null, 2)
                    }, ...prev]);

                    if (response.ok) {
                        addLog(lang === 'ar' ? `نجاح: تم استلام الاستجابة النهائية من ${serviceName}.` : `SUCCESS: ${serviceName} downstream response received.`, 'success');
                        setIsProcessing(null);
                        return true;
                    } else {
                        addLog(`ERROR: ${serviceName} returned status ${response.status}.`, 'webhook');
                        setIsProcessing(null);
                        return false;
                    }
                } catch (err) {
                    addLog(lang === 'ar' ? 'حرج: انتهت مهلة نفق البروكسي أو حدث خطأ في الجلب.' : 'CRITICAL: Proxy tunnel timeout or fetch error.', 'webhook');
                    setIsProcessing(null);
                    return false;
                }
            };

            const startSequentialQuizGeneration = async () => {
                if (!isTargetMet || !selectedCourse || !targetSessionId) return;

                const gid = `GR_QUIZ_${Date.now()}`;
                setGroupingId(gid);
                setIsProcessing('Quiz Engine');
                setGeneratedQuiz(null);

                addLog(lang === 'ar' ? `بدء دفعة توليد متسلسلة: ${gid}` : `Initiating Sequential Generation Batch: ${gid}`, 'system');
                let allQuestions = [];

                try {
                    for (let i = 0; i < quizEntries.length; i++) {
                        setActiveEntryIdx(i);
                        const entry = quizEntries[i];
                        addLog(lang === 'ar' ? `جارٍ معالجة المدخل ${i + 1} من ${quizEntries.length}...` : `Processing Entry ${i + 1} of ${quizEntries.length}...`, 'dispatch');

                        const payload = {
                            course_id: selectedCourse,
                            target_session_id: targetSessionId,
                            source_session_id: entry.sourceSessionId,
                            type: entry.type,
                            difficulty: entry.difficulty,
                            count: entry.count,
                            materials: entry.materials,
                            groupId: gid,
                            is_last: i === quizEntries.length - 1,
                            courseName: courses.find(c => String(c.id) === String(selectedCourse))?.title
                        };

                        const response = await fetch('/api/ai/dispatch', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify({
                                service: 'Quiz Engine',
                                endpoint: '/generate-quiz',
                                duration_hours: parseInt(quizDuration),
                                data: payload
                            })
                        });

                        const responseData = await response.json();
                        if (response.ok) {
                            allQuestions = [...allQuestions, ...(responseData.questions || [])];
                            addLog(lang === 'ar' ? `تمت معالجة المدخل ${i + 1} بنجاح.` : `Entry ${i + 1} SUCCESS.`, 'success');
                        } else {
                            const errorDetail = responseData.detail || "Unknown AI Service Error";
                            addLog(lang === 'ar' ? `حرج: توقفت السلسلة عند المدخل ${i + 1}. الخطأ: ${errorDetail}` : `CRITICAL: Sequence aborted at entry ${i + 1}. Error: ${errorDetail}`, 'error');
                            alert(lang === 'ar' ? `خطأ في إرسال الذكاء الاصطناعي عند المدخل ${i + 1}: ${errorDetail}` : `AI Dispatch Error at entry ${i + 1}: ${errorDetail}`);
                            return;
                        }
                    }

                    if (allQuestions.length > 0) {
                        setGeneratedQuiz({ questions: allQuestions });
                        setShowPreview(true);
                        addLog(lang === 'ar' ? `اكتملت المعالجة الدُفعية للمعرّف: ${gid}` : `Batch Process Completed for ID: ${gid}`, 'success');
                    } else {
                        addLog(lang === 'ar' ? 'تحذير: انتهت عملية التوليد لكن لم يتم إرجاع أي أسئلة.' : 'WARNING: Generation finished but no questions were returned.', 'error');
                        alert(lang === 'ar' ? 'خطأ في الذكاء الاصطناعي: لم يُرجع المولد أي أسئلة. يُرجى مراجعة المواد أو الجلسات المصدر.' : 'AI Error: The generator returned no questions. Please check your materials or source sessions.');
                    }
                } catch (err) {
                    addLog(lang === 'ar' ? `حرج: فشل التوليد: ${err.message}` : `CRITICAL: Generation failed: ${err.message}`, 'error');
                } finally {
                    setIsProcessing(null);
                    setActiveEntryIdx(null);
                }
            };

            const GenerationOverlay = () => (

                        <div className="w-16 h-16 bg-[var(--status-indigo-bg)] rounded-full flex items-center justify-center mb-6 relative">
                            <Icon name="brain" size={32} className="text-[var(--status-indigo)]" />
                            <div className="absolute inset-0 border-2 border-indigo-500/30 border-t-indigo-500 rounded-full animate-spin" />
                        </div>
                        <h3 className="text-lg font-bold text-[var(--text-main)] mb-2">{t('aiThinking')}</h3>
                        <p className="text-xs text-[var(--text-muted)] mb-6">{t('processingEntry')} <span className="text-[var(--status-indigo)] font-bold">{activeEntryIdx + 1}</span> of {quizEntries.length}</p>
                        <div className="w-full bg-[var(--hover-bg)] h-1.5 rounded-full overflow-hidden">
                            <div
                                className="h-full bg-gradient-to-r from-indigo-600 to-purple-600 transition-all duration-500"
                                style={{ width: `${((activeEntryIdx + 1) / quizEntries.length) * 100}%` }}
                            />
                        </div>
                        <p className="mt-4 text-[10px] text-[var(--text-muted)] uppercase tracking-widest font-bold">{t('doNotClose')}</p>
                    </div>

            );

                    const payload = {
                        course_id: selectedCourse,
                        target_session_id: targetSessionId,
                        source_session_id: entry.sourceSessionId,
                        type: quiz.questions[idx].type,
                        difficulty: quiz.questions[idx].difficulty || 'medium',
                        count: 1,
                        materials: entry.materials,
                        courseName: courses.find(c => String(c.id) === String(selectedCourse))?.title
                    };

                    try {
                        const response = await fetch('/api/ai/dispatch', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify({ service: 'Quiz Engine', endpoint: '/generate-quiz', data: payload })
                        });
                        const data = await response.json();
                        if (response.ok && data.questions && data.questions.length > 0) {
                            const newQuestions = [...quiz.questions];
                            newQuestions[idx] = data.questions[0];
                            setGeneratedQuiz({ ...quiz, questions: newQuestions });
                            addLog(lang === 'ar' ? `تمت إعادة توليد السؤال ${idx + 1} بنجاح.` : `Question ${idx + 1} regenerated successfully.`, 'success');
                        }

                        addLog(lang === 'ar' ? `فشل في إعادة توليد السؤال ${idx + 1}` : `Failed to regenerate question ${idx + 1}`, 'error');

                    setRegeneratingId(null);

                return (

                                        <h3 className="text-xl font-bold text-[var(--text-main)]">{t('quizPreview')}</h3>

                                    </div>
                                </div>
                                <button onClick={onClose} className="p-2 hover:bg-[var(--hover-bg)] rounded-full transition-colors text-[var(--text-muted)] hover:text-[var(--text-main)]">
                                    <Icon name="x" size={24} />
                                </button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-8 space-y-6">

                                            <button

                                                disabled={regeneratingId !== null}
                                                className="px-3 py-1 bg-[var(--hover-bg)] hover:bg-[var(--status-indigo-bg)] text-[10px] font-bold text-[var(--text-muted)] hover:text-[var(--status-indigo)] rounded-lg border border-[var(--card-border)] transition-all flex items-center gap-2 disabled:opacity-50"
                                            >
                                                <Icon name={regeneratingId === idx ? "loader-2" : "refresh-cw"} size={12} className={regeneratingId === idx ? "animate-spin" : ""} />
                                                {regeneratingId === idx ? t('aiWorking') : t('regenerate')}
                                            </button>
                                        </div>
                                        <div className="flex items-start gap-4">
                                            <span className="w-8 h-8 rounded-lg bg-[var(--status-indigo-bg)] border border-indigo-500/20 flex items-center justify-center text-xs font-bold text-[var(--status-indigo)]">{idx + 1}</span>
                                            <div className="flex-1">
                                                <div className="flex items-center gap-2 mb-3">
                                                    <span className={`px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider ${
                                                        q.type === 'mcq' ? 'bg-blue-500/10 text-blue-400 border border-blue-500/20' :
                                                        q.type === 'true_false' ? 'bg-[var(--status-emerald-bg)] text-[var(--status-emerald)] border border-emerald-500/20' :
                                                        'bg-[var(--status-amber-bg)] text-[var(--status-amber)] border border-amber-500/20'
                                                    }`}>
                                                        {lang === 'ar' ? (q.type === 'mcq' ? 'اختيار من متعدد' : q.type === 'true_false' ? 'صح / خطأ' : q.type === 'written' ? 'إجابة كتابية' : 'مخلوط') : q.type.replace('_', ' ')}
                                                    </span>
                                                    <span className="text-[10px] font-bold text-[var(--text-muted)] uppercase tracking-widest">{lang === 'ar' ? (q.difficulty === 'easy' ? 'سهل' : q.difficulty === 'hard' ? 'متقدم' : 'متوسط') : (q.difficulty || 'Medium')}</span>
                                                </div>
                                                <p className="text-[var(--text-main)] font-medium mb-4 leading-relaxed">{q.question}</p>

                                                {q.type === 'mcq' && q.options && (

                                                            <div key={key} className={`p-3 rounded-xl border text-sm flex items-center gap-3 ${key === q.answer ? 'bg-[var(--status-emerald-bg)] border-emerald-500/30 text-[var(--status-emerald)]' : 'panel-deep text-[var(--text-muted)]'}`}>

                                                        {(lang === 'ar' ? ['صح', 'خطأ'] : ['True', 'False']).map(val => (
                                                            <div key={val} className={`px-4 py-2 rounded-xl border text-sm font-bold ${String(q.answer).toLowerCase() === val.toLowerCase() ? 'bg-[var(--status-emerald-bg)] border-emerald-500/30 text-[var(--status-emerald)]' : 'panel-deep text-[var(--text-muted)]'}`}>
                                                                {val}
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}

                                                {q.explanation && (
                                                    <div className="p-4 bg-[var(--status-indigo-bg)] border border-indigo-500/10 rounded-xl">
                                                        <div className="flex items-center gap-2 text-[var(--status-indigo)] mb-2">
                                                            <Icon name="info" size={14} />
                                                            <span className="text-[10px] font-bold uppercase tracking-wider">{t('aiExplanation')}</span>
                                                        </div>
                                                        <p className="text-xs text-[var(--text-muted)] leading-relaxed italic">{q.explanation}</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="p-6 border-t border-[var(--card-border)] bg-[var(--hover-bg)] flex justify-end gap-4">
                                <button onClick={onClose} className="px-6 py-2.5 rounded-xl border border-[var(--card-border)] text-[var(--text-muted)] font-bold text-sm hover:bg-[var(--hover-bg)] transition-all">{t('discard')}</button>
                                <button onClick={() => { addLog(lang === 'ar' ? 'تم نشر الاختبار في بوابة المتدربين.' : 'Quiz published to Trainee Portal.', 'success'); onClose(); }} className="px-8 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold text-sm shadow-xl shadow-indigo-500/20 transition-all">{t('approveRelease')}</button>
                            </div>
                        </div>
                    </div>
                );

                    const headers = {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    };
                    const resp = await fetch('/api/alerts/', {
                        method: 'POST',
                        headers,
                        body: JSON.stringify({
                            alert_text: newAlert.text,
                            target_type: newAlert.type,
                            target_id: newAlert.targetId ? parseInt(newAlert.targetId) : null
                        })
                    });
                    if (resp.ok) {
                        addLog(lang === 'ar' ? 'تم إرسال تنبيه النظام بنجاح.' : 'System Alert Pushed successfully.', 'success');
                        setNewAlert({ text: '', type: 'global', targetId: '' });
                        fetchDashboardData();
                    }
                } catch (err) {
                    console.error("Failed to push alert", err);
                }
            };

            const handleDeleteAlert = async (id) => {
                try {
                    const headers = { 'Authorization': `Bearer ${token}` };
                    const resp = await fetch(`/api/alerts/${id}`, { method: 'DELETE', headers });
                    if (resp.ok) {
                        addLog(lang === 'ar' ? 'تمت إزالة تنبيه النظام.' : 'System Alert removed.', 'system');
                        fetchDashboardData();
                    }
                } catch (err) {
                    console.error("Failed to delete alert", err);
                }
            };

            const handleGenerateReport = async () => {
                if (selectedReportTargets.length === 0) return;
                setIsGeneratingReport(true);
                addLog(lang === 'ar' ? `جارٍ إنشاء تقرير شامل لعدد ${selectedReportTargets.length} من الجهات...` : `Generating system-wide report for ${selectedReportTargets.length} targets...`, 'dispatch');

                try {
                    const response = await fetch('/api/reports/generate', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            targets: selectedReportTargets,
                            dateRange: reportDateRange
                        })
                    });

                    if (response.ok) {
                        const blob = await response.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');

                        a.download = `NTA_Export_${new Date().toISOString().split('T')[0]}.csv`;
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                        addLog(lang === 'ar' ? 'تم إنشاء التقرير وتنزيله بنجاح.' : 'Report generated and downloaded successfully.', 'success');
                    } else {
                        addLog(lang === 'ar' ? 'فشل إنشاء التقرير.' : 'Failed to generate report.', 'error');
                    }
                } catch (err) {
                    addLog(lang === 'ar' ? 'خطأ في الاتصال أثناء إنشاء التقرير.' : 'Connection error during report generation.', 'error');

            const ServiceStatus = ({ port, name, status }) => (
                <div className="flex items-center justify-between p-3 panel-glass rounded-xl">

                        <span className="text-sm font-medium text-[var(--text-main)]">{name}</span>

                                                                            </td>
                                                                            <td className="px-6 py-4">
                                                                                <span className="text-[10px] text-[var(--text-muted)]">{new Date(u.created_at).toLocaleDateString()}</span>
                                                                            </td>
                                                                            <td className="px-6 py-4 text-right">
                                                                                <button 
                                                                                    onClick={() => handleDeleteManagementUser(u.id)}
                                                                                    className="p-2 text-[var(--text-muted)] hover:text-[var(--status-rose)] hover:bg-[var(--status-rose-bg)] rounded-lg transition-all"
                                                                                    title={lang === 'ar' ? 'حذف المستخدم' : 'Delete User'}
                                                                                >
                                                                                    <Icon name="trash-2" size={16} />
                                                                                </button>
                                                                            </td>
                                                                        </tr>
                                                                    ))}
                                                                </tbody>
                                                            </table>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </main>
                        {showPreview && <QuizPreview quiz={generatedQuiz} onClose={() => setShowPreview(false)} />}
                        {isProcessing === 'Quiz Engine' && activeEntryIdx !== null && <GenerationOverlay />}
                        <DeepDiveModal 
                            isOpen={isDeepDiveOpen} 
                            onClose={() => setIsDeepDiveOpen(false)} 
                            log={selectedLog}
                            traceLogs={traceLogs}
                            isLoadingTrace={isLoadingTrace}
                        />

                        {/* ── Floating Controls ── */}
                        <div className="floating-controls">
                            <button 
                                onClick={() => setLang(lang === 'en' ? 'ar' : 'en')}
                                className="control-btn"
                                title={lang === 'en' ? 'Switch to Arabic' : 'Switch to English'}
                            >
                                <Icon name="languages" size={20} />
                                <span className="absolute -top-1 -right-1 bg-indigo-500 text-[8px] px-1 rounded-full">{lang.toUpperCase()}</span>
                            </button>
                            <button 
                                onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                                className="control-btn"
                                title={theme === 'dark' ? 'Switch to Light Mode' : 'Switch to Dark Mode'}
                            >
                                <Icon name={theme === 'dark' ? 'sun' : 'moon'} size={20} />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
