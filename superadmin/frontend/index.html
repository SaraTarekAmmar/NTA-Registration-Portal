<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script src="/common/js/theme.js"></script>
    <link rel="stylesheet" href="/common/css/theme.css?v=4" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل دخول السوبر أدمن - الأكاديمية الوطنية للتدريب</title>
    <link rel="stylesheet" href="/admin/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* ══ Premium dark navy background ══ */
      body.has-header {
        background: #030712 !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        align-items: center !important;
        min-height: 100vh !important;
        padding: 2rem 1rem !important;
      }

      .login-bg {
        background:
          radial-gradient(ellipse 80% 55% at 15% 10%, rgba(185,28,28,0.07), transparent 55%),
          radial-gradient(ellipse 55% 40% at 90% 85%, rgba(185,28,28,0.05), transparent 60%),
          radial-gradient(ellipse 60% 35% at 80% 5%,  rgba(30,40,80,0.4), transparent 65%) !important;
        animation: none !important;
      }

      /* ══ Premium glass card ══ */
      .login-card {
        max-width: 480px !important;
        background: rgba(5,8,20,0.88) !important;
        backdrop-filter: blur(42px) saturate(140%) !important;
        -webkit-backdrop-filter: blur(42px) saturate(140%) !important;
        border: 1px solid rgba(255,255,255,0.065) !important;
        border-top-color: rgba(185,28,28,0.38) !important;
        border-radius: 18px !important;
        box-shadow:
          0 0 0 1px rgba(185,28,28,0.06),
          0 32px 80px rgba(0,0,0,0.55),
          0 8px 24px rgba(0,0,0,0.4) !important;
      }


      /* ══ Background orbs ══ */
      .login-bg::before {
        content: "";
        position: fixed;
        top: -18%; right: -10%;
        width: 560px; height: 560px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(185,28,28,0.07) 0%, transparent 65%);
        pointer-events: none;
        animation: loginOrbA 11s ease-in-out infinite alternate;
      }
      .login-bg::after {
        content: "";
        position: fixed;
        bottom: -14%; left: -10%;
        width: 460px; height: 460px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(30,40,100,0.12) 0%, transparent 65%);
        pointer-events: none;
        animation: loginOrbA 14s ease-in-out infinite alternate-reverse;
      }
      @keyframes loginOrbA {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(32px, 20px) scale(1.1); }
      }

      /* ══ Heading override ══ */
      .login-card h1 {
        background: linear-gradient(135deg, #f87171 0%, #fca5a5 60%, #fecaca 100%) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
        font-size: 1.28rem !important;
      }

      /* ══ Submit button — crimson ══ */
      .login-btn {
        background: linear-gradient(135deg, #991b1b 0%, #b91c1c 50%, #dc2626 100%) !important;
        box-shadow: 0 4px 20px rgba(185,28,28,0.38) !important;
      }
      .login-btn::before {
        background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%) !important;
      }
      .login-btn:hover:not(.loading) {
        box-shadow: 0 8px 28px rgba(185,28,28,0.52) !important;
      }


      /* ══ Error / bottom link ══ */
      .login-error-msg {
        background: rgba(239,68,68,0.1);
        border: 1px solid rgba(239,68,68,0.35);
        border-radius: 10px;
        padding: 0.65rem 1rem;
        font-size: 0.84rem;
        color: #fca5a5;
        margin-top: 0.75rem;
      }
      .login-editor-link {
        display: block;
        text-align: center;
        margin-top: 1.25rem;
        font-size: 0.82rem;
        color: rgba(148,163,184,0.55);
        text-decoration: none;
        transition: color 0.2s;
      }
      .login-editor-link:hover { color: #fca5a5; }

      /* ══ Input focus: crimson glow ══ */
      .login-input-wrap:focus-within {
        border-color: rgba(185,28,28,0.55) !important;
        box-shadow: 0 0 0 2px rgba(185,28,28,0.18) !important;
      }
      .login-input-wrap:focus-within .login-input-icon { color: #f87171 !important; }
    
      /* ══ Light mode overrides ══ */
      html.light-mode body.has-header {
        background: #f1f5f9 !important;
      }
      html.light-mode .login-bg {
        background:
          radial-gradient(ellipse 80% 55% at 15% 10%, rgba(185,28,28,0.04), transparent 55%),
          radial-gradient(ellipse 55% 40% at 90% 85%, rgba(185,28,28,0.03), transparent 60%) !important;
      }
      html.light-mode .login-card {
        background: rgba(255,255,255,0.97) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
        border-top-color: rgba(185,28,28,0.2) !important;
        box-shadow: 0 4px 32px rgba(0,0,0,0.1), 0 1px 4px rgba(0,0,0,0.06) !important;
      }
      html.light-mode .login-card h1 {
        background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%) !important;
        -webkit-background-clip: text !important;
        background-clip: text !important;
      }
      </style>
  </head>

  <body class="has-header">
<div class="login-bg"></div>

    <div class="login-card" id="loginCard">
      <div class="logo-container">
        <img src="images/logo2.png" alt="الأكاديمية الوطنية للتدريب" class="login-logo" onerror="this.style.display='none'" />
        <div class="logo-subtitle">بوابة السوبر أدمن</div>
      </div>

      <h1>تسجيل دخول السوبر أدمن</h1>
      <p class="subtitle">تسجيل الدخول إلى لوحة المتابعة والإشراف المركزي</p>


      <form id="superadminLoginForm" novalidate>
        <div class="form-group">
          <label for="superadminEmail">البريد الإلكتروني</label>
          <div class="login-input-wrap">
            <span class="login-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 6h16v12H4V6Z"/><path d="m4 7 8 6 8-6"/>
              </svg>
            </span>
            <input type="email" id="superadminEmail" name="email" required autocomplete="email" placeholder="superadmin@nta.edu.eg"
              aria-describedby="superadminEmailError" />
          </div>
          <p id="superadminEmailError" class="field-error" style="display:none;" aria-live="polite">البريد الإلكتروني مطلوب.</p>
        </div>

        <div class="form-group">
          <label for="superadminPassword">كلمة المرور</label>
          <div class="login-input-wrap">
            <span class="login-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 11V8a5 5 0 0 1 10 0v3"/><path d="M6 11h12v10H6V11Z"/><path d="M12 15v2"/>
              </svg>
            </span>
            <input type="password" id="superadminPassword" name="password" required autocomplete="current-password"
              placeholder="أدخل كلمة المرور" aria-describedby="superadminPasswordError" />
          </div>
          <p id="superadminPasswordError" class="field-error" style="display:none;" aria-live="polite">كلمة المرور مطلوبة.</p>
        </div>

        <button type="submit" class="login-btn" id="superadminLoginBtn">
          <span class="login-btn-text">دخول لوحة السوبر أدمن</span>
          <span class="arrow-icon">←</span>
          <span class="login-btn-loader" aria-hidden="true"></span>
        </button>
      </form>

      <div id="loginError" class="login-error-msg" role="alert" aria-live="assertive" style="display:none;"></div>
    </div>

    <script>
      (function () {
        var SUPERADMIN_TOKEN_KEY = "superadmin_token";
        var SUPERADMIN_NAME_KEY = "superadmin_name";
        var SUPERADMIN_LOGIN_ENDPOINT = "/api/auth/login";
        var SUPERADMIN_API_PORTS = [8003];

        // Always show the login form (no auto-skip): a fresh visit must log in.

        var form = document.getElementById("superadminLoginForm");
        var btn = document.getElementById("superadminLoginBtn");
        var errorBox = document.getElementById("loginError");

        function isLocalDev() {
          return window.location.protocol === "file:" ||
            window.location.hostname === "localhost" ||
            window.location.hostname === "127.0.0.1" ||
            window.location.hostname === "::1";
        }

        function uniqueBases(list) {
          return list.filter(function (base, index, arr) {
            return arr.indexOf(base) === index;
          });
        }

        function getLoginBases(ports) {
          var bases = [];
          if (window.location.protocol !== "file:") {
            bases.push("");
          }
          if (isLocalDev()) {
            ports.forEach(function (port) {
              bases.push("http://127.0.0.1:" + port);
              bases.push("http://localhost:" + port);
            });
          }
          return uniqueBases(bases);
        }

        function postJsonWithFallback(endpoint, payload, ports) {
          var bases = getLoginBases(ports);

          function attempt(index) {
            if (index >= bases.length) {
              return Promise.reject(new Error("Failed to fetch"));
            }

            var base = bases[index];
            return fetch(base + endpoint, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            }).then(function (res) {
              if ((res.status === 404 || res.status === 405) && index + 1 < bases.length && isLocalDev()) {
                return attempt(index + 1);
              }

              return res.text().then(function (text) {
                var data = {};
                if (text) {
                  try {
                    data = JSON.parse(text);
                  } catch (parseErr) {
                    if (res.ok && index + 1 < bases.length && isLocalDev()) {
                      return attempt(index + 1);
                    }
                    var formatErr = new Error("استجابة غير متوقعة من الخادم");
                    formatErr.retryable = false;
                    throw formatErr;
                  }
                }

                if (!res.ok) {
                  var apiErr = new Error(data.detail || "فشل تسجيل الدخول");
                  apiErr.retryable = false;
                  throw apiErr;
                }

                return { data: data, base: base };
              });
            }).catch(function (err) {
              if (index + 1 < bases.length && isLocalDev() && err && err.retryable !== false) {
                return attempt(index + 1);
              }
              throw err;
            });
          }

          return attempt(0);
        }

        function showFieldError(id, msg) {
          var el = document.getElementById(id);
          if (el) { el.textContent = msg; el.style.display = "block"; }
          var inputId = id.replace("Error", "");
          var inp = document.getElementById(inputId);
          if (inp) inp.setAttribute("aria-invalid", "true");
        }
        function hideFieldError(id) {
          var el = document.getElementById(id);
          if (el) { el.style.display = "none"; }
          var inputId = id.replace("Error", "");
          var inp = document.getElementById(inputId);
          if (inp) inp.removeAttribute("aria-invalid");
        }
        function showError(msg) {
          errorBox.textContent = msg;
          errorBox.style.display = "block";
        }
        function clearErrors() {
          errorBox.style.display = "none";
          hideFieldError("superadminEmailError");
          hideFieldError("superadminPasswordError");
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          clearErrors();

          var email = document.getElementById("superadminEmail").value.trim();
          var password = document.getElementById("superadminPassword").value;
          var valid = true;

          if (!email) { showFieldError("superadminEmailError", "البريد الإلكتروني مطلوب."); valid = false; }
          if (!password) { showFieldError("superadminPasswordError", "كلمة المرور مطلوبة."); valid = false; }
          if (!valid) return;

          btn.classList.add("loading");
          btn.disabled = true;

          postJsonWithFallback(SUPERADMIN_LOGIN_ENDPOINT, {
            email: email,
            password: password
          }, SUPERADMIN_API_PORTS)
            .then(function (result) {
              var data = result.data;
              if (!data.access_token) {
                throw new Error("تعذّر تسجيل الدخول. تأكّد من تشغيل خادم السوبر أدمن على المنفذ 8003.");
              }
              if (data.role !== "superadmin") {
                throw new Error("هذا الحساب غير مصرح له بالوصول إلى بوابة السوبر أدمن.");
              }
              localStorage.setItem(SUPERADMIN_TOKEN_KEY, data.access_token);
              localStorage.setItem(SUPERADMIN_NAME_KEY, data.fullName || data.email || "");
              var dashboardUrl = result.base ? result.base + "/superadmin-dashboard.html" : "superadmin-dashboard.html";
              window.location.replace(dashboardUrl);
            })
            .catch(function (err) {
              btn.classList.remove("loading");
              btn.disabled = false;
              var msg = err.message || "خطأ في تسجيل الدخول";
              if (msg.toLowerCase().includes("not allowed") || msg.toLowerCase().includes("غير مصرح")) {
                showError("هذا الحساب غير مصرح له بالوصول إلى بوابة السوبر أدمن.");
              } else if (msg.includes("Invalid") || msg.includes("غير صحيحة") || msg.includes("401")) {
                showError("البريد الإلكتروني أو كلمة المرور غير صحيحة.");
              } else {
                showError(msg);
              }
            });
        });
      })();
    </script>
  </body>
</html>
