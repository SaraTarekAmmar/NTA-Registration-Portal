<div class="step-card">
    <h2 style="margin-bottom: 1.5rem;">اختبار اللغة الإنجليزية</h2>
    <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">
        يُرجى إدخال درجتك في اختبار اللغة الإنجليزية، أو إرفاق شهادة الإعفاء إن وجدت.
    </p>
    <form id="stepForm">
        <div class="form-group" style="margin-bottom: 1rem;">
            <label>هل لديك شهادة إعفاء (TOEFL/IELTS)؟</label>
            <select name="has_toefl" class="sel" required>
                <option value="false">لا</option>
                <option value="true">نعم</option>
            </select>
        </div>
        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label>درجة الاختبار (الأساسي أو الإعفاء)</label>
            <input type="number" name="english_score" class="inp" required placeholder="0 - 100">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">حفظ ومتابعة</button>
    </form>
</div>
