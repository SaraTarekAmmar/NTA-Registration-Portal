<div class="step-card">
    <h2 style="margin-bottom: 1.5rem;">Identity & Military</h2>
    <form id="stepForm">
        <div class="form-group">
<label>عدد الجنسيات (اجبارى)</label>
<div class="reg-input-wrap reg-input-wrap--select">
<span aria-hidden="true" class="reg-input-icon reg-input-icon--chevron"></span>
<select id="numberOfNationalities" name="numberOfNationalities" required="">
<option value="">اختر العدد</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
</select>
</div>
</div><div class="form-group">
<label>الجنسية (اجبارى)</label>
<div class="reg-input-wrap reg-input-wrap--select">
<span aria-hidden="true" class="reg-input-icon reg-input-icon--chevron"></span>
<select name="nationality" required="">
<option value="">اختر الجنسية</option>
</select>
</div>
</div><div class="form-group" id="secondNationalityGroup" style="display: none">
<label>الجنسية الثانية (اختيارى)</label>
<div class="reg-input-wrap reg-input-wrap--select">
<span aria-hidden="true" class="reg-input-icon reg-input-icon--chevron"></span>
<select id="secondNationality" name="secondNationality">
<option value="">اختر الجنسية الثانية</option>
<option value="egyptian">مصرية</option>
<option value="saudi">سعودية</option>
<option value="emirati">إماراتية</option>
<option value="kuwaiti">كويتية</option>
<option value="qatari">قطرية</option>
<option value="bahraini">بحرينية</option>
<option value="omani">عمانية</option>
<option value="other">أخرى</option>
</select>
</div>
</div><div class="form-group" id="thirdNationalityGroup" style="display: none">
<label>الجنسية الثالثة (اختيارى)</label>
<div class="reg-input-wrap reg-input-wrap--select">
<span aria-hidden="true" class="reg-input-icon reg-input-icon--chevron"></span>
<select id="thirdNationality" name="thirdNationality">
<option value="">اختر الجنسية الثالثة</option>
<option value="egyptian">مصرية</option>
<option value="saudi">سعودية</option>
<option value="emirati">إماراتية</option>
<option value="kuwaiti">كويتية</option>
<option value="qatari">قطرية</option>
<option value="bahraini">بحرينية</option>
<option value="omani">عمانية</option>
<option value="other">أخرى</option>
</select>
</div>
</div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">حفظ ومتابعة</button>
    </form>
</div>
