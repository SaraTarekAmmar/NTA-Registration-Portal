<div class="step-card">
    <h2 style="margin-bottom: 1.5rem;">Skills & Languages</h2>
    <form id="stepForm">
        <div class="form-group">
<label for="nativeLanguage">اللغة الأم (Mother Language) (اجبارى)
</label>
<div class="reg-input-wrap reg-input-wrap--select">
<span aria-hidden="true" class="reg-input-icon reg-input-icon--chevron"></span>
<select id="nativeLanguage" name="nativeLanguage" required="">
<option value="">اختر اللغة</option>
</select>
</div>
</div><div class="form-group">

                      only.
                    </p>
<div class="reg-input-wrap reg-input-wrap--select">
<span aria-hidden="true" class="reg-input-icon reg-input-icon--chevron"></span>

<option value="">اختر المستوى</option>
</select>
</div>
</div><div id="additionalLanguagesContainer"></div><button class="reg-btn reg-btn--outline mt-3" id="addLanguageBtn" type="button">+ إضافة لغة أخرى (اختياري)</button>

    </form>
</div>
