<div class="step-card">
    <h2 style="margin-bottom: 1.5rem;">Personal Information</h2>
    <form id="stepForm">
        <div class="form-group">
<label>الحالة الاجتماعية (اجبارى)</label>
<div class="reg-input-wrap reg-input-wrap--select">
<span aria-hidden="true" class="reg-input-icon reg-input-icon--chevron"></span>
<select name="maritalStatus" required="">
<option value="">اختر الحالة الاجتماعية</option>
<option value="single">أعزب/آنية</option>
<option value="married">متزوج/ة</option>
<option value="divorced">مطلق/ة</option>
<option value="widowed">أرمل/ة</option>
</select>
</div>
</div><div class="form-group">
<label>متوسط الدخل الشهري (اجبارى)</label>
<div class="reg-input-wrap reg-input-wrap--select">
<span aria-hidden="true" class="reg-input-icon reg-input-icon--chevron"></span>
<select name="monthlyAverageIncome" required="">
<option value="">اختر متوسط الدخل</option>
<option value="below_5000">أقل من 5,000</option>
<option value="5000_10000">5,000 - 10,000</option>
<option value="10000_20000">10,000 - 20,000</option>
<option value="20000_50000">20,000 - 50,000</option>
<option value="above_50000">أكثر من 50,000</option>
</select>
</div>
</div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">حفظ ومتابعة</button>
    </form>
</div>
