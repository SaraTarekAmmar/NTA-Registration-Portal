<div class="step-card">
    <h2 style="margin-bottom: 1.5rem;">Logistics & Needs</h2>
    <form id="stepForm">
        <div class="form-group">
<label>قيود النظام الغذائي (Dietary Restrictions) (اختيارى)</label>
<textarea name="dietaryRestrictions" placeholder="أدخل أي احتياجات غذائية خاصة إن وجدت" rows="3"></textarea>
<small class="reg-step__desc">
                    يساعد في توفير ما يناسبك خلال فعاليات البرنامج.
                  </small>
</div><div class="form-group">
<label>متطلبات إمكانية الوصول (Accessibility Requirements) (اختيارى)</label>
<textarea name="accessibilityRequirements" placeholder="أدخل أي احتياجات خاصة لإمكانية الوصول إن وجدت" rows="3"></textarea>
<small class="reg-step__desc">
                    يضمن أن بيئة البرنامج مناسبة لجميع المشاركين.
                  </small>
</div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">حفظ ومتابعة</button>
    </form>
</div>
