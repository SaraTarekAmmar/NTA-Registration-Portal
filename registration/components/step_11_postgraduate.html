<div class="step-card">
    <h2 style="margin-bottom: 1.5rem;">Educational Background</h2>
    <form id="stepForm">
        <div id="eduPostgraduateSection" style="display: none">
<hr class="reg-divider"/>
<div class="form-group">
<label>درجة علمية أعلى (دراسات عليا) (اختيارى)</label>
<div class="reg-input-wrap reg-input-wrap--select">
<span aria-hidden="true" class="reg-input-icon reg-input-icon--chevron"></span>
<select class="optional-select" id="eduHasPostgraduate" name="eduHasPostgraduate">
<option value="">اختر</option>
<option value="yes">نعم / Yes</option>
<option value="no">لا / No</option>
</select>
</div>
</div>
<div id="eduPostgraduateDetails" style="display: none">
<div id="higherEducationContainer">
<div class="higher-education-card acc-item open mb-3">
<div class="acc-header accordion-header">
<span class="acc-title accordion-title">دراسات عليا #1 (Postgraduate #1)</span>
<button aria-label="حذف الدراسات العليا" class="acc-delete-btn remove-higher-edu-btn" style="display: none" title="حذف الدراسات العليا" type="button">
                              ✕
                            </button>
<svg class="acc-chevron accordion-icon" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24">
<path d="M6 9l6 6 6-6"></path>
</svg>
</div>
<div class="acc-body accordion-body">
<div class="reg-form__row">
<div class="form-group">
<label>الدرجة (ماجستير - دكتوراه) (اجبارى)
</label>
<div class="reg-input-wrap reg-input-wrap--select">
<span aria-hidden="true" class="reg-input-icon reg-input-icon--chevron"></span>
<select class="edu-pg-degree-type" name="eduPostgraduateDegreeType[]">
<option value="">اختر</option>
<option value="master">Master / ماجستير</option>
<option value="phd">PHD / دكتوراه</option>
</select>
</div>
</div>
<div class="form-group">
<label>اسم الجهة المانحة للدرجة (اجبارى)
</label>
<input class="edu-degree-issuer-entity" name="eduDegreeIssuerEntity[]" placeholder="الجهة التي أصدرت الدرجة" type="text"/>
</div>
</div>
<div class="reg-form__row">
<div class="form-group">
<label>التخصص الرئيسي للدرجة (اجبارى)
</label>
<input class="edu-main-speciality-pg" name="eduMainSpecialityPg[]" placeholder="التخصص الرئيسي" type="text"/>
</div>
<div class="form-group">
<label>التخصص الفرعي (اختيارى)
</label>
<input class="edu-secondary-speciality-pg" name="eduSecondarySpecialityPg[]" placeholder="اختياري" type="text"/>
</div>
</div>
<div class="reg-form__row">
<div class="form-group">
<label>تاريخ البدء (اجبارى)
</label>
<div class="reg-input-wrap reg-input-wrap--date">
<span aria-hidden="true" class="reg-input-icon reg-input-icon--calendar"></span>
<input class="edu-pg-start-date" name="eduPgStartDate[]" type="date"/>
</div>
</div>
<div class="form-group">
<label>تاريخ الانتهاء (اجبارى)
</label>
<div class="reg-input-wrap reg-input-wrap--date">
<span aria-hidden="true" class="reg-input-icon reg-input-icon--calendar"></span>
<input class="edu-pg-end-date" name="eduPgEndDate[]" type="date"/>
</div>
</div>
</div>
<div class="reg-form__row">
<div class="form-group">
<label>تمويل شخصي أم جهة خارجية (اختيارى)
</label>
<div class="reg-input-wrap reg-input-wrap--select">
<span aria-hidden="true" class="reg-input-icon reg-input-icon--chevron"></span>
<select class="edu-funding optional-select" name="eduFunding[]">
<option value="">اختر</option>
<option value="personal">شخصي / Personally</option>
<option value="third_party">جهة خارجية / Third Party</option>
</select>
</div>
</div>
<div class="form-group">
<label>اسم الجهة التي رشحتك (اختيارى)
</label>
<input class="edu-recommending-entity" name="eduRecommendingEntity[]" placeholder="اختياري" type="text"/>
</div>
</div>
<div class="form-group edu-scholarship-group" style="display: none">
<label>اسم جهة المنحة (اختيارى)
</label>
<input class="edu-scholarship-entity" name="eduScholarshipEntity[]" placeholder="اسم الجهة المانحة للمنحة" type="text"/>
</div>
<div class="acc-actions">
<button class="reg-btn reg-btn--danger remove-higher-edu-btn" style="display: none;" type="button">
<span class="reg-btn__icon">✕</span> حذف (Remove)
                              </button>
</div>
</div>
</div>
</div>
<button class="reg-btn reg-btn--outline mt-3 mb-4" id="addHigherEduBtn" type="button">+ Add Another Entry (إضافة دراسة عليا أخرى)</button>
</div>
</div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">حفظ ومتابعة</button>
    </form>
</div>
