<div class="step-card">
    <h2 style="margin-bottom: 1.5rem;">Legal & References</h2>
    <form id="stepForm">
        <div class="form-group">
<label>السيرة الذاتية الشاملة (Comprehensive CV / Resume) (إرشادات الرفع: يرجى رفع السيرة الذاتية الشاملة بصيغة PDF أو Word بحجم أقصى 5 ميجابايت) (اجبارى)</label>
<input accept=".pdf,.doc,.docx" name="cvResume" required="" type="file"/>
</div><div class="form-group">
<label>خطابات التوصية (2) (Letters of Recommendation x2) (إرشادات الرفع: يمكنك رفع ملف أو أكثر من خطابات التوصية بصيغة PDF أو صور واضحة بحجم أقصى 5 ميجابايت) (اختيارى)</label>
<input accept=".pdf,.doc,.docx,.jpg,.png" multiple="" name="lettersOfRecommendation" type="file"/>
<small class="reg-step__desc">
                        يمكنك رفع أكثر من ملف في هذا الحقل (ويُفضل خطابَي توصية) أو
                        إرسالها لاحقًا عبر البريد الإلكتروني.
                      </small>
</div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">حفظ ومتابعة</button>
    </form>
</div>
