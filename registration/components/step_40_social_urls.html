<div class="step-card">
    <h2 style="margin-bottom: 1.5rem;">Final Verification</h2>
    <form id="stepForm">
        <div id="socialVerifyUrlsBlock">
<div class="form-group social-verify-row" data-requires-platform="socialPlatformFacebook" style="display: none">
<label>رابط حساب فيسبوك (Facebook Account Link) (اجبارى)</label>
<input dir="ltr" id="socialProfileFacebookUrl" name="socialProfileFacebookUrl" placeholder="https://facebook.com/..." type="url"/>
</div>
<div class="form-group social-verify-row" data-requires-platform="socialPlatformInstagram" style="display: none">
<label>رابط حساب إنستجرام (Instagram Account Link) (اجبارى)</label>
<input dir="ltr" id="socialProfileInstagramUrl" name="socialProfileInstagramUrl" placeholder="https://instagram.com/..." type="url"/>
</div>
<div class="form-group social-verify-row" data-requires-platform="socialPlatformX" style="display: none">
<label>رابط حساب إكس / تويتر (X Account Link) (اجبارى)</label>
<input dir="ltr" id="socialProfileXUrl" name="socialProfileXUrl" placeholder="https://x.com/..." type="url"/>
</div>
<div class="form-group social-verify-row" data-requires-platform="socialPlatformLinkedIn" style="display: none">
<label>رابط حساب لينكد إن (LinkedIn Account Link) (اجبارى)</label>
<input dir="ltr" id="socialProfileLinkedInUrl" name="socialProfileLinkedInUrl" placeholder="https://linkedin.com/in/..." type="url"/>
</div>
<div class="form-group social-verify-row" data-requires-platform="socialPlatformTikTok" style="display: none">
<label>رابط حساب تيك توك (TikTok Account Link) (اجبارى)</label>
<input dir="ltr" id="socialProfileTikTokUrl" name="socialProfileTikTokUrl" placeholder="https://tiktok.com/@..." type="url"/>
</div>
</div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">حفظ ومتابعة</button>
    </form>
</div>
