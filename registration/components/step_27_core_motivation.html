<div class="step-card">
    <h2 style="margin-bottom: 1.5rem;">Motivation & Goals</h2>
    <form id="stepForm">
        <div class="form-group">
<label>الهدف التعليمي الرئيسي (Primary Learning Objective) (اجبارى)</label>
<textarea name="primaryLearningObjective" placeholder="ما الذي تسعى لتعلمه أو تحقيقه من خلال هذا البرنامج؟" rows="3"></textarea>
<small class="reg-step__desc">
                    يساعد هذا القسم على مواءمة توقعاتك مع مخرجات البرنامج.
                  </small>
</div><div class="form-group">
<label>مساهمتك الفريدة للدفعة (Unique Contribution to Cohort) (اجبارى)</label>
<textarea name="uniqueContribution" placeholder="ما الذي يمكنك إضافته لزملائك في البرنامج؟ خبرات، مهارات، منظور مختلف، ..." rows="3"></textarea>
<small class="reg-step__desc">
                    يوضح هذا القسم ما الذي يميزك عن غيرك من المتقدمين.
                  </small>
</div><div class="form-group">
<label>هدفـك المهني خلال 5 سنوات (Future Career Goal - 5 Years) (اجبارى)</label>
<textarea name="futureCareerGoal" placeholder="صف طموحاتك المهنية على المدى المتوسط (خمس سنوات)." rows="3"></textarea>
<small class="reg-step__desc">
                    يساعد هذا القسم على فهم رؤيتك المهنية طويلة المدى.
                  </small>
</div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">حفظ ومتابعة</button>
    </form>
</div>
