<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script src="/common/js/theme.js"></script>
    <script src="js/trainer-guard.js"></script>
    <link rel="stylesheet" href="/common/css/theme.css?v=4" />
    <link rel="stylesheet" href="header/header.css?v=9" />
    <link rel="stylesheet" href="/common/css/nta-dashboard.css?v=1" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مركز التذاكر | المدرّب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="tickets.css" />
  </head>
  <body data-page="tickets">
    <div id="ntaHeader"></div>
    <main class="trainer-main">
      <div class="tickets-container">
        <aside class="tickets-sidebar">
          <div class="tickets-sidebar-header">
            <h2>المحادثات</h2>
            <button id="newTicketBtn" class="premium-btn"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg> تذكرة جديدة</button>
          </div>
          <div class="tickets-list" id="ticketsList"><div class="empty-state">جاري التحميل...</div></div>
        </aside>
        <main class="tickets-chat">
          <div class="chat-header" id="chatHeader" style="display: none;">
            <h3 id="chatSubject">موضوع التذكرة</h3>
            <span id="chatStatus" class="status-badge">مفتوحة</span>
          </div>
          <div class="chat-messages" id="chatMessages"><div class="empty-state">اختر محادثة لعرض التفاصيل أو قم بإنشاء تذكرة جديدة.</div></div>
          <div class="chat-input-area" id="chatInputArea" style="display: none;">
            <textarea id="replyMessage" placeholder="اكتب ردك هنا..." rows="2"></textarea>
            <button id="sendReplyBtn" class="premium-btn send-btn"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg></button>
          </div>
        </main>
      </div>
    </main>

    <div id="newTicketModal" class="modal-overlay" style="display: none;">
      <div class="modal-content">
        <div class="modal-header"><h3>إنشاء تذكرة دعم جديدة</h3><button class="close-btn" id="closeModalBtn">&times;</button></div>
        <div class="modal-body">
          <div class="form-group"><label>نوع المرسل إليه</label><select id="targetRoleSelect"><option value="" disabled selected>اختر نوع المرسل إليه...</option></select></div>
          <div id="targetSearchContainer" class="form-group" style="display: none;"><label>البحث عن مستخدم</label><input type="text" id="targetUserSearch" placeholder="ابحث بالاسم أو البريد..."></div>
          <div id="targetUserSelectContainer" class="form-group" style="display: none;"><label>المرسل إليه</label><select id="targetUserSelect"><option value="">اختر المستخدم...</option></select></div>
          <div class="form-group"><label>الموضوع</label><input type="text" id="ticketSubject" placeholder="مثال: استفسار بخصوص الدورة"></div>
          <div class="form-group"><label>الرسالة</label><textarea id="ticketMessage" rows="4" placeholder="اكتب تفاصيل الاستفسار هنا..."></textarea></div>
        </div>
        <div class="modal-footer"><button id="submitTicketBtn" class="premium-btn">إرسال التذكرة</button></div>
      </div>
    </div>

    <script src="js/trainer-layout.js"></script>
    <script src="tickets.js"></script>
  </body>
</html>
