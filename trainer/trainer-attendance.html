<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script src="/common/js/theme.js"></script>
    <script src="js/trainer-guard.js"></script>
    <link rel="stylesheet" href="/common/css/theme.css?v=4" />
    <link rel="stylesheet" href="header/header.css?v=9" />
    <link rel="stylesheet" href="/common/css/nta-dashboard.css?v=1" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة المدرب — الأكاديمية الوطنية للتدريب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      body { overflow-x: hidden; font-family: "Tajawal", sans-serif; }

      /* ══ Layout ══ */
      .trainer-main { padding: 2rem; min-height: 100vh; min-width: 0; }

      /* ══ Top Bar ══ */
      .dash-topbar {
        display: flex; align-items: center; gap: 1rem;
        padding: 0.85rem 1.5rem; border-radius: 18px;
        background: rgba(8,12,32,0.55); backdrop-filter: blur(24px) saturate(130%);
        border: 1px solid rgba(255,255,255,0.07); margin-bottom: 1.25rem; flex-wrap: wrap;
      }
      .dash-topbar__user { display: flex; align-items: center; gap: 0.75rem; flex: 1; min-width: 0; }
      .dash-topbar__avatar {
        width: 42px; height: 42px; border-radius: 50%;
        background: linear-gradient(135deg, rgba(185,28,28,0.35), rgba(185,28,28,0.15));
        border: 2px solid rgba(185,28,28,0.4);
        display: flex; align-items: center; justify-content: center;
        font-size: 1rem; font-weight: 800; color: #fca5a5; flex-shrink: 0;
      }
      .dash-topbar__name { font-size: 0.9rem; font-weight: 700; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .dash-topbar__role {
        font-size: 0.68rem; font-weight: 600; color: #fca5a5;
        background: rgba(185,28,28,0.12); border: 1px solid rgba(185,28,28,0.25);
        border-radius: 999px; padding: 0.15rem 0.6rem; white-space: nowrap;
      }
      .dash-topbar__actions { display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; }
      .dash-topbar__date { font-size: 0.75rem; color: var(--text-subtle); padding: 0.3rem 0.85rem; border: 1px solid rgba(255,255,255,0.08); border-radius: 999px; white-space: nowrap; }

      /* ══ Hero ══ */
      .dash-hero {
        padding: 1.5rem 1.8rem; border-radius: 20px; margin-bottom: 1.5rem;
        background:
          radial-gradient(circle at top right, rgba(185,28,28,0.11), transparent 52%),
          radial-gradient(circle at bottom left, rgba(30,50,100,0.1), transparent 55%),
          rgba(4,6,18,0.78);
        border: 1px solid rgba(185,28,28,0.18);
        position: relative; overflow: hidden;
        display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
      }
      .dash-hero::before {
        content: ""; position: absolute; top: -60px; right: -60px;
        width: 220px; height: 220px; border-radius: 50%;
        background: radial-gradient(circle, rgba(185,28,28,0.09), transparent 70%); pointer-events: none;
      }
      .dash-hero__title { font-size: 1.9rem; font-weight: 800; margin: 0 0 0.25rem; color: var(--text-main); letter-spacing: -0.02em; }
      .dash-hero__sub { font-size: 0.84rem; color: var(--text-subtle); margin: 0; }
      .dash-hero__meta { display: flex; flex-direction: column; align-items: flex-end; gap: 0.55rem; flex-shrink: 0; }
      .dash-hero__live { display: flex; align-items: center; gap: 0.4rem; font-size: 0.72rem; color: var(--text-subtle); }
      .dash-hero__live-dot { width: 7px; height: 7px; border-radius: 50%; background: #10b981; animation: livePulse 2s infinite; }
      @keyframes livePulse {
        0%   { box-shadow: 0 0 0 0 rgba(16,185,129,0.6); }
        70%  { box-shadow: 0 0 0 7px rgba(16,185,129,0); }
        100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
      }

      /* ══ KPI Row ══ */
      .dash-kpi-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 0.9rem; margin-bottom: 1.5rem; }
      @media (max-width: 900px) { .dash-kpi-row { grid-template-columns: repeat(2,1fr); } }
      @media (max-width: 480px) { .dash-kpi-row { grid-template-columns: 1fr; } }

      .dash-kpi {
        padding: 1.2rem 1.3rem; border-radius: 18px;
        border: 1px solid rgba(255,255,255,0.07); background: rgba(8,12,32,0.4); backdrop-filter: blur(18px);
        display: flex; flex-direction: column; gap: 0.45rem;
        position: relative; overflow: hidden; text-decoration: none;
        transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s, border-color 0.3s;
        animation: kpiEnter 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
      }
      .dash-kpi::before {
        content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, transparent, var(--kpi-accent, #f87171), transparent);
        opacity: 0; transition: opacity 0.3s;
      }
      .dash-kpi:hover { transform: translateY(-5px) scale(1.02); }
      .dash-kpi:hover::before { opacity: 1; }
      .dash-kpi:hover { box-shadow: 0 12px 32px rgba(0,0,0,0.28), 0 0 24px var(--kpi-glow, rgba(185,28,28,0.2)); }
      @keyframes kpiEnter { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

      .dash-kpi--crimson { --kpi-accent: #f87171; --kpi-glow: rgba(185,28,28,0.3); background: linear-gradient(135deg, rgba(185,28,28,0.18), rgba(185,28,28,0.06)); border-color: rgba(185,28,28,0.35); }
      .dash-kpi--green   { --kpi-accent: #34d399; --kpi-glow: rgba(16,185,129,0.25); }
      .dash-kpi--amber   { --kpi-accent: #fbbf24; --kpi-glow: rgba(245,158,11,0.25); }
      .dash-kpi--blue    { --kpi-accent: #60a5fa; --kpi-glow: rgba(59,130,246,0.25); }

      .dash-kpi__icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 0.1rem; border: 1px solid; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
      .dash-kpi:hover .dash-kpi__icon { transform: scale(1.1); }
      .dash-kpi--crimson .dash-kpi__icon { background: rgba(185,28,28,0.2);  border-color: rgba(185,28,28,0.4);  color: #fca5a5; }
      .dash-kpi--green   .dash-kpi__icon { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.3); color: #6ee7b7; }
      .dash-kpi--amber   .dash-kpi__icon { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.3); color: #fde68a; }
      .dash-kpi--blue    .dash-kpi__icon { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); color: #93c5fd; }
      .dash-kpi__icon svg { width: 18px; height: 18px; }
      .dash-kpi__val { font-size: 2rem; font-weight: 800; color: var(--text-main); line-height: 1; letter-spacing: -0.5px; }
      .dash-kpi--crimson .dash-kpi__val { color: #fecaca; }
      .dash-kpi__lbl { font-size: 0.74rem; font-weight: 600; color: var(--text-subtle); line-height: 1.3; }
      .dash-kpi--crimson .dash-kpi__lbl { color: rgba(252,165,165,0.75); }

      /* ══ Section title ══ */
      .adm-section-title { font-size: 0.86rem; font-weight: 700; color: var(--text-subtle); margin: 0 0 0.9rem; display: flex; align-items: center; gap: 0.45rem; }
      .adm-section-title::before { content: ""; width: 3px; height: 15px; border-radius: 999px; background: linear-gradient(180deg, #f87171, #b91c1c); flex-shrink: 0; }

      /* ══ Quick Actions ══ */
      .dash-panel { padding: 1.2rem 1.3rem; border-radius: 18px; background: rgba(8,12,32,0.5); backdrop-filter: blur(18px) saturate(130%); border: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; margin-bottom: 1.25rem; }
      .dash-panel:hover { border-color: rgba(185,28,28,0.22); }

      .trainer-quick-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 0.85rem; }
      @media (max-width: 600px) { .trainer-quick-grid { grid-template-columns: 1fr; } }

      .trainer-quick {
        display: flex; align-items: center; gap: 0.9rem;
        padding: 1.05rem 1.2rem; border-radius: 16px;
        background: rgba(8,12,32,0.48); backdrop-filter: blur(14px);
        border: 1px solid var(--border-main, rgba(255,255,255,0.08));
        text-decoration: none; color: var(--text-main);
        transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s, border-color 0.25s;
        position: relative; overflow: hidden;
      }
      .trainer-quick::before { content: ""; position: absolute; inset: 0; border-radius: inherit; background: var(--q-bg, transparent); opacity: 0; transition: opacity 0.25s; }
      .trainer-quick:hover { transform: translateY(-4px) scale(1.01); }
      .trainer-quick:hover::before { opacity: 1; }

      .trainer-quick--courses  { --q-bg: rgba(185,28,28,0.08);   border-color: rgba(185,28,28,0.2); }
      .trainer-quick--courses:hover  { border-color: rgba(185,28,28,0.52); box-shadow: 0 10px 32px rgba(185,28,28,0.14); color: #fca5a5; }
      .trainer-quick--trainees { --q-bg: rgba(16,185,129,0.07);  border-color: rgba(16,185,129,0.2); }
      .trainer-quick--trainees:hover { border-color: rgba(16,185,129,0.55); box-shadow: 0 10px 32px rgba(16,185,129,0.14); color: #6ee7b7; }
      .trainer-quick--quiz     { --q-bg: rgba(167,139,250,0.07); border-color: rgba(167,139,250,0.2); }
      .trainer-quick--quiz:hover     { border-color: rgba(167,139,250,0.5); box-shadow: 0 10px 32px rgba(167,139,250,0.13); color: #c4b5fd; }
      .trainer-quick--grades   { --q-bg: rgba(245,158,11,0.07);  border-color: rgba(245,158,11,0.2); }
      .trainer-quick--grades:hover   { border-color: rgba(245,158,11,0.5); box-shadow: 0 10px 32px rgba(245,158,11,0.12); color: #fde68a; }

      .trainer-quick__icon { width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1); border: 1px solid; }
      .trainer-quick:hover .trainer-quick__icon { transform: scale(1.12) rotate(-5deg); }
      .trainer-quick--courses  .trainer-quick__icon { background: rgba(185,28,28,0.14);   border-color: rgba(185,28,28,0.32);   color: #fca5a5; }
      .trainer-quick--trainees .trainer-quick__icon { background: rgba(16,185,129,0.15);  border-color: rgba(16,185,129,0.35);  color: #6ee7b7; }
      .trainer-quick--quiz     .trainer-quick__icon { background: rgba(167,139,250,0.15); border-color: rgba(167,139,250,0.35); color: #c4b5fd; }
      .trainer-quick--grades   .trainer-quick__icon { background: rgba(245,158,11,0.15);  border-color: rgba(245,158,11,0.35);  color: #fde68a; }
      .trainer-quick__icon svg { width: 20px; height: 20px; }
      .trainer-quick__body { flex: 1; min-width: 0; position: relative; z-index: 1; }
      .trainer-quick__title { font-size: 0.89rem; font-weight: 700; margin: 0 0 0.18rem; line-height: 1.3; }
      .trainer-quick__sub { font-size: 0.7rem; color: var(--text-subtle); margin: 0; line-height: 1.4; }
      .trainer-quick__arrow { font-size: 0.95rem; opacity: 0.35; position: relative; z-index: 1; transition: transform 0.25s, opacity 0.25s; flex-shrink: 0; }
      .trainer-quick:hover .trainer-quick__arrow { transform: translateX(-5px); opacity: 1; }

      /* ══ Courses Table Panel ══ */
      .dash-courses-panel { padding: 1.2rem 1.3rem; border-radius: 18px; background: rgba(8,12,32,0.5); backdrop-filter: blur(18px); border: 1px solid rgba(255,255,255,0.07); margin-bottom: 1.25rem; }
      .dash-courses-panel:hover { border-color: rgba(185,28,28,0.22); transition: border-color 0.25s; }
      .dash-panel__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: 0.5rem; }
      .dash-panel__title-wrap { display: flex; align-items: center; gap: 0.55rem; }
      .dash-panel__icon { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; background: rgba(185,28,28,0.1); border: 1px solid rgba(185,28,28,0.22); color: #fca5a5; }
      .dash-panel__icon svg { width: 12px; height: 12px; }
      .dash-panel__title { font-size: 0.82rem; font-weight: 700; color: var(--text-main); margin: 0; }

      .course-row {
        display: flex; align-items: center; gap: 1rem; padding: 0.85rem 0;
        border-bottom: 1px solid rgba(255,255,255,0.05); text-decoration: none; color: var(--text-main);
        transition: background 0.2s; border-radius: 8px; padding: 0.7rem 0.6rem;
      }
      .course-row:hover { background: rgba(185,28,28,0.06); }
      .course-row:last-child { border-bottom: none; }
      .course-row__badge { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: rgba(185,28,28,0.12); border: 1px solid rgba(185,28,28,0.25); color: #fca5a5; }
      .course-row__badge svg { width: 16px; height: 16px; }
      .course-row__body { flex: 1; min-width: 0; }
      .course-row__name { font-size: 0.88rem; font-weight: 700; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0; }
      .course-row__meta { font-size: 0.72rem; color: var(--text-subtle); margin: 0.1rem 0 0; }
      .course-row__arrow { font-size: 0.9rem; opacity: 0.3; flex-shrink: 0; transition: transform 0.2s, opacity 0.2s; }
      .course-row:hover .course-row__arrow { transform: translateX(-4px); opacity: 0.8; }

      /* ══ Skeleton ══ */
      .kpi-skeleton { height: 110px; border-radius: 18px; background: rgba(255,255,255,0.04); animation: skelPulse 1.5s ease-in-out infinite; }
      .row-skeleton  { height: 54px;  border-radius: 10px; background: rgba(255,255,255,0.04); animation: skelPulse 1.5s ease-in-out infinite; margin-bottom: 0.5rem; }
      @keyframes skelPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
  </head>
  <body data-page="dashboard">
    <div id="ntaHeader"></div>
    <main class="trainer-main">

      <!-- Hero -->
      <div class="ed-hero" style="padding: 1.5rem 2rem; min-height: auto;">
        <div>
          <p class="ed-hero__greeting" id="heroGreeting">مرحباً، المدرب</p>
          <h1 class="ed-hero__title">لوحة تحكم المدرب</h1>
          <p class="ed-hero__sub">متابعة الكورسات المسندة، المتدربين، والتقييمات</p>
        </div>
        <div class="ed-hero__side" style="flex-direction: row; align-items: center; gap: 0.75rem;">
          <div class="ed-hero__date" id="heroDate"></div>
          <div class="ed-hero__live"><span class="ed-hero__live-dot"></span><span>بيانات مباشرة</span></div>
        </div>
      </div>

      <!-- KPI Cards -->
      <div class="ed-section"><div class="ed-section__left">إحصائيات عامة</div></div>
      <div class="ed-kpi-row" id="kpiRow">
        <div class="ed-kpi ed-kpi--blue"></div><div class="ed-kpi ed-kpi--green"></div>
        <div class="ed-kpi ed-kpi--yellow"></div><div class="ed-kpi ed-kpi--slate"></div>
      </div>

      <!-- Quick Actions -->
      <div class="ed-section"><div class="ed-section__left">إجراءات سريعة</div></div>
      <div class="ed-actions-grid">
        <a href="view trainees/view-trainees.html" class="ed-action ed-action--list">
          <div class="ed-action__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          </div>
          <div class="ed-action__body">
            <div class="ed-action__title">المتدربون</div>
            <div class="ed-action__sub">عرض قائمة المتدربين المسجلين في كورساتك</div>
          </div>
          <span class="ed-action__arrow">←</span>
        </a>

        <a href="generate quiz/generate-quiz.html" class="ed-action ed-action--create">
          <div class="ed-action__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          </div>
          <div class="ed-action__body">
            <div class="ed-action__title">توليد اختبار بالذكاء الاصطناعي</div>
            <div class="ed-action__sub">إنشاء أسئلة اختبار تلقائياً</div>
          </div>
          <span class="ed-action__arrow">←</span>
        </a>
      </div>

      <!-- Assigned Courses -->
      <div class="ed-section"><div class="ed-section__left">الكورسات المسندة</div></div>
      <div id="coursesList">
        <div class="row-skeleton"></div>
        <div class="row-skeleton"></div>
        <div class="row-skeleton"></div>
      </div>

    </main>

    <script src="js/trainer-layout.js"></script>
    <script>
    var trainerToken = localStorage.getItem("trainer_token");
    if (!trainerToken) window.location.href = "login.html";
    function trainerFetch(url, options = {}) {
      options.headers = options.headers || {};
      options.headers["Authorization"] = "Bearer " + trainerToken;
      return fetch(url, options);
    }
    
    document.addEventListener("DOMContentLoaded", function() {
        // Load courses
        var p = trainerToken ? JSON.parse(atob(trainerToken.split(".")[1])) : null;
        var trainerId = p ? (p.sub || p.user_id) : null;
        if (!trainerId) return;
        
        trainerFetch("/api/courses/trainer/me/courses")
            .then(r => r.json())
            .then(courses => {
                let html = '<select id="courseSelect" onchange="loadSessions()"><option value="">اختر الكورس</option>';
                courses.forEach(c => {
                    html += `<option value="${c.id}">${c.title}</option>`;
                });
                html += '</select><div id="sessionsDiv"></div><div id="attendanceDiv"></div>';
                document.getElementById('ntaMainContent').innerHTML = html;
            });
    });

    function loadSessions() {
        var cid = document.getElementById("courseSelect").value;
        if(!cid) { document.getElementById("sessionsDiv").innerHTML = ""; return; }
        
        trainerFetch("/api/courses/" + cid + "/sessions")
            .then(r => r.json())
            .then(sessions => {
                let html = '<select id="sessionSelect" onchange="loadAttendance()"><option value="">اختر الجلسة</option>';
                sessions.forEach(s => {
                    html += `<option value="${s.id}">${s.topic}</option>`;
                });
                html += '</select>';
                document.getElementById('sessionsDiv').innerHTML = html;
                document.getElementById('attendanceDiv').innerHTML = "";
            });
    }

    function loadAttendance() {
        var sid = document.getElementById("sessionSelect").value;
        if(!sid) { document.getElementById("attendanceDiv").innerHTML = ""; return; }
        
        trainerFetch("/api/attendance/session/" + sid)
            .then(r => r.json())
            .then(data => {
                let att = data.attendance;
                let html = '<table class="nta-table"><thead><tr><th>الاسم</th><th>الرقم القومي</th><th>الحالة</th></tr></thead><tbody>';
                att.forEach(t => {
                    html += `<tr>
                        <td>${t.name}</td>
                        <td>${t.national_id}</td>
                        <td>
                            <select id="status_${t.national_id}">
                                <option value="pending" ${t.status==='pending'?'selected':''}>-</option>
                                <option value="present" ${t.status==='present'?'selected':''}>حاضر</option>
                                <option value="absent" ${t.status==='absent'?'selected':''}>غائب</option>
                                <option value="excused" ${t.status==='excused'?'selected':''}>معتذر</option>
                            </select>
                        </td>
                    </tr>`;
                });
                html += '</tbody></table><br><button class="nta-btn" onclick="saveAttendance()">حفظ الحضور</button>';
                document.getElementById('attendanceDiv').innerHTML = html;
            });
    }

    function saveAttendance() {
        var sid = document.getElementById("sessionSelect").value;
        var selects = document.querySelectorAll("select[id^='status_']");
        var records = [];
        selects.forEach(sel => {
            records.push({
                national_id: sel.id.replace("status_", ""),
                status: sel.value
            });
        });
        
        trainerFetch("/api/attendance/session/" + sid, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(records)
        }).then(r => {
            if(r.ok) {
                alert("تم الحفظ بنجاح");
            } else {
                alert("حدث خطأ أثناء الحفظ");
            }
        });
    }
</script>
</body>
</html>
