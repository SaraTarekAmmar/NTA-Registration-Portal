<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      if (window.location.pathname.endsWith('/index.html')) {
        window.location.replace(window.location.pathname.replace(/\/index\.html$/, '/'));
      }
      try {
        var theme = localStorage.getItem("nta-theme");
        if (theme === "light") {
          document.documentElement.classList.remove("dark");
        } else {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>
    <link rel="icon" type="image/png" href="/nta-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NTA Registration Portal</title>
    <script type="module" crossorigin src="/assets/index-BdtE0X_B.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DURxJaep.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
