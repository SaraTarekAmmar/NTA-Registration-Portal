<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script src="/common/js/theme.js"></script>
    <link rel="stylesheet" href="/common/css/theme.css?v=3" />
    <!-- data-nta-theme-injected -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ملف المتدرب - الأكاديمية الوطنية للتدريب</title>
    <link rel="stylesheet" href="trainee.css" />
    <link rel="stylesheet" href="header/header.css" />
    <link rel="stylesheet" href="chat/chat.css?v=3" />
    <link rel="stylesheet" href="admin.css" />
    <link rel="stylesheet" href="admin-portal.css" />
    <link rel="stylesheet" href="admin-theme.css" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── تحليل المتدرب tab highlight ── */
      .admin-profile__tab--analysis {
        position: relative;
      }
      .admin-profile__tab--analysis::after {
        content: "جديد";
        position: absolute;
        top: -4px;
        left: -4px;
        font-size: 0.55rem;
        font-weight: 800;
        padding: 1px 5px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent), #06b6d4);
        color: var(--text-on-accent);
        letter-spacing: 0.03em;
      }
      /* ── Analysis panel layout ── */
      .ap-analysis {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        padding: 0.25rem 0;
      }
      .ap-scores {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.65rem;
      }
      @media (max-width: 600px) {
        .ap-scores {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      .ap-score-chip {
        padding: 0.85rem 0.9rem;
        border-radius: 14px;
        text-align: center;
        background: rgba(8, 12, 32, 0.6);
        border: 1px solid var(--border-main);
        transition: transform 0.2s;
        cursor: default;
      }
      .ap-score-chip:hover {
        transform: translateY(-2px);
      }
      .ap-score-chip__lbl {
        font-size: 0.62rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.35rem;
      }
      .ap-score-chip__val {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--text-main);
      }
      .ap-score-chip--indigo {
        border-color: rgba(99, 102, 241, 0.3);
      }
      .ap-score-chip--indigo .ap-score-chip__lbl {
        color: var(--accent-hover);
      }
      .ap-score-chip--indigo .ap-score-chip__val {
        color: #a5b4fc;
        text-shadow: 0 0 18px rgba(99, 102, 241, 0.4);
      }
      .ap-score-chip--green {
        border-color: rgba(34, 197, 94, 0.3);
      }
      .ap-score-chip--green .ap-score-chip__lbl {
        color: var(--color-success-soft);
      }
      .ap-score-chip--green .ap-score-chip__val {
        color: var(--color-success-soft);
        text-shadow: 0 0 18px rgba(34, 197, 94, 0.35);
      }
      .ap-score-chip--red {
        border-color: rgba(239, 68, 68, 0.3);
      }
      .ap-score-chip--red .ap-score-chip__lbl {
        color: var(--color-error-soft);
      }
      .ap-score-chip--red .ap-score-chip__val {
        color: var(--color-error-soft);
        text-shadow: 0 0 18px rgba(239, 68, 68, 0.3);
      }
      .ap-score-chip--cyan {
        border-color: rgba(6, 182, 212, 0.3);
      }
      .ap-score-chip--cyan .ap-score-chip__lbl {
        color: var(--color-kpi-cyan);
      }
      .ap-score-chip--cyan .ap-score-chip__val {
        color: var(--color-kpi-cyan);
        text-shadow: 0 0 18px rgba(6, 182, 212, 0.3);
      }
      .ap-score-chip--amber {
        border-color: rgba(245, 158, 11, 0.3);
      }
      .ap-score-chip--amber .ap-score-chip__lbl {
        color: var(--theme-btn-color);
      }
      .ap-score-chip--amber .ap-score-chip__val {
        color: var(--theme-btn-color);
        text-shadow: 0 0 18px rgba(245, 158, 11, 0.3);
      }

      .ap-row2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      @media (max-width: 700px) {
        .ap-row2 {
          grid-template-columns: 1fr;
        }
      }

      .ap-panel {
        padding: 1.1rem 1.25rem;
        border-radius: 16px;
        background: rgba(8, 12, 32, 0.5);
        border: 1px solid var(--border-main);
      }
      .ap-panel__title {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 0 0 0.85rem;
        display: flex;
        align-items: center;
        gap: 0.45rem;
      }
      .ap-panel__title svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }
      .ap-panel__title--indigo {
        color: var(--accent-hover);
      }
      .ap-panel__title--green {
        color: var(--color-success-soft);
      }
      .ap-panel__title--red {
        color: var(--color-error-soft);
      }
      .ap-panel__title--cyan {
        color: var(--color-kpi-cyan);
      }
      .ap-panel__title--amber {
        color: var(--theme-btn-color);
      }

      .ap-qs {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.55rem;
      }
      @media (max-width: 600px) {
        .ap-qs {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      .ap-qs-item {
        padding: 0.7rem;
        border-radius: 12px;
        text-align: center;
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid var(--border-main);
      }
      .ap-qs-item__lbl {
        font-size: 0.62rem;
        font-weight: 700;
        color: var(--text-subtle);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 0.25rem;
      }
      .ap-qs-item__val {
        font-size: 1.1rem;
        font-weight: 800;
      }

      .ap-ai-note {
        font-size: 0.84rem;
        color: var(--text-muted);
        font-style: italic;
        line-height: 1.7;
        margin: 0;
      }
      .ap-flags-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }
      .ap-flags-list li {
        font-size: 0.78rem;
        color: var(--color-error-pale);
        padding: 0.35rem 0.6rem;
        border-radius: 8px;
        background: rgba(239, 68, 68, 0.08);
        border: 1px solid rgba(239, 68, 68, 0.15);
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .ap-flags-list li::before {
        content: "⚠";
        font-size: 0.68rem;
      }
      .ap-flags-none {
        font-size: 0.78rem;
        color: var(--color-success-soft);
        padding: 0.35rem 0.6rem;
        border-radius: 8px;
        background: rgba(74, 222, 128, 0.07);
        border: 1px solid rgba(74, 222, 128, 0.2);
      }

      .ap-skills {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }
      .ap-skill-chip {
        padding: 0.3rem 0.75rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 700;
        background: rgba(99, 102, 241, 0.1);
        border: 1px solid rgba(99, 102, 241, 0.28);
        color: #a5b4fc;
      }

      .ap-charts-row {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 1rem;
      }
      @media (max-width: 700px) {
        .ap-charts-row {
          grid-template-columns: 1fr;
        }
      }
      .ap-chart-box {
        padding: 1rem 1.1rem;
        border-radius: 14px;
        background: rgba(8, 12, 32, 0.5);
        border: 1px solid var(--border-main);
      }
      .ap-chart-box h4 {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--text-subtle);
        margin: 0 0 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .ap-att-summary {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.85rem;
        padding: 0.75rem 0.9rem;
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(51, 65, 85, 0.4);
      }
      .ap-att-bar {
        flex: 1;
        height: 8px;
        border-radius: 999px;
        background: rgba(30, 41, 59, 0.8);
        overflow: hidden;
      }
      .ap-att-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--color-success), var(--color-success-soft));
        transition: width 0.7s ease;
      }
      .ap-att-val {
        font-size: 1rem;
        font-weight: 800;
        color: var(--color-success-soft);
        min-width: 44px;
      }
      .ap-att-lbl {
        font-size: 0.72rem;
        color: var(--text-subtle);
      }

      .ap-att-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8rem;
      }
      .ap-att-table th {
        padding: 0.5rem 0.75rem;
        text-align: right;
        font-size: 0.68rem;
        font-weight: 700;
        color: var(--text-subtle);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-bottom: 1px solid var(--border-main);
        background: rgba(15, 23, 42, 0.5);
      }
      .ap-att-table td {
        padding: 0.6rem 0.75rem;
        border-bottom: 1px solid rgba(30, 41, 59, 0.4);
        color: var(--text-muted);
      }
      .ap-att-table tbody tr:last-child td {
        border-bottom: none;
      }
      .ap-att-table tbody tr:hover {
        background: rgba(99, 102, 241, 0.05);
      }
      .ap-att-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        display: inline-block;
        vertical-align: middle;
        margin-left: 4px;
      }
      .ap-att-dot--present {
        background: var(--color-success);
        box-shadow: 0 0 5px rgba(34, 197, 94, 0.5);
      }
      .ap-att-dot--absent {
        background: var(--color-error);
      }
      .ap-att-dot--excused {
        background: var(--color-warning);
      }

      .ap-course-banner {
        padding: 0.75rem 1.1rem;
        border-radius: 12px;
        margin-bottom: 0.25rem;
        background: linear-gradient(
          135deg,
          rgba(99, 102, 241, 0.12),
          rgba(6, 182, 212, 0.08)
        );
        border: 1px solid rgba(99, 102, 241, 0.25);
        display: flex;
        align-items: center;
        gap: 0.65rem;
      }
      .ap-course-banner svg {
        width: 16px;
        height: 16px;
        color: var(--accent-hover);
        flex-shrink: 0;
      }
      .ap-course-banner__name {
        font-size: 0.85rem;
        font-weight: 700;
        color: #c7d2fe;
      }
      .ap-course-banner__sub {
        font-size: 0.72rem;
        color: var(--text-subtle);
        margin-top: 0.1rem;
      }
      /* ── Attendance session cards ── */
      .ap-sess-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 0.75rem;
        margin-top: 0.65rem;
      }
      .ap-sess-card {
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid var(--border-main);
        background: rgba(8, 12, 32, 0.55);
        backdrop-filter: blur(12px);
        box-shadow:
          0 0 0 1px rgba(15, 23, 42, 0.8),
          0 8px 24px -12px rgba(0, 0, 0, 0.5);
        transition:
          border-color 0.25s,
          box-shadow 0.25s;
        animation: admCardIn 0.35s ease-out backwards;
      }
      .ap-sess-card:hover {
        border-color: rgba(99, 102, 241, 0.35);
        box-shadow:
          0 0 0 1px rgba(15, 23, 42, 0.8),
          0 0 20px rgba(99, 102, 241, 0.1),
          0 8px 28px -12px rgba(0, 0, 0, 0.5);
      }
      .ap-sess-card--present {
        border-color: rgba(34, 197, 94, 0.2);
      }
      .ap-sess-card--present:hover {
        border-color: rgba(34, 197, 94, 0.4);
        box-shadow:
          0 0 0 1px rgba(15, 23, 42, 0.8),
          0 0 18px rgba(34, 197, 94, 0.1);
      }
      .ap-sess-card--absent {
        border-color: rgba(239, 68, 68, 0.2);
      }
      .ap-sess-card--absent:hover {
        border-color: rgba(239, 68, 68, 0.4);
        box-shadow:
          0 0 0 1px rgba(15, 23, 42, 0.8),
          0 0 18px rgba(239, 68, 68, 0.1);
      }
      .ap-sess-card--excused {
        border-color: rgba(245, 158, 11, 0.2);
      }
      .ap-sess-card--excused:hover {
        border-color: rgba(245, 158, 11, 0.4);
        box-shadow:
          0 0 0 1px rgba(15, 23, 42, 0.8),
          0 0 18px rgba(245, 158, 11, 0.1);
      }

      .ap-sess-card__head {
        padding: 0.6rem 0.85rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        border-bottom: 1px solid rgba(51, 65, 85, 0.35);
        background: rgba(15, 23, 42, 0.45);
      }
      .ap-sess-card__name {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--text-main);
      }
      .ap-sess-card__right {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-shrink: 0;
      }
      .ap-sess-card__date {
        font-size: 0.7rem;
        font-weight: 600;
        padding: 0.15rem 0.55rem;
        border-radius: 999px;
        background: rgba(51, 65, 85, 0.4);
        border: 1px solid rgba(71, 85, 105, 0.6);
        color: var(--text-muted);
      }
      .ap-sess-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.18rem 0.6rem;
        border-radius: 999px;
        font-size: 0.68rem;
        font-weight: 700;
        white-space: nowrap;
      }
      .ap-sess-badge--present {
        background: rgba(34, 197, 94, 0.12);
        border: 1px solid rgba(34, 197, 94, 0.35);
        color: var(--color-success-soft);
        text-shadow: 0 0 8px rgba(74, 222, 128, 0.4);
      }
      .ap-sess-badge--absent {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: var(--color-error-soft);
        text-shadow: 0 0 8px rgba(248, 113, 113, 0.35);
      }
      .ap-sess-badge--excused {
        background: rgba(245, 158, 11, 0.1);
        border: 1px solid rgba(245, 158, 11, 0.3);
        color: var(--theme-btn-color);
        text-shadow: 0 0 8px rgba(251, 191, 36, 0.35);
      }
      .ap-sess-card__body {
        padding: 0.65rem 0.85rem;
      }
      .ap-sess-photos {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
      }
      .ap-sess-photo {
        border-radius: 10px;
        overflow: hidden;
        position: relative;
        border: 1px solid rgba(51, 65, 85, 0.4);
        cursor: pointer;
        background: var(--assign-card-hover-bg);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .ap-sess-photo:hover {
        border-color: rgba(99, 102, 241, 0.5);
        box-shadow: 0 0 12px rgba(99, 102, 241, 0.15);
      }
      .ap-sess-photo img {
        width: 100%;
        height: 85px;
        object-fit: cover;
        display: block;
        transition: transform 0.35s;
      }
      .ap-sess-photo:hover img {
        transform: scale(1.05);
      }
      .ap-sess-photo__zoom {
        position: absolute;
        top: 0.3rem;
        left: 0.3rem;
        width: 22px;
        height: 22px;
        border-radius: 7px;
        background: rgba(8, 12, 32, 0.75);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(99, 102, 241, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #a5b4fc;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .ap-sess-photo:hover .ap-sess-photo__zoom {
        opacity: 1;
      }
      .ap-sess-photo__zoom svg {
        width: 12px;
        height: 12px;
      }
      .ap-sess-photo__label {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 0.25rem 0.5rem;
        background: linear-gradient(0deg, rgba(8, 12, 32, 0.95), transparent);
        font-size: 0.64rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: var(--text-muted);
      }
      .ap-sess-photo__time {
        color: var(--color-info-soft);
        font-size: 0.65rem;
        font-weight: 700;
      }
      .ap-sess-reason {
        font-size: 0.78rem;
        color: var(--text-muted);
        font-style: italic;
        line-height: 1.6;
        padding: 0.45rem 0.65rem;
        border-radius: 10px;
      }
      .ap-sess-reason__type {
        font-size: 0.65rem;
        font-weight: 700;
        font-style: normal;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        display: block;
        margin-bottom: 0.2rem;
      }
      .ap-sess-reason--excused {
        background: rgba(245, 158, 11, 0.08);
        border: 1px solid rgba(245, 158, 11, 0.18);
        color: var(--theme-btn-color);
      }
      .ap-sess-reason--absent {
        background: rgba(239, 68, 68, 0.06);
        border: 1px solid rgba(239, 68, 68, 0.15);
        color: var(--color-error-pale);
      }

      /* ── Stage Quick Action Buttons ── */
      .admin-profile-stage__btn {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.55rem 1.1rem;
        border-radius: 12px;
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid transparent;
        white-space: nowrap;
      }
      .admin-profile-stage__btn--accept {
        background: linear-gradient(135deg, var(--color-success), var(--color-success));
        color: var(--text-on-accent);
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
      }
      .admin-profile-stage__btn--accept:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 18px rgba(16, 185, 129, 0.35);
        background: linear-gradient(135deg, var(--color-success-soft), var(--color-success));
      }
      .admin-profile-stage__btn--reject {
        background: var(--assign-card-hover-bg);
        border: 1px solid rgba(239, 68, 68, 0.4);
        color: var(--color-error-soft);
      }
      .admin-profile-stage__btn--reject:hover {
        background: rgba(239, 68, 68, 0.1);
        border-color: var(--color-error);
        transform: translateY(-2px);
        box-shadow: 0 6px 18px rgba(239, 68, 68, 0.15);
      }
      .admin-profile-stage__btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
      }
      .ap-sess-reason--excused .ap-sess-reason__type {
        color: var(--theme-btn-color);
      }
      .ap-sess-reason--absent {
        background: rgba(239, 68, 68, 0.07);
        border: 1px solid rgba(239, 68, 68, 0.18);
      }
      .ap-sess-reason--absent .ap-sess-reason__type {
        color: var(--color-error-soft);
      }
      /* ── Enhanced profile tabs ── */
      .admin-profile__tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        padding: 0.85rem 1rem;
        border-radius: 14px;
        background: rgba(8, 12, 32, 0.5);
        backdrop-filter: blur(14px);
        border: 1px solid var(--border-main);
        margin-bottom: 1.25rem;
      }
      .admin-profile__tab {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.42rem 0.85rem;
        border-radius: 999px;
        border: 1px solid var(--border-main);
        background: rgba(15, 23, 42, 0.8);
        color: var(--text-subtle);
        font-size: 0.78rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .admin-profile__tab svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }
      .admin-profile__tab:hover {
        border-color: rgba(99, 102, 241, 0.45);
        color: #a5b4fc;
        background: rgba(99, 102, 241, 0.08);
      }
      .admin-profile__tab--active {
        background: rgba(99, 102, 241, 0.18) !important;
        border-color: rgba(99, 102, 241, 0.65) !important;
        color: #c7d2fe !important;
        box-shadow: 0 0 14px rgba(99, 102, 241, 0.2);
      }

      /* tab accent colors per section */
      .admin-profile__tab[data-tab="personal"]:hover,
      .admin-profile__tab[data-tab="personal"].admin-profile__tab--active {
        --tab-c: rgba(99, 102, 241, 0.65);
        --tab-bg: rgba(99, 102, 241, 0.18);
        --tab-txt: #c7d2fe;
      }
      .admin-profile__tab[data-tab="contact"]:hover,
      .admin-profile__tab[data-tab="contact"].admin-profile__tab--active {
        --tab-c: rgba(6, 182, 212, 0.6);

        color: var(--tab-txt);
        box-shadow: 0 0 14px var(--tab-c, rgba(99, 102, 241, 0.2));

      /* ── Panel field cards ── */
      .ap-panel-section {
        margin-bottom: 1.25rem;
      }
      .ap-panel-section:last-child {
        margin-bottom: 0;
      }
      .ap-section-label {
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-subtle);
        margin: 0 0 0.6rem;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding-bottom: 0.4rem;
        border-bottom: 1px solid rgba(51, 65, 85, 0.4);
      }
      .ap-section-label::before {
        content: "";
        width: 3px;
        height: 12px;
        border-radius: 999px;
        background: var(--ap-accent, linear-gradient(180deg, var(--accent), var(--color-info)));
        flex-shrink: 0;
      }
      .ap-fields-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 0.55rem;
      }
      .ap-field {
        padding: 0.65rem 0.85rem;
        border-radius: 12px;
        background: rgba(8, 12, 32, 0.5);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border-main);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .ap-field:hover {
        border-color: rgba(99, 102, 241, 0.3);
        box-shadow: 0 0 10px rgba(99, 102, 241, 0.07);
      }
      .ap-field__label {
        font-size: 0.62rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-subtle);
        margin-bottom: 0.25rem;
      }
      .ap-field__value {
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--text-main);
        line-height: 1.4;
        word-break: break-word;
      }
      .ap-field--full {
        grid-column: 1 / -1;
      }
      .ap-field--accent {
        border-color: rgba(99, 102, 241, 0.3);
      }
      .ap-field--accent .ap-field__value {
        color: #a5b4fc;
      }
      .ap-field--green .ap-field__value {
        color: var(--color-success-soft);
      }
      .ap-field--cyan .ap-field__value {
        color: var(--color-kpi-cyan);
      }
      .ap-field--amber .ap-field__value {
        color: var(--theme-btn-color);
      }
      .ap-field--red .ap-field__value {
        color: var(--color-error-soft);
      }

      /* skill chip inside panel */
      .ap-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.22rem 0.65rem;
        border-radius: 999px;
        margin: 0.15rem;
        font-size: 0.72rem;
        font-weight: 700;
      }
      .ap-chip--indigo {
        background: rgba(99, 102, 241, 0.12);
        border: 1px solid rgba(99, 102, 241, 0.3);
        color: #a5b4fc;
      }
      .ap-chip--cyan {
        background: rgba(6, 182, 212, 0.1);
        border: 1px solid rgba(6, 182, 212, 0.3);
        color: var(--color-kpi-cyan);
      }
      .ap-chip--amber {
        background: rgba(245, 158, 11, 0.1);
        border: 1px solid rgba(245, 158, 11, 0.3);
        color: var(--theme-btn-color);
      }
      .ap-chip--green {
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: var(--color-success-soft);
      }
      .ap-chip--purple {
        background: rgba(168, 85, 247, 0.1);
        border: 1px solid rgba(168, 85, 247, 0.3);
        color: #d8b4fe;
      }
      .ap-chip--red {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: var(--color-error-soft);
      }

      /* history card (academic/professional) */
      .ap-history-card {
        padding: 0.85rem 1rem;
        border-radius: 14px;
        margin-bottom: 0.65rem;
        background: rgba(8, 12, 32, 0.5);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border-main);
        position: relative;
        overflow: hidden;
        animation: admCardIn 0.35s ease-out backwards;
      }
      .ap-history-card::before {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 3px;
        background: var(
          --ap-card-accent,
          linear-gradient(180deg, var(--accent), var(--color-info))
        );
      }
      .ap-history-card__title {
        font-size: 0.92rem;
        font-weight: 700;
        color: var(--text-main);
        margin: 0 0 0.15rem;
      }
      .ap-history-card__sub {
        font-size: 0.78rem;
        color: var(--text-subtle);
        margin: 0 0 0.5rem;
      }
      .ap-history-card__body {
        font-size: 0.8rem;
        color: var(--text-muted);
        line-height: 1.6;
      }
      .ap-history-card__meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        margin-top: 0.5rem;
      }

      /* doc link */
      .ap-doc-link {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.8rem;
        border-radius: 8px;
        background: rgba(99, 102, 241, 0.1);
        border: 1px solid rgba(99, 102, 241, 0.3);
        color: #a5b4fc;
        font-size: 0.78rem;
        font-weight: 700;
        text-decoration: none;
        transition: all 0.2s;
      }
      .ap-doc-link:hover {
        background: rgba(99, 102, 241, 0.2);
        border-color: rgba(99, 102, 241, 0.55);
      }
      .ap-doc-link svg {
        width: 13px;
        height: 13px;
      }

      /* score bar for cognition */
      .ap-score-bar-wrap {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .ap-score-bar {
        flex: 1;
        height: 6px;
        border-radius: 999px;
        background: rgba(30, 41, 59, 0.8);
        overflow: hidden;
      }
      .ap-score-bar__fill {
        height: 100%;

        transition: width 0.7s ease;
      }
      .ap-score-bar__val {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--text-muted);
        min-width: 34px;
        text-align: left;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      /* Recs grid */
      .ap-recs-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 0.75rem;
        margin-top: 0.65rem;
      }
      .ap-rec-card {
        padding: 1rem 1.1rem;
        border-radius: 16px;
        background: rgba(8, 12, 32, 0.55);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border-main);
        box-shadow: 0 8px 24px -12px rgba(0, 0, 0, 0.4);
        transition:
          border-color 0.25s,
          box-shadow 0.25s,
          transform 0.25s;
        animation: admCardIn 0.35s ease-out backwards;
        position: relative;
        overflow: hidden;
      }
      .ap-rec-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--rc-accent, linear-gradient(90deg, var(--accent), #06b6d4));
      }
      .ap-rec-card:hover {
        transform: translateY(-3px);
        border-color: rgba(99, 102, 241, 0.35);
        box-shadow:
          0 0 0 1px rgba(15, 23, 42, 0.8),
          0 0 22px rgba(99, 102, 241, 0.12),
          0 12px 32px -12px rgba(0, 0, 0, 0.5);
      }
      .ap-rec-card__badge {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.18rem 0.6rem;
        border-radius: 999px;
        font-size: 0.65rem;
        font-weight: 700;
        margin-bottom: 0.6rem;
      }
      .ap-rec-card__title {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--text-main);
        margin: 0 0 0.35rem;
        line-height: 1.4;
      }
      .ap-rec-card__reason {
        font-size: 0.78rem;
        color: var(--text-subtle);
        line-height: 1.65;
        margin: 0 0 0.65rem;
      }
      .ap-rec-card__chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
      }
      .ap-analysis-header {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-subtle);
        margin: 0 0 0.75rem;
      }
      .ap-analysis-header::before {
        content: "";
        width: 3px;
        height: 13px;
        border-radius: 999px;
        background: linear-gradient(180deg, var(--accent), var(--color-info));
        flex-shrink: 0;
      }
      .ap-profile-strength {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 0.55rem;
        margin-bottom: 1.25rem;
      }
      .ap-strength-item {
        padding: 0.65rem 0.85rem;
        border-radius: 12px;
        background: rgba(8, 12, 32, 0.5);
        border: 1px solid var(--border-main);

      .ap-strength-item__lbl {
        font-size: 0.62rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-subtle);
        margin-bottom: 0.3rem;

      .ap-strength-bar {
        height: 5px;

        background: rgba(30, 41, 59, 0.8);

        margin-bottom: 0.3rem;
      }
      .ap-strength-bar__fill {

        color: var(--text-muted);
      }
    </style>

      function _profileToast(msg, type) {
        var ct = document.getElementById("profileToastContainer");
        if (!ct) {
          ct = document.createElement("div");
          ct.id = "profileToastContainer";
          ct.style.cssText = "position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:0.5rem;pointer-events:none;";
          document.body.appendChild(ct);
        }
        var t = document.createElement("div");
        t.style.cssText = "padding:0.7rem 1.2rem;border-radius:10px;font-family:Tajawal,sans-serif;font-size:0.88rem;font-weight:600;color:#fff;pointer-events:auto;"
          + (type === "error"
            ? "background:rgba(239,68,68,0.9);border:1px solid rgba(239,68,68,0.5);"
            : "background:rgba(16,185,129,0.9);border:1px solid rgba(16,185,129,0.5);");

        ct.appendChild(t);
        setTimeout(function() {
          t.style.opacity = "0"; t.style.transition = "opacity 0.3s";
          setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 300);

    <script>
      (function () {

        if (session.role !== "admin") {
          window.location.href = "index.html";
          return;
        }

        if (typeof window.authenticatedFetch !== "function") {
          window.location.href = "index.html";
          return;
        }

        let traineeData = null;
        var stages = [
          { id: 1, label: "الفرز الإلكتروني" },
          { id: 2, label: "الاستعلام الأمني" },
          { id: 3, label: "الاختبار النفسي" },
          { id: 4, label: "اختبارات المعلومات العامة واللغة العربية" },
          { id: 5, label: "المقابلة الأولى" },
          { id: 6, label: "المقابلة الثانية" },
          { id: 7, label: "المسجلين بالبرنامج" },
        ];
        var params = new URLSearchParams(window.location.search);
        var traineeId = parseInt(params.get("id") || "0", 10);
        var courseId = params.get("course_id");

        var COURSE_NAMES = {
          c1: "التحول الرقمي في المؤسسات",
          c2: "أمن المعلومات والشبكات",
          c3: "مهارات القيادة الإدارية",
          c4: "تحليل البيانات والتقارير",
        };

        function getAnalysisData(tId, user, aiMatch, analytics) {
          analytics = analytics || {};
          const quiz = (traineeData && traineeData.application && traineeData.application.quiz_results) || { analytical: 85, creative: 70, strategic: 75 };
          const score = aiMatch ? aiMatch.match_score : ((traineeData && traineeData.application && traineeData.application.quiz_scores && traineeData.application.quiz_scores.total) || 230);
          
          var techSkillNames = (user.technical_skills || []).map(function(s){ return typeof s==='string'?s:s.skill_name; });
          
          let aiNote = aiMatch ? aiMatch.evidence : ("بناءً على ملف المتدرب، يظهر استعداده للمسار التقني. لديه مهارات قوية في " + (techSkillNames.length ? techSkillNames.slice(0,3).join(" و ") : "التحليل") + ".");
          let flags = aiMatch && aiMatch.analysis_json ? (aiMatch.analysis_json.red_flags || []) : (techSkillNames.length > 5 ? [] : ["يُنصح بتطوير المهارات التقنية"]);
          
          let requirements = [];
          let matchScores = [];
          if (aiMatch && aiMatch.analysis_json && aiMatch.analysis_json.requirement_matches) {
            aiMatch.analysis_json.requirement_matches.slice(0, 5).forEach(m => {
                requirements.push(m.requirement);
                matchScores.push(m.score);
            });
          } else {
            requirements = ["تواصل", "قيادة", "تحليل", "تقني", "إبداع"];
            matchScores = [80, 70, 90, 65, 85];
          }

          return {
            score: score,
            isAiScore: !!aiMatch,
            sessions: analytics.attSessions ? analytics.attSessions.length : 0,
            passed: analytics.attSessions ? analytics.attSessions.filter(s => s.status === "present").length : 0,
            failed: analytics.attSessions ? analytics.attSessions.filter(s => s.status === "absent").length : 0,
            rank: "#" + (Math.floor(Math.random() * 10) + 1),
            grade: score > 85 ? "امتياز" : score > 75 ? "جيد جداً" : score > 60 ? "جيد" : "مقبول",
            skills: techSkillNames.length ? techSkillNames : ["تواصل", "قيادة"],
            ai: aiNote,
            flags: flags,
            skillProgress: analytics.skillProgress || [10, 30, 50, 75, 90],
            requirements: requirements,
            matchScores: matchScores,
            attSessions: analytics.attSessions || []
          };
        }

        /* ══════════════════════════════════════════════════════
           API DATA FETCHING
        ══════════════════════════════════════════════════════ */
        async function fetchProfile() {
          if (!traineeId) return;
          try {
            const res = await window.authenticatedFetch(`/api/admin/trainees/${traineeId}`);
            const data = await res.json();
            
            if (data.detail) {
              _profileToast("خطأ: " + data.detail, "error");
              return;
            }
            traineeData = data;
            
            // Update title based on context
            var params = new URLSearchParams(window.location.search);
            var from = params.get('from');
            var titleEl = document.getElementById("profileName");
            if (from === 'applicants' && titleEl) {
                titleEl.textContent = "ملف المرشح";
            } else if (titleEl) {
                titleEl.textContent = "ملف المتدرب";
            }

            renderHeader(data.user);
            renderPanels(data.user, data.application);
            initProfileCharts(data.user);

            // --- Smart Course Resolution ---
            let targetCourseId = courseId || (data.application ? data.application.course_id : null);
            let targetCourseName = (data.application && data.application.course_title) || "البرنامج التدريبي";
            
            if (targetCourseId) {
              COURSE_NAMES[targetCourseId] = targetCourseName;
              
              try {
                const [aiMatch, analytics] = await Promise.all([
                  window.authenticatedFetch(`/api/admin/cv-matching-result/${traineeId}/${targetCourseId}`).then(r => r.status === 404 ? null : r.json()),
                  window.authenticatedFetch(`/api/admin/trainee-analytics/${traineeId}/${targetCourseId}`).then(r => r.json())
                ]);
                
                var a = getAnalysisData(traineeId, data.user, aiMatch && aiMatch.id ? aiMatch : null, analytics);
                setTimeout(function () {
                    buildAnalysisSection(a, targetCourseName);
                }, 100);
              } catch (e) {
                console.error("Analysis fetch error:", e);
                var a = getAnalysisData(traineeId, data.user, null, null);
                buildAnalysisSection(a, targetCourseName);
              }
            } else {
              // Fallback if no enrollment found
              var a = getAnalysisData(traineeId, data.user, null, null);
              var titleEl = document.getElementById("metricsSectionTitle");
              if (titleEl) titleEl.textContent = "التوصيات والتحليل";
              setTimeout(async function () {
                await buildRecommendations();
              }, 100);
            }
          } catch (err) {
            console.error("Fetch error:", err);
            _profileToast("تعذر تحميل بيانات المتدرب من الخادم", "error");
          }
        }

        function getStage(stageId) {
          return (
            stages.find((s) => s.id === stageId) || {
              id: stageId,
              label: "غير معروف",

          document.getElementById("profileStageBadge").textContent =
            stage.label;

                var label = (typeof s === "string") ? s : (s.skill_name || s.name || s.category || "—");

              '<div class="ap-field__label">' +

            section(

            section(

          /* ── 4. الخلفية الأكاديمية ── */

          /* ── 7. اختبار القدرات المعرفية ── */

              };
              lb.innerHTML =
                '<div style="max-width:min(800px,92vw);width:100%;border-radius:18px;overflow:hidden;border:1px solid rgba(99,102,241,0.35);background:rgba(8,12,32,0.97);box-shadow:0 0 0 1px rgba(15,23,42,0.95),0 30px 70px rgba(0,0,0,0.8);animation:lbIn 0.22s cubic-bezier(0.34,1.56,0.64,1) both;" onclick="event.stopPropagation()">' +
                '<div style="padding:0.7rem 1rem;border-bottom:1px solid var(--border-main);display:flex;align-items:center;justify-content:space-between;">' +
                '<div style="display:flex;align-items:center;gap:0.5rem;font-size:0.85rem;font-weight:700;color:var(--text-main);">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-hover)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>' +
                '<span>ملخص الذكاء الاصطناعي المرئي</span>' +
                '</div>' +
                '<button onclick="apCloseVideoLightbox()" style="width:28px;height:28px;border-radius:8px;border:1px solid rgba(51,65,85,0.7);background:var(--bg-card);color:var(--text-subtle);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.85rem;">✕</button>' +
                '</div>' +
                '<video id="apLbVideo" style="width:100%;max-height:75vh;display:block;background:#000;" src="" controls autoplay></video>' +
                '</div>';
              document.body.appendChild(lb);
            }
            var vid = document.getElementById("apLbVideo");
            vid.src = src;
            lb.style.display = "flex";
            requestAnimationFrame(function () {
              lb.style.opacity = "1";
            });
          };
          window.apCloseVideoLightbox = function () {
            var lb = document.getElementById("apVideoLightbox");
            var vid = document.getElementById("apLbVideo");
            if (lb) {
              lb.style.opacity = "0";
              if (vid) vid.pause();
              setTimeout(function () {
                lb.style.display = "none";
                if (vid) vid.src = "";
              }, 200);
            }
          };



        async function buildRecommendations() {
          if (!traineeData || !traineeData.user) return;
          var user = traineeData.user;
          var app = traineeData.application || {};

          var techSkills = Array.isArray(user.technical_skills) ? user.technical_skills : [];
          var softSkills = Array.isArray(user.soft_skills) ? user.soft_skills : [];
          var interests = Array.isArray(user.interests) ? user.interests : [];
          var quiz = app.quiz_results || {};
          var yrsExp = user.years_experience || 0;

          // Strength scores derived from profile data
          var techScore = Math.min(100, techSkills.length * 14 + 10);
          var softScore = Math.min(100, softSkills.length * 18 + 10);
          var quizScore = quiz.analytical
            ? Math.round(
                (quiz.analytical +
                  (quiz.strategic || 0) +
                  (quiz.creative || 0)) /
                  3,
              )
            : 60;
          var expScore = Math.min(100, yrsExp * 14 + 20);
          var interScore = 75; // Baseline

          function bar(val, color) {
            return (
              '<div class="ap-strength-bar"><div class="ap-strength-bar__fill" style="width:' +
              val +
              "%;background:" +
              color +
              '"></div></div>'
            );
          }

          // Fetch real courses from API
          let courses = [];
          try {
            const resp = await authenticatedFetch('/api/courses');
            courses = await resp.json();
          } catch (e) {
            console.error("Failed to fetch courses for recommendations", e);
          }

          // Course catalogue with match logic
          var CATALOGUE = courses.map(c => {
             return {
                id: c.id,
                name: c.title_ar || c.title,
                tags: (c.classification ? [c.classification] : []).concat(c.course_type ? [c.course_type] : []),
                accent: c.course_type === 'Practical' ? "linear-gradient(90deg,var(--accent),var(--accent-hover))" : "linear-gradient(90deg,var(--color-success),var(--color-success-soft))",
                badgeTxt: "مُطابق",
                badgeBg: "rgba(99,102,241,0.12)",
                badgeColor: "#a5b4fc",
                badgeBorder: "rgba(99,102,241,0.3)",
                reason: "يتوافق مع مهاراتك في " + (c.classification || "هذا المجال") + ".",
                chips: [c.course_type === 'Practical' ? "ap-chip--indigo" : "ap-chip--green"],
                chipLabels: [c.classification || "عام", c.skill_level || "متوسط"]
             };
          });

          // Score each course by tag overlap (simple heuristic)
          var allTags = techSkills
            .concat(softSkills, interests)
            .map(function (t) {
              return t.toLowerCase();
            });
          
          var scored = CATALOGUE.map(function (c) {
            var overlap = c.tags.filter(function (t) {
              return allTags.some(at => at.includes(t.toLowerCase()) || t.toLowerCase().includes(at));
            }).length;
            return { course: c, score: overlap };
          }).sort(function (a, b) {
            return b.score - a.score;
          });

          var topRecs = scored.slice(0, 3);

          var recCards = topRecs
            .map(function (item, i) {
              var c = item.course;
              var delay = i * 0.1;
              return (
                '<div class="ap-rec-card" style="--rc-accent:' +
                c.accent +
                ";animation-delay:" +
                delay +
                's">' +
                '<span class="ap-rec-card__badge" style="background:' +
                c.badgeBg +
                ";border:1px solid " +
                c.badgeBorder +
                ";color:" +
                c.badgeColor +
                '">★ ' +
                c.badgeTxt +
                "</span>" +
                '<div class="ap-rec-card__title">' +
                c.name +
                "</div>" +
                '<div class="ap-rec-card__reason">' +
                c.reason +
                "</div>" +
                '<div class="ap-rec-card__chips">' +
                c.chipLabels
                  .map(function (l, ci) {
                    return (
                      '<span class="ap-chip ' +
                      c.chips[ci % c.chips.length] +
                      '">' +
                      l +
                      "</span>"
                    );
                  })
                  .join("") +
                "</div>" +
                "</div>"
              );
            })
            .join("");

          var html =
            // Profile strength section
            '<div class="ap-analysis-header">تحليل ملف المرشح</div>' +
            '<div class="ap-profile-strength">' +
            '<div class="ap-strength-item"><div class="ap-strength-item__lbl">المهارات التقنية</div>' +
            bar(techScore, "linear-gradient(90deg,var(--accent),var(--accent-hover))") +
            '<div class="ap-strength-val">' +
            techScore +
            "%</div></div>" +
            '<div class="ap-strength-item"><div class="ap-strength-item__lbl">المهارات الشخصية</div>' +
            bar(softScore, "linear-gradient(90deg,var(--color-success),var(--color-success-soft))") +
            '<div class="ap-strength-val">' +
            softScore +
            "%</div></div>" +
            '<div class="ap-strength-item"><div class="ap-strength-item__lbl">القدرات المعرفية</div>' +
            bar(quizScore, "linear-gradient(90deg,#06b6d4,var(--color-kpi-cyan))") +
            '<div class="ap-strength-val">' +
            quizScore +
            "%</div></div>" +
            '<div class="ap-strength-item"><div class="ap-strength-item__lbl">الخبرة العملية</div>' +
            bar(expScore, "linear-gradient(90deg,var(--color-warning),var(--theme-btn-color))") +
            '<div class="ap-strength-val">' +
            expScore +
            "%</div></div>" +
            '<div class="ap-strength-item"><div class="ap-strength-item__lbl">تنوع الاهتمامات</div>' +
            bar(interScore, "linear-gradient(90deg,var(--color-purple),#f9a8d4)") +
            '<div class="ap-strength-val">' +
            interScore +
            "%</div></div>" +
            "</div>" +
            // Recommended courses
            '<div class="ap-analysis-header">الدورات الموصى بها</div>' +
            '<div class="ap-recs-grid">' +
            recCards +
            "</div>";

          var el = document.getElementById("metricsRecsContent");
          if (el) el.innerHTML = html;
        }
        fetchProfile();
      })();
    </script>
    <script src="chat/chat.js"></script>
