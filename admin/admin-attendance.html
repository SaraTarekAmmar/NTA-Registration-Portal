<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script src="/common/js/theme.js"></script>
    <link rel="stylesheet" href="/common/css/theme.css" />
    <!-- data-nta-theme-injected -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سجل الحضور - لوحة الإدارة</title>
    <link rel="stylesheet" href="trainee.css" />
    <link rel="stylesheet" href="admin.css" />
    <link rel="stylesheet" href="admin-portal.css" />
    <link rel="stylesheet" href="admin-theme.css" />
    <link rel="stylesheet" href="header/header.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      .adm-att-wrap {
        position: relative;
        z-index: 1;
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }

      /* Hero */
      .adm-att-hero {
        padding: 1.4rem 1.6rem;
        border-radius: 18px;
        margin-bottom: 1.75rem;
        background:
          radial-gradient(
            circle at top right,
            rgba(99, 102, 241, 0.18),
            transparent 55%
          ),
          radial-gradient(
            circle at bottom left,
            rgba(6, 182, 212, 0.1),
            transparent 55%
          ),
          rgba(15, 23, 42, 0.97);
        border: 1px solid rgba(99, 102, 241, 0.28);
        box-shadow:
          0 0 0 1px rgba(15, 23, 42, 0.95),
          0 0 40px rgba(99, 102, 241, 0.07);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem;
      }
      .adm-att-hero h1 {
        font-size: 1.3rem;
        font-weight: 800;
        margin: 0 0 0.2rem;
        color: var(--text-main);
      }
      .adm-att-hero p {
        font-size: 0.82rem;
        color: var(--text-subtle);
        margin: 0;
      }

      /* Course selector */
      .adm-course-strip {
        display: flex;
        gap: 0.55rem;
        flex-wrap: wrap;
        margin-bottom: 1.5rem;
        padding: 0.85rem 1.1rem;
        border-radius: 16px;
        background: rgba(8, 12, 32, 0.5);
        backdrop-filter: blur(14px);
        border: 1px solid var(--border-main);
      }
      .adm-course-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.38rem 0.85rem;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        border: 1px solid rgba(51, 65, 85, 0.7);
        background: rgba(15, 23, 42, 0.8);
        color: var(--text-subtle);
        transition:
          background 0.2s,
          border-color 0.2s,
          color 0.2s,
          box-shadow 0.2s;
      }
      .adm-course-pill:hover {
        border-color: rgba(99, 102, 241, 0.45);
        color: #a5b4fc;
      }
      .adm-course-pill.active {
        background: rgba(99, 102, 241, 0.18);
        border-color: rgba(99, 102, 241, 0.65);
        color: #c7d2fe;
        box-shadow: 0 0 14px rgba(99, 102, 241, 0.2);
      }

      /* KPI row */
      .adm-kpi-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.85rem;
        margin-bottom: 1.5rem;
      }
      @media (max-width: 700px) {
        .adm-kpi-row {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      .adm-kpi {
        padding: 1rem 1.1rem;
        border-radius: 16px;
        background: rgba(8, 12, 32, 0.5);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(51, 65, 85, 0.55);
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        animation: admCardIn 0.45s ease-out backwards;
        transition:
          transform 0.25s,
          box-shadow 0.25s;
      }
      .adm-kpi:hover {
        transform: translateY(-3px);
      }
      .adm-kpi__val {
        font-size: 1.75rem;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.5px;
      }
      .adm-kpi__lbl {
        font-size: 0.68rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-subtle);
      }
      .adm-kpi--present .adm-kpi__val {
        color: var(--color-success-soft);
        text-shadow: 0 0 18px rgba(74, 222, 128, 0.4);
      }
      .adm-kpi--present {
        border-color: rgba(34, 197, 94, 0.2);
      }
      .adm-kpi--absent .adm-kpi__val {
        color: var(--color-error-soft);
        text-shadow: 0 0 18px rgba(248, 113, 113, 0.35);
      }
      .adm-kpi--absent {
        border-color: rgba(239, 68, 68, 0.2);
      }
      .adm-kpi--rate .adm-kpi__val {
        color: var(--color-info-soft);
        text-shadow: 0 0 18px rgba(96, 165, 250, 0.35);
      }
      .adm-kpi--rate {
        border-color: rgba(59, 130, 246, 0.2);
      }
      .adm-kpi--sessions .adm-kpi__val {
        color: #c7d2fe;
        text-shadow: 0 0 18px rgba(99, 102, 241, 0.3);
      }
      .adm-kpi--sessions {
        border-color: rgba(99, 102, 241, 0.2);
      }

      /* Session tabs */
      .adm-session-tabs {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
        margin-bottom: 1.25rem;
      }
      .adm-session-tab {
        padding: 0.38rem 0.85rem;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        border: 1px solid var(--border-main);
        background: rgba(15, 23, 42, 0.8);
        color: var(--text-subtle);
        transition: all 0.2s;
      }
      .adm-session-tab:hover {
        border-color: rgba(99, 102, 241, 0.4);
        color: #a5b4fc;
      }
      .adm-session-tab.active {
        background: rgba(99, 102, 241, 0.15);
        border-color: rgba(99, 102, 241, 0.6);
        color: #c7d2fe;
        box-shadow: 0 0 12px rgba(99, 102, 241, 0.18);
      }

      /* Table container */
      .adm-table-wrap {
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(51, 65, 85, 0.55);
        background: rgba(8, 12, 32, 0.45);
        backdrop-filter: blur(14px);
      }
      .adm-table-head {
        padding: 0.85rem 1.25rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border-main);
        background: var(--assign-card-hover-bg);
        flex-wrap: wrap;
        gap: 0.65rem;
      }
      .adm-table-head h3 {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--text-main);
        margin: 0;
      }
      .adm-table-search {
        padding: 0.38rem 0.75rem;
        border-radius: 10px;
        border: 1px solid rgba(51, 65, 85, 0.8);
        background: rgba(15, 23, 42, 0.95);
        color: var(--text-main);
        font-family: inherit;
        font-size: 0.78rem;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        width: 200px;
      }
      .adm-table-search:focus {
        border-color: rgba(99, 102, 241, 0.7);
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.15);
      }
      .adm-table-search::placeholder {
        color: var(--text-subtle);
      }

      .adm-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.83rem;
      }
      .adm-table th {
        padding: 0.65rem 1rem;
        text-align: right;
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--text-subtle);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-bottom: 1px solid var(--border-main);
        background: rgba(15, 23, 42, 0.5);
      }
      .adm-table td {
        padding: 0;
        border-bottom: 1px solid var(--bg-input);
      }
      .adm-table tbody tr:last-child td {
        border-bottom: none;
      }
      .adm-table tbody tr {
        transition: background 0.15s;
        cursor: pointer;
      }
      .adm-table tbody tr:hover {
        background: rgba(99, 102, 241, 0.05);
      }
      .adm-table tbody tr.is-expanded {
        background: rgba(99, 102, 241, 0.07);
      }

      /* Cell padding wrapper */
      .adm-td {
        padding: 0.75rem 1rem;
      }

      .adm-student-name {
        font-weight: 700;
        color: var(--text-main);
        font-size: 0.88rem;
      }
      .adm-student-id {
        font-size: 0.7rem;
        color: var(--text-subtle);
        font-family: monospace;
      }

      /* Status dot */
      .adm-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
      }
      .adm-dot--present {
        background: var(--color-success);
        box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
      }
      .adm-dot--absent {
        background: var(--color-error);
        box-shadow: 0 0 6px rgba(239, 68, 68, 0.4);
      }
      .adm-dot--excused {
        background: var(--color-warning);
        box-shadow: 0 0 6px rgba(245, 158, 11, 0.4);
      }
      .adm-dot--pending {
        background: var(--text-subtle);
      }

      /* Status badge */
      .adm-status-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.2rem 0.6rem;
        border-radius: 999px;
        font-size: 0.7rem;
        font-weight: 700;
        white-space: nowrap;
      }
      .adm-status-badge--present {
        background: rgba(34, 197, 94, 0.12);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: var(--color-success-soft);
      }
      .adm-status-badge--absent {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: var(--color-error-soft);
      }
      .adm-status-badge--excused {
        background: rgba(245, 158, 11, 0.12);
        border: 1px solid rgba(245, 158, 11, 0.3);
        color: var(--theme-btn-color);
      }

      /* Attendance rate bar */
      .adm-rate-wrap {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .adm-rate-bar {
        flex: 1;
        height: 5px;
        border-radius: 999px;
        background: rgba(30, 41, 59, 0.8);
        overflow: hidden;
        min-width: 60px;
      }
      .adm-rate-fill {
        height: 100%;
        border-radius: 999px;
        transition: width 0.6s ease;
      }
      .adm-rate-fill--high {
        background: linear-gradient(90deg, var(--color-success), var(--color-success-soft));
      }
      .adm-rate-fill--medium {
        background: linear-gradient(90deg, var(--color-warning), var(--theme-btn-color));
      }
      .adm-rate-fill--low {
        background: linear-gradient(90deg, var(--color-error), var(--color-error-soft));
      }
      .adm-rate-val {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text-muted);
        min-width: 32px;
        text-align: left;
      }

      /* Expanded row */
      .adm-expand-row td {
        padding: 0;
      }
      .adm-expand-inner {
        padding: 1rem 1.25rem 1.1rem;
        border-top: 1px solid rgba(51, 65, 85, 0.4);
        background: rgba(5, 8, 20, 0.4);
        display: none;
      }
      .adm-expand-inner.is-open {
        display: block;
      }

      .adm-expand-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 0.75rem;
      }
      .adm-session-card {
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border-main);
        background: rgba(8, 12, 32, 0.6);
        animation: admCardIn 0.3s ease-out backwards;
      }
      .adm-session-card__head {
        padding: 0.55rem 0.75rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(51, 65, 85, 0.4);
        background: rgba(15, 23, 42, 0.5);
      }
      .adm-session-card__name {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--text-main);
      }
      .adm-session-card__date {
        font-size: 0.68rem;
        color: var(--text-subtle);
      }

      .adm-session-card__body {
        padding: 0.65rem 0.75rem;
      }

      /* Photos in admin expand */
      .adm-photo-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }
      .adm-photo-box {
        border-radius: 8px;
        overflow: hidden;
        position: relative;
        border: 1px solid rgba(51, 65, 85, 0.4);
        background: var(--assign-card-hover-bg);
        cursor: pointer;
        transition: border-color 0.2s;
      }
      .adm-photo-box:hover {
        border-color: rgba(99, 102, 241, 0.5);
      }
      .adm-photo-box img {
        width: 100%;
        height: 80px;
        object-fit: cover;
        display: block;
      }
      .adm-photo-box__label {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 0.2rem 0.4rem;
        background: linear-gradient(0deg, rgba(8, 12, 32, 0.95), transparent);
        font-size: 0.62rem;
        font-weight: 700;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .adm-photo-box__time {
        color: var(--color-info-soft);
        font-size: 0.63rem;
        font-weight: 700;
      }
      .adm-photo-box__zoom {
        position: absolute;
        top: 0.25rem;
        left: 0.25rem;
        width: 20px;
        height: 20px;
        border-radius: 6px;
        background: rgba(8, 12, 32, 0.7);
        border: 1px solid rgba(99, 102, 241, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #a5b4fc;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .adm-photo-box:hover .adm-photo-box__zoom {
        opacity: 1;
      }
      .adm-photo-box__zoom svg {
        width: 11px;
        height: 11px;
      }

      .adm-absence-note {
        font-size: 0.75rem;
        color: var(--text-muted);
        font-style: italic;
        padding: 0.4rem 0.6rem;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(51, 65, 85, 0.4);
        line-height: 1.5;
      }
      .adm-absence-note__type {
        font-size: 0.65rem;
        font-weight: 700;
        font-style: normal;
        display: block;
        margin-bottom: 0.2rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .adm-absence-note__type--absent {
        color: var(--color-error-soft);
      }
      .adm-absence-note__type--excused {
        color: var(--theme-btn-color);
      }

      /* Lightbox (shared with student page style) */
      .adm-lightbox {
        position: fixed;
        inset: 0;
        z-index: 400;
        background: rgba(3, 7, 18, 0.93);
        backdrop-filter: blur(16px);
        display: none;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.2s ease;
      }
      .adm-lightbox.is-open {
        display: flex;
      }
      .adm-lightbox.is-visible {
        opacity: 1;
      }
      .adm-lightbox__inner {
        max-width: min(680px, 92vw);
        width: 100%;
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid rgba(99, 102, 241, 0.35);
        background: rgba(8, 12, 32, 0.97);
        box-shadow:
          0 0 0 1px rgba(15, 23, 42, 0.95),
          0 30px 70px rgba(0, 0, 0, 0.8),
          0 0 50px rgba(99, 102, 241, 0.1);
        animation: lbIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      @keyframes lbIn {
        from {
          transform: scale(0.92);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .adm-lightbox__header {
        padding: 0.7rem 1rem;
        border-bottom: 1px solid var(--border-main);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .adm-lightbox__title {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--text-main);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .adm-lightbox__chip {
        font-size: 0.72rem;
        font-weight: 700;
        padding: 0.18rem 0.6rem;
        border-radius: 999px;
        background: rgba(59, 130, 246, 0.12);
        border: 1px solid var(--border-accent);
        color: var(--color-info-soft);
      }
      .adm-lightbox__close {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1px solid rgba(51, 65, 85, 0.7);
        background: var(--bg-card);
        color: var(--text-subtle);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
        transition:
          color 0.2s,
          border-color 0.2s;
      }
      .adm-lightbox__close:hover {
        color: var(--text-main);
        border-color: rgba(239, 68, 68, 0.5);
      }
      .adm-lightbox__img {
        width: 100%;
        max-height: 70vh;
        object-fit: contain;
        display: block;
        background: rgba(8, 12, 32, 0.6);
      }

      @keyframes admCardIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .adm-empty {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--skeleton-shine);
        font-size: 0.85rem;
      }

      /* Camera Modal */
      .adm-cam-modal {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(4, 6, 15, 0.9);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      .adm-cam-modal.is-open {
        opacity: 1;
        pointer-events: auto;
      }
      .adm-cam-modal__inner {
        background: var(--bg-card-solid);
        padding: 1.5rem;
        border-radius: 12px;
        border: 1px solid var(--border-main);
        max-width: 500px;
        width: 100%;
        text-align: center;
        position: relative;
      }
      .adm-cam-modal__close {
        position: absolute;
        top: 10px;
        left: 10px;
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 1.2rem;
        cursor: pointer;
      }
      .adm-cam-modal video {
        width: 100%;
        border-radius: 8px;
        background: #000;
        margin-bottom: 1rem;
      }
      .adm-cam-btn {
        background: rgba(34, 197, 94, 0.2);
        border: 1px solid rgba(34, 197, 94, 0.5);
        color: var(--color-success-soft);
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 700;
        transition: background 0.2s;
        font-family: inherit;
      }
      .adm-cam-btn:hover {
        background: rgba(34, 197, 94, 0.3);
      }
    </style>
    <script src="js/admin-guard.js"></script>
</head>
  <body class="trainee-app" data-page="admin">
    <a href="#main-content" class="skip-to-main">انتقل إلى المحتوى الرئيسي</a>
    <div class="trainee-bg"></div>
    <div id="ntaHeader"></div>

    <main id="main-content" class="adm-att-wrap">
      <!-- Hero -->
      <div class="adm-att-hero">
        <div>
          <h1>سجل حضور المتدربين</h1>
          <p>مراجعة حضور المتدربين وصور التحقق لكل جلسة</p>
        </div>
        <button class="adm-course-pill" id="openCamBtn" style="border-color:var(--color-success-soft); color:var(--color-success-soft); padding:0.6rem 1.2rem; font-size:0.85rem;">
          📷 تسجيل الدخول كاميرا (Face AI)
        </button>
      </div>

      <!-- Course selector -->
      <div class="adm-course-strip" id="admCourseStrip"></div>

      <!-- KPIs -->
      <div class="adm-kpi-row">
        <div class="adm-kpi adm-kpi--sessions" style="animation-delay: 0.05s">
          <div class="adm-kpi__val" id="kpiSessions">—</div>
          <div class="adm-kpi__lbl">إجمالي الجلسات</div>
        </div>
        <div class="adm-kpi adm-kpi--present" style="animation-delay: 0.1s">
          <div class="adm-kpi__val" id="kpiPresent">—</div>
          <div class="adm-kpi__lbl">متوسط الحضور</div>
        </div>
        <div class="adm-kpi adm-kpi--absent" style="animation-delay: 0.15s">
          <div class="adm-kpi__val" id="kpiAbsent">—</div>
          <div class="adm-kpi__lbl">إجمالي الغيابات</div>
        </div>
        <div class="adm-kpi adm-kpi--rate" style="animation-delay: 0.2s">
          <div class="adm-kpi__val" id="kpiRate">—</div>
          <div class="adm-kpi__lbl">معدل الحضور الكلي</div>
        </div>
      </div>

      <!-- Session filter -->
      <div class="adm-session-tabs" id="admSessionTabs"></div>

      <!-- Table -->
      <div class="adm-table-wrap">
        <div class="adm-table-head">
          <h3 id="admTableTitle">المتدربون</h3>
          <input
            type="text"
            class="adm-table-search"
            id="admSearch"
            placeholder="ابحث عن متدرب..."
          />
        </div>
        <div style="overflow-x: auto">
          <table class="adm-table" id="admTable">
  <caption class="sr-only">جدول الحضور والغياب للمتدربين</caption>
            <thead id="admTableHead"></thead>
            <tbody id="admTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- Lightbox -->
    <div class="adm-lightbox" id="admLightbox" role="dialog" aria-modal="true" aria-labelledby="admLbLabel" onclick="admCloseLightbox()">
      <div class="adm-lightbox__inner" onclick="event.stopPropagation()">
        <div class="adm-lightbox__header">
          <div class="adm-lightbox__title">
            <span id="admLbLabel">—</span>
            <span class="adm-lightbox__chip" id="admLbTime">—</span>
          </div>
          <button class="adm-lightbox__close" onclick="admCloseLightbox()" aria-label="إغلاق">
            ✕
          </button>
        </div>
        <img id="admLbImg" class="adm-lightbox__img" src="" alt="" />
      </div>
    </div>

    <!-- Camera Check-in Modal -->
    <div class="adm-cam-modal" id="admCamModal" role="dialog" aria-modal="true" aria-labelledby="admCamModalTitle">
      <div class="adm-cam-modal__inner">
        <button class="adm-cam-modal__close" id="closeCamBtn" aria-label="إغلاق">✕</button>
        <h3 id="admCamModalTitle" style="color:var(--text-main); margin-top:0; margin-bottom:1rem; font-size:1.1rem;">تسجيل الدخول / الخروج (التعرف على الوجه)</h3>
        <video id="admVideo" autoplay playsinline></video>
        <canvas id="admCanvas" style="display:none;"></canvas>
        <div style="display: flex; justify-content: center; gap: 10px;">
           <button class="adm-cam-btn" id="captureCamBtn">تحقق وتسجيل 📸</button>
        </div>
        <div id="camStatusMsg" style="margin-top:10px; font-size:0.85rem; color:var(--text-muted);"></div>
      </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="header/header.js?v=2"></script>
    <script>
      (function () {
        /* ── Auth ── */
        var session = {};
        try {
          session = JSON.parse(sessionStorage.getItem("ntaTrainee") || "{}");
        } catch (e) {}
        if (session.role !== "admin") {
          window.location.href = "index.html";
          return;
        }

        /* ══════════════════════════════════════════════════════
       DUMMY DATA
       Replace with:
         GET /api/admin/courses          → COURSES array
         GET /api/admin/attendance?course_id=X → { sessions, students }
    ══════════════════════════════════════════════════════ */
        /* ── API Data ── */
        var COURSES = [];
        var CURRENT_DATA = { sessions: [], students: [] };

        async function fetchCourses() {
          try {
            const res = await window.authenticatedFetch("/api/admin/courses");
            if (!res.ok) throw new Error("Failed to fetch courses");
            COURSES = await res.json();
            renderCourseStrip();
            if (COURSES.length > 0) {
              selectCourse(COURSES[0].id);
            }
          } catch (e) {
            console.error(e);
            showToast("فشل تحميل قائمة الدورات", "error");
          }
        }

        async function fetchAttendance(courseId) {
          try {
            const res = await window.authenticatedFetch("/api/admin/attendance?course_id=" + courseId);
            if (!res.ok) throw new Error("Failed to fetch attendance");
            CURRENT_DATA = await res.json();
            renderSessionTabs();
            renderKpis();
            renderTable();
          } catch (e) {
            console.error(e);
            showToast("فشل تحميل بيانات الحضور", "error");
          }
        }

        function showToast(msg, type) {
          const container = document.getElementById("toastContainer");
          const t = document.createElement("div");
          t.className = "toast toast--" + (type || "info");
          t.textContent = msg;
          container.appendChild(t);
          setTimeout(() => t.remove(), 3000);
        }

        var activeCourse = null;
        var activeSession = "all"; // 'all' or session id
        var expandedRow = null;

        /* ── Course strip ── */
        function renderCourseStrip() {
          var el = document.getElementById("admCourseStrip");
          if (!COURSES.length) {
              el.innerHTML = '<span style="color:var(--text-subtle); font-size:0.8rem;">جاري التحميل...</span>';
              return;
          }
          el.innerHTML =
            '<span style="font-size:0.72rem;font-weight:700;color:var(--text-subtle);text-transform:uppercase;letter-spacing:0.05em;flex-shrink:0;">الدورة:</span>' +
            COURSES.map(function (c) {
              return (
                '<button class="adm-course-pill' +
                (c.id === activeCourse ? " active" : "") +
                '" onclick="selectCourse(' +
                c.id +
                ')">' +
                (c.icon || "🏛️") +
                " " +
                c.name +
                "</button>"
              );
            }).join("");
        }

        window.selectCourse = function (id) {
          activeCourse = id;
          activeSession = "all";
          expandedRow = null;
          renderCourseStrip();
          fetchAttendance(id);
        };

        /* ── Session tabs ── */
        function renderSessionTabs() {
          var d = CURRENT_DATA;
          var el = document.getElementById("admSessionTabs");
          el.innerHTML =
            '<button class="adm-session-tab' +
            (activeSession === "all" ? " active" : "") +
            '" onclick="selectSession(\'all\')">جميع الجلسات</button>' +
            d.sessions
              .map(function (s) {
                return (
                  '<button class="adm-session-tab' +
                  (activeSession === s.id ? " active" : "") +
                  '" onclick="selectSession(\'' +
                  s.id +
                  "')\">" +
                  s.name +
                  "</button>"
                );
              })
              .join("");
        }

        window.selectSession = function (id) {
          activeSession = id;
          expandedRow = null;
          renderSessionTabs();
          renderKpis();
          renderTable();
        };

        /* ── KPIs ── */
        function renderKpis() {
          var d = CURRENT_DATA;
          var sessions =
            activeSession === "all"
              ? d.sessions
              : d.sessions.filter(function (s) {
                  return s.id === activeSession;
                });
          var totalPresent = 0,
            totalAbsent = 0,
            totalSlots = 0;
          
          if (!d.students || !d.students.length) {
              document.getElementById("kpiSessions").textContent = sessions.length;
              document.getElementById("kpiPresent").textContent = "0";
              document.getElementById("kpiAbsent").textContent = "0";
              document.getElementById("kpiRate").textContent = "0%";
              return;
          }

          d.students.forEach(function (st) {
            sessions.forEach(function (s) {
              var a = st.attendance[s.id];
              totalSlots++;
              if (!a || a.status === "absent") totalAbsent++;
              else if (a.status === "present") totalPresent++;
            });
          });
          var rate = totalSlots
            ? Math.round((totalPresent / totalSlots) * 100)
            : 0;
          document.getElementById("kpiSessions").textContent = sessions.length;
          document.getElementById("kpiPresent").textContent = d.students.length
            ? Math.round((totalPresent / d.students.length) * 10) / 10
            : "—";
          document.getElementById("kpiAbsent").textContent = totalAbsent;
          document.getElementById("kpiRate").textContent = rate + "%";
        }

        /* ── Table ── */
        function renderTable() {
          var d = CURRENT_DATA;
          var search = (
            document.getElementById("admSearch").value || ""
          ).toLowerCase();
          var sessions =
            activeSession === "all"
              ? d.sessions
              : d.sessions.filter(function (s) {
                  return s.id === activeSession;
                });
          
          var students = (d.students || []).filter(function (st) {
            return (st.name || "").toLowerCase().includes(search) || (st.nationalId || "").includes(search);
          });

          var courseObj = COURSES.find(function (c) { return c.id === activeCourse; });
          var courseName = courseObj ? courseObj.name : "—";
          document.getElementById("admTableTitle").textContent = courseName;

          // Header
          var thead = document.getElementById("admTableHead");
          thead.innerHTML =
            "<tr>" +
            "<th scope='col'>المتدرب</th>" +
            sessions
              .map(function (s) {
                return (
                  '<th style="min-width:90px">' +
                  s.name.split("—")[0].trim() +
                  "</th>"
                );
              })
              .join("") +
            "<th scope='col'>نسبة الحضور</th>" +
            "<th scope='col'></th>" +
            "</tr>";

          // Body
          var tbody = document.getElementById("admTableBody");
          if (!students.length) {
            tbody.innerHTML =
              '<tr><td colspan="' +
              (sessions.length + 3) +
              '"><div class="adm-empty">لا يوجد متدربون في هذه الدورة.</div></td></tr>';
            return;
          }

          tbody.innerHTML = "";
          students.forEach(function (st, idx) {
            var presentCount = 0;
            var totalCount = sessions.length;
            sessions.forEach(function (s) {
              var a = st.attendance[s.id];
              if (a && a.status === "present") presentCount++;
            });
            var rate = totalCount
              ? Math.round((presentCount / totalCount) * 100)
              : 0;
            var rateCls = rate >= 80 ? "high" : rate >= 50 ? "medium" : "low";

            var dotCells = sessions
              .map(function (s) {
                var a = st.attendance[s.id];
                var cls = !a ? "pending" : a.status;
                return (
                  '<td><div class="adm-td"><span class="adm-dot adm-dot--' +
                  cls +
                  '"></span></div></td>'
                );
              })
              .join("");

            // Main row
            var tr = document.createElement("tr");
            tr.id = "admRow-" + st.id;
            tr.innerHTML =
              '<td><div class="adm-td"><div class="adm-student-name">' +
              st.name +
              '</div><div class="adm-student-id">' +
              st.nationalId +
              "</div></div></td>" +
              dotCells +
              '<td><div class="adm-td"><div class="adm-rate-wrap"><div class="adm-rate-bar"><div class="adm-rate-fill adm-rate-fill--' +
              rateCls +
              '" style="width:' +
              rate +
              '%"></div></div><span class="adm-rate-val">' +
              rate +
              "%</span></div></div></td>" +
              '<td><div class="adm-td"><svg viewBox="0 0 24 24" fill="none" stroke="var(--text-subtle)" stroke-width="2" width="16" height="16" style="transition:transform 0.25s" id="admChevron-' +
              st.id +
              '"><polyline points="6 9 12 15 18 9"/></svg></div></td>';
            tr.addEventListener("click", function () {
              toggleExpand(st, sessions);
            });

            // Expand row
            var expTr = document.createElement("tr");
            expTr.className = "adm-expand-row";
            expTr.id = "admExpRow-" + st.id;
            expTr.innerHTML =
              '<td colspan="' +
              (sessions.length + 3) +
              '"><div class="adm-expand-inner" id="admExpInner-' +
              st.id +
              '"></div></td>';

            tbody.appendChild(tr);
            tbody.appendChild(expTr);
          });
        }

        function toggleExpand(st, sessions) {
          var inner = document.getElementById("admExpInner-" + st.id);
          var chevron = document.getElementById("admChevron-" + st.id);
          var row = document.getElementById("admRow-" + st.id);
          var isOpen = inner.classList.contains("is-open");

          // Close all
          document
            .querySelectorAll(".adm-expand-inner.is-open")
            .forEach(function (el) {
              el.classList.remove("is-open");
            });
          document
            .querySelectorAll(".adm-table tbody tr.is-expanded")
            .forEach(function (el) {
              el.classList.remove("is-expanded");
            });
          document
            .querySelectorAll('[id^="admChevron-"]')
            .forEach(function (el) {
              el.style.transform = "";
            });

          if (!isOpen) {
            inner.classList.add("is-open");
            row.classList.add("is-expanded");
            chevron.style.transform = "rotate(180deg)";
            chevron.setAttribute("stroke", "#a5b4fc");

            // Build expand content
            inner.innerHTML =
              '<div class="adm-expand-grid">' +
              sessions
                .map(function (s, i) {
                  var a = st.attendance[s.id];
                  var statusBadge = !a
                    ? '<span class="adm-status-badge adm-status-badge--absent">—</span>'
                    : a.status === "present"
                      ? '<span class="adm-status-badge adm-status-badge--present">✓ حاضر</span>'
                      : a.status === "excused"
                        ? '<span class="adm-status-badge adm-status-badge--excused">⏳ مُعذر</span>'
                        : '<span class="adm-status-badge adm-status-badge--absent">✕ غائب</span>';

                  var bodyHtml = "";
                  if (a && a.status === "present") {
                    bodyHtml =
                      '<div class="adm-photo-row">' +
                      '<div class="adm-photo-box" role="button" tabindex="0" onclick="admOpenLightbox(this)" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();admOpenLightbox(this);}" data-src="' +
                      a.entry_photo +
                      '" data-label="صورة الدخول" data-time="' +
                      a.entry_time +
                      '">' +
                      '<img src="' +
                      a.entry_photo +
                      '" loading="lazy" alt="دخول"/>' +
                      '<div class="adm-photo-box__zoom"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></div>' +
                      '<div class="adm-photo-box__label"><span>دخول</span><span class="adm-photo-box__time">' +
                      a.entry_time +
                      "</span></div>" +
                      "</div>" +
                      '<div class="adm-photo-box" role="button" tabindex="0" onclick="admOpenLightbox(this)" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();admOpenLightbox(this);}" data-src="' +
                      a.exit_photo +
                      '" data-label="صورة الخروج" data-time="' +
                      a.exit_time +
                      '">' +
                      '<img src="' +
                      a.exit_photo +
                      '" loading="lazy" alt="خروج"/>' +
                      '<div class="adm-photo-box__zoom"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></div>' +
                      '<div class="adm-photo-box__label"><span>خروج</span><span class="adm-photo-box__time">' +
                      a.exit_time +
                      "</span></div>" +
                      "</div>" +
                      "</div>";
                  } else if (a && a.status === "excused") {
                    bodyHtml =
                      '<div class="adm-absence-note"><span class="adm-absence-note__type adm-absence-note__type--excused">' +
                      (a.permission_type || "مُعذر") +
                      "</span>" +
                      (a.permission_reason || "—") +
                      "</div>";
                  } else {
                    bodyHtml =
                      '<div class="adm-absence-note"><span class="adm-absence-note__type adm-absence-note__type--absent">غائب</span>لم يُسجَّل حضور ولا يوجد إذن.</div>';
                  }

                  return (
                    '<div class="adm-session-card" style="animation-delay:' +
                    i * 0.05 +
                    's">' +
                    '<div class="adm-session-card__head"><span class="adm-session-card__name">' +
                    s.name.split("—")[0].trim() +
                    "</span>" +
                    statusBadge +
                    "</div>" +
                    '<div class="adm-session-card__body">' +
                    bodyHtml +
                    "</div>" +
                    "</div>"
                  );
                })
                .join("") +
              "</div>";
          }
        }

        /* ── Lightbox ── */
        window.admOpenLightbox = function (el) {
          var lb = document.getElementById("admLightbox");
          document.getElementById("admLbImg").src = el.getAttribute("data-src");
          document.getElementById("admLbLabel").textContent =
            el.getAttribute("data-label");
          document.getElementById("admLbTime").textContent =
            el.getAttribute("data-time");
          lb.classList.add("is-open");
          requestAnimationFrame(function () {
            lb.classList.add("is-visible");
          });
        };
        window.admCloseLightbox = function () {
          var lb = document.getElementById("admLightbox");
          lb.classList.remove("is-visible");
          setTimeout(function () {
            lb.classList.remove("is-open");
            document.getElementById("admLbImg").src = "";
          }, 200);
        };
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") {
            var lb = document.getElementById("admLightbox");
            if (lb && lb.classList.contains("is-open")) admCloseLightbox();
            var cam = document.getElementById("admCamModal");
            if (cam && cam.classList.contains("is-open")) document.getElementById("closeCamBtn").click();
          }
        });

        /* ── Search ── */
        document
          .getElementById("admSearch")
          .addEventListener("input", function () {
            renderTable();
          });

        /* ── Init ── */
        fetchCourses();

        /* ── Face AI Webcam Modal ── */
        var camBtn = document.getElementById("openCamBtn");
        var closeCamBtn = document.getElementById("closeCamBtn");
        var camModal = document.getElementById("admCamModal");
        var videoEl = document.getElementById("admVideo");
        var canvasEl = document.getElementById("admCanvas");
        var captureBtn = document.getElementById("captureCamBtn");
        var camStatusMsg = document.getElementById("camStatusMsg");
        
        var currentStream = null;

        function stopCamera() {
          if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;
          }
          videoEl.srcObject = null;
        }

        camBtn.addEventListener("click", function() {
          camModal.classList.add("is-open");
          camStatusMsg.textContent = "جاري تشغيل الكاميرا...";
          navigator.mediaDevices.getUserMedia({ video: true })
            .then(function(stream) {
              currentStream = stream;
              videoEl.srcObject = stream;
              camStatusMsg.textContent = "يرجى النظر للكاميرا والضغط على تحقق.";
            })
            .catch(function(err) {
              camStatusMsg.textContent = "تعذر الوصول للكاميرا: " + err.message;
            });
        });

        closeCamBtn.addEventListener("click", function() {
          camModal.classList.remove("is-open");
          stopCamera();
        });

        captureBtn.addEventListener("click", function() {
           if (!currentStream) return;
           camStatusMsg.textContent = "جاري التحليل...";
           captureBtn.disabled = true;
           
           // Draw video frame to canvas
           var ctx = canvasEl.getContext("2d");
           canvasEl.width = videoEl.videoWidth;
           canvasEl.height = videoEl.videoHeight;
           ctx.drawImage(videoEl, 0, 0, canvasEl.width, canvasEl.height);
           
           // Get Base64 image
           var b64Img = canvasEl.toDataURL("image/jpeg").split(",")[1];
           
           fetch("/api/ai/face/checkin", {
             method: "POST",
             headers: { "Content-Type": "application/json" },
             body: JSON.stringify({ image_b64: b64Img })
           })
           .then(res => res.json().then(data => ({ status: res.status, body: data })))
           .then(result => {
             if (result.status === 200) {
                 camStatusMsg.innerHTML = '<span style="color:var(--color-success-soft);">تم تسجيل الحضور بنجاح لـ: ' + (result.body.matched_label || 'متدرب غير معروف') + '</span>';
             } else {
                 camStatusMsg.innerHTML = '<span style="color:var(--color-error-soft);">حدث خطأ: ' + (result.body.detail || 'غير معروف') + '</span>';
             }
           })
           .catch(err => {
             camStatusMsg.innerHTML = '<span style="color:var(--color-error-soft);">خطأ في الاتصال: ' + err.message + '</span>';
           })
           .finally(() => {
              captureBtn.disabled = false;
           });
        });

      })();
    </script>
  </body>
</html>
