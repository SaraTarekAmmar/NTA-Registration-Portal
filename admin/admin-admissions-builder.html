<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <script src="/common/js/theme.js"></script>
  <link rel="stylesheet" href="/common/css/theme.css?v=3" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منشئ القبول الديناميكي</title>
  <link rel="stylesheet" href="trainee.css" />
  <link rel="stylesheet" href="header/header.css?v=4" />
  <link rel="stylesheet" href="admin.css" />
  <link rel="stylesheet" href="admin-portal.css" />
  <link rel="stylesheet" href="admin-theme.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="js/admin-guard.js"></script>
  <script src="common/js/icons.js"></script>
  <style>
    .ab-page { max-width: 1100px; margin: 2rem auto; padding: 0 1.25rem; display: grid; grid-template-columns: 1fr 380px; gap: 1.5rem; align-items: start; }
    @media(max-width:900px){ .ab-page { grid-template-columns: 1fr; } }

    .ab-hero { grid-column: 1 / -1; margin-bottom: .5rem; }
    .ab-hero__title { font-size: 1.6rem; font-weight: 800; color: var(--text-main); margin: 0 0 .4rem; }
    .ab-hero__sub { color: var(--text-subtle); font-size: .9rem; margin: 0; }

    /* Left: sections list */
    .ab-sections-panel {}
    .ab-sections-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .ab-sections-header h2 { font-size: 1.05rem; font-weight: 700; color: var(--text-main); margin: 0; }
    .ab-sections-list { display: flex; flex-direction: column; gap: .75rem; }

    .ab-section-card {
      border-radius: 16px; padding: 1rem 1.25rem;
      background: var(--bg-card, rgba(15,23,42,.6));
      border: 1px solid var(--border-subtle);
      transition: border-color .2s, box-shadow .2s;
      cursor: grab;
    }
    .ab-section-card:hover { border-color: var(--border-accent); box-shadow: 0 4px 16px rgba(0,0,0,.2); }
    .ab-section-card.inactive { opacity: .55; }

    .ab-card-header { display: flex; align-items: center; gap: .75rem; }
    .ab-card-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.15rem; flex-shrink: 0;
    }
    .ab-card-icon--quiz { background: rgba(185,28,28,.15); }
    .ab-card-icon--documents { background: rgba(245,158,11,.15); }
    .ab-card-icon--essay { background: rgba(16,185,129,.15); }
    .ab-card-icon--interview { background: rgba(236,72,153,.15); }
    .ab-card-icon--info { background: rgba(59,130,246,.15); }

    .ab-card-info { flex: 1; }
    .ab-card-title { font-size: .95rem; font-weight: 700; color: var(--text-main); margin: 0 0 .15rem; }
    .ab-card-type { font-size: .75rem; color: var(--text-subtle); margin: 0; }

    .ab-card-actions { display: flex; gap: .4rem; }
    .ab-btn-icon {
      width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface-glass, rgba(30,41,59,.5));
      color: var(--text-subtle); transition: background .2s, color .2s;
    }
    .ab-btn-icon:hover { background: rgba(59,130,246,.15); color: var(--color-info, #60a5fa); }
    .ab-btn-icon--danger:hover { background: rgba(248,113,113,.15); color: #f87171; }

    .ab-card-order { font-size: .72rem; color: var(--text-subtle); margin-top: .5rem; }
    .ab-empty { text-align: center; padding: 3rem 1rem; color: var(--text-subtle); }
    .ab-empty__icon { font-size: 2.5rem; margin-bottom: .75rem; }
    .ab-empty__text { font-size: .9rem; }

    /* Right: builder form */
    .ab-form-panel {
      background: var(--bg-card, rgba(15,23,42,.6));
      border: 1px solid var(--border-subtle); border-radius: 20px;
      padding: 1.5rem; position: sticky; top: 1.5rem;
    }
    .ab-form-panel h2 { font-size: 1.05rem; font-weight: 700; color: var(--text-main); margin: 0 0 1.25rem; }

    .ab-form-field { margin-bottom: 1rem; }
    .ab-form-field label { display: block; font-size: .82rem; font-weight: 600; color: var(--text-subtle); margin-bottom: .4rem; }
    .ab-form-field input,
    .ab-form-field select,
    .ab-form-field textarea {
      width: 100%; padding: .65rem .85rem;
      background: var(--surface-input, rgba(30,41,59,.8));
      border: 1px solid var(--border-subtle); border-radius: 10px;
      color: var(--text-main); font-family: inherit; font-size: .88rem;
      outline: none; box-sizing: border-box; resize: vertical;
      transition: border-color .2s;
    }
    .ab-form-field input:focus,
    .ab-form-field select:focus,
    .ab-form-field textarea:focus { border-color: var(--border-accent); }

    .ab-type-icons { display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem; margin-bottom: 1rem; }
    .ab-type-btn {
      display: flex; flex-direction: column; align-items: center; gap: .3rem;
      padding: .65rem .5rem; border-radius: 10px; cursor: pointer;
      border: 2px solid var(--border-subtle);
      background: transparent; color: var(--text-subtle);
      font-family: inherit; font-size: .72rem; font-weight: 600;
      transition: border-color .2s, color .2s, background .2s;
    }
    .ab-type-btn.active {
      border-color: var(--color-info, #60a5fa);
      color: var(--text-main);
      background: rgba(59,130,246,.1);
    }
    .ab-type-btn:hover { border-color: var(--border-accent); }

    /* Quiz config block */
    .ab-quiz-config { margin-top: .75rem; }
    .ab-quiz-config label { display: block; font-size: .82rem; font-weight: 600; color: var(--text-subtle); margin-bottom: .4rem; }
    .ab-quiz-row { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }
    .ab-quiz-row input {
      width: 100%; padding: .55rem .75rem;
      background: var(--surface-input, rgba(30,41,59,.8));
      border: 1px solid var(--border-subtle); border-radius: 8px;
      color: var(--text-main); font-family: inherit; font-size: .82rem;
      outline: none; box-sizing: border-box; transition: border-color .2s;
    }
    .ab-quiz-row input:focus { border-color: var(--border-accent); }

    .ab-form-actions { display: flex; gap: .6rem; margin-top: 1.25rem; }
    .btn-primary {
      flex: 1; padding: .7rem; border: none; border-radius: 12px; cursor: pointer;
      background: linear-gradient(180deg, #3b82f6 0%, #1d4ed8 100%);
      color: white; font-family: inherit; font-weight: 700; font-size: .9rem;
      transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-ghost {
      padding: .7rem 1rem; border-radius: 12px; cursor: pointer;
      background: transparent; border: 1px solid var(--border-subtle);
      color: var(--text-subtle); font-family: inherit; font-weight: 600; font-size: .88rem;
      transition: border-color .2s, color .2s;
    }
    .btn-ghost:hover { border-color: var(--border-accent); color: var(--text-main); }

    .ab-submissions-panel { grid-column: 1 / -1; margin-top: 1.5rem; }
    .ab-submissions-panel h2 { font-size: 1.05rem; font-weight: 700; color: var(--text-main); margin: 0 0 1rem; }
    .ab-table-wrap { overflow-x: auto; border-radius: 16px; border: 1px solid var(--border-subtle); }
    .ab-table { width: 100%; border-collapse: collapse; font-size: .84rem; }
    .ab-table th {
      padding: .85rem 1rem; text-align: right; font-weight: 600;
      color: var(--text-subtle); background: var(--bg-card, rgba(15,23,42,.6));
      border-bottom: 1px solid var(--border-subtle); white-space: nowrap;
    }
    .ab-table td {
      padding: .8rem 1rem; border-bottom: 1px solid var(--border-subtle);
      color: var(--text-main); vertical-align: middle;
    }
    .ab-table tr:last-child td { border-bottom: none; }
    .ab-status { display: inline-block; padding: .2rem .65rem; border-radius: 999px; font-size: .72rem; font-weight: 600; }
    .ab-status--submitted { background: rgba(59,130,246,.15); color: #60a5fa; }
    .ab-status--passed { background: rgba(16,185,129,.15); color: #34d399; }
    .ab-status--failed { background: rgba(248,113,113,.15); color: #f87171; }
    .ab-status--pending { background: rgba(107,114,128,.15); color: #9ca3af; }
  </style>
</head>
<body class="trainee-app" data-page="admissions-builder">
  <a href="#main-content" class="skip-to-main">انتقل إلى المحتوى الرئيسي</a>
  <div id="ntaHeader"></div>
  <div class="ab-page" id="main-content">
    <div class="ab-hero">
      <h1 class="ab-hero__title">منشئ القبول الديناميكي</h1>
      <p class="ab-hero__sub">أنشئ وأدر مراحل القبول — اختبارات، مستندات، مقابلات، ومقالات</p>
    </div>

    <!-- Sections List -->
    <div class="ab-sections-panel">
      <div class="ab-sections-header">
        <h2>مراحل القبول</h2>
      </div>
      <div class="ab-sections-list" id="sectionsList">
        <div style="text-align:center;padding:2rem;color:var(--text-subtle);">جاري التحميل...</div>
      </div>
    </div>

    <!-- Builder Form -->
    <div class="ab-form-panel">
      <h2 id="formTitle">إضافة مرحلة جديدة</h2>

      <div class="ab-form-field">
        <label>اسم المرحلة</label>
        <input type="text" id="fTitle" placeholder="مثال: اختبار القدرات اللغوية" maxlength="200" />
      </div>

      <div class="ab-form-field">
        <label>نوع المرحلة</label>
        <div class="ab-type-icons" id="typeButtons">
          <button type="button" class="ab-type-btn active" data-type="quiz" onclick="selectType('quiz')">
            <span class="ab-type-icon" id="_typeIconQuiz"></span>اختبار
          </button>
          <button type="button" class="ab-type-btn" data-type="documents" onclick="selectType('documents')">
            <span class="ab-type-icon" id="_typeIconDocs"></span>مستندات
          </button>
          <button type="button" class="ab-type-btn" data-type="essay" onclick="selectType('essay')">
            <span class="ab-type-icon" id="_typeIconEssay"></span>مقال
          </button>
          <button type="button" class="ab-type-btn" data-type="interview" onclick="selectType('interview')">
            <span class="ab-type-icon" id="_typeIconInterview"></span>مقابلة
          </button>
          <button type="button" class="ab-type-btn" data-type="info" onclick="selectType('info')">
            <span style="font-size:1.25rem">ℹ️</span>معلومات
          </button>
        </div>
      </div>

      <div class="ab-form-field">
        <label>الترتيب</label>
        <input type="number" id="fOrder" value="1" min="1" max="99" />
      </div>

      <!-- Quiz-specific config -->
      <div id="quizConfig" class="ab-quiz-config">
        <label style="font-size:.85rem;font-weight:700;color:var(--text-main);margin-bottom:.5rem;display:block;">إعدادات الاختبار</label>
        <div class="ab-quiz-row">
          <div>
            <label>المدة (دقيقة)</label>
            <input type="number" id="qDuration" value="60" min="5" placeholder="60" />
          </div>
          <div>
            <label>عدد الأسئلة</label>
            <input type="number" id="qQuestions" value="20" min="1" placeholder="20" />
          </div>
        </div>
        <div class="ab-quiz-row" style="margin-top:.5rem;">
          <div>
            <label>درجة النجاح (%)</label>
            <input type="number" id="qPassing" value="60" min="0" max="100" placeholder="60" />
          </div>
          <div>
            <label>نوع الأسئلة</label>
            <select id="qType" style="width:100%;padding:.55rem .75rem;background:var(--surface-input, rgba(30,41,59,.8));border:1px solid var(--border-subtle);border-radius:8px;color:var(--text-main);font-family:inherit;font-size:.82rem;outline:none;">
              <option value="mcq">اختيار متعدد</option>
              <option value="truefalse">صح / خطأ</option>
              <option value="mixed">مختلط</option>
            </select>
          </div>
        </div>
        <div class="ab-quiz-row" style="margin-top:.5rem;">
          <div style="grid-column:1/-1;">
            <label>
              <input type="checkbox" id="qShuffle" style="width:auto;margin-left:.4rem;" />
              تبديل الأسئلة عشوائياً
            </label>
          </div>
        </div>
      </div>

      <!-- Documents config -->
      <div id="docsConfig" style="display:none;">
        <div class="ab-form-field">
          <label>المستندات المطلوبة (سطر لكل مستند)</label>
          <textarea id="docsList" rows="4" placeholder="السيرة الذاتية&#10;صورة الهوية&#10;شهادة التخرج"></textarea>
        </div>
      </div>

      <!-- Essay config -->
      <div id="essayConfig" style="display:none;">
        <div class="ab-form-field">
          <label>موضوع المقال / التعليمات</label>
          <textarea id="essayPrompt" rows="3" placeholder="اكتب تعليمات المقال هنا..."></textarea>
        </div>
        <div class="ab-form-field">
          <label>الحد الأقصى للكلمات</label>
          <input type="number" id="essayMaxWords" value="500" min="50" />
        </div>
      </div>

      <!-- Interview config -->
      <div id="interviewConfig" style="display:none;">
        <div class="ab-form-field">
          <label>تعليمات المقابلة</label>
          <textarea id="interviewNote" rows="3" placeholder="سيتم التواصل مع المتقدم لتحديد موعد المقابلة..."></textarea>
        </div>
      </div>

      <div class="ab-form-actions">
        <button type="button" class="btn-primary" onclick="saveSection()">حفظ المرحلة</button>
        <button type="button" class="btn-ghost" id="cancelBtn" onclick="resetForm()" style="display:none;">إلغاء</button>
      </div>
      <div id="formMsg" style="font-size:.82rem;margin-top:.6rem;min-height:1.2em;color:#34d399;"></div>
    </div>

    <!-- Submissions Table -->
    <div class="ab-submissions-panel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
        <h2 style="margin:0;">تقديمات المتقدمين</h2>
        <button type="button" class="btn-ghost" onclick="loadSubmissions()" style="font-size:.8rem;padding:.4rem .9rem;">تحديث</button>
      </div>
      <div class="ab-table-wrap">
        <table class="ab-table" id="submissionsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>المتقدم</th>
              <th>الرقم القومي</th>
              <th>المرحلة</th>
              <th>الحالة</th>
              <th>الدرجة</th>
              <th>التاريخ</th>
            </tr>
          </thead>
          <tbody id="submissionsBody">
            <tr><td colspan="7" style="text-align:center;color:var(--text-subtle);padding:2rem;">جاري التحميل...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="header/header.js?v=3"></script>
  <script src="js/admin-layout.js"></script>
  <script>
    var API = '/api/admissions-builder';
    var sections = [];
    var editingId = null;
    var selectedType = 'quiz';

    var TYPE_ICONS = {
      quiz:      NTAIcons('clipboard', 18),
      documents: NTAIcons('document', 18),
      essay:     NTAIcons('pen', 18),
      interview: NTAIcons('mic', 18),
      info:      NTAIcons('info', 18)
    };
    document.getElementById('_typeIconQuiz').innerHTML      = NTAIcons('clipboard', 20);
    document.getElementById('_typeIconDocs').innerHTML      = NTAIcons('document', 20);
    document.getElementById('_typeIconEssay').innerHTML     = NTAIcons('pen', 20);
    document.getElementById('_typeIconInterview').innerHTML = NTAIcons('mic', 20);
    var TYPE_LABELS = { quiz: 'اختبار', documents: 'مستندات', essay: 'مقال', interview: 'مقابلة', info: 'معلومات' };

    function selectType(type) {
      selectedType = type;
      document.querySelectorAll('.ab-type-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.type === type);
      });
      document.getElementById('quizConfig').style.display = type === 'quiz' ? '' : 'none';
      document.getElementById('docsConfig').style.display = type === 'documents' ? '' : 'none';
      document.getElementById('essayConfig').style.display = type === 'essay' ? '' : 'none';
      document.getElementById('interviewConfig').style.display = type === 'interview' ? '' : 'none';
    }

    function buildConfig() {
      if (selectedType === 'quiz') return {
        duration: parseInt(document.getElementById('qDuration').value) || 60,
        question_count: parseInt(document.getElementById('qQuestions').value) || 20,
        passing_score: parseInt(document.getElementById('qPassing').value) || 60,
        question_type: document.getElementById('qType').value,
        shuffle: document.getElementById('qShuffle').checked,
      };
      if (selectedType === 'documents') return {
        required_docs: (document.getElementById('docsList').value || '').split('\n').map(function(s){ return s.trim(); }).filter(Boolean),
      };
      if (selectedType === 'essay') return {
        prompt: document.getElementById('essayPrompt').value,
        max_words: parseInt(document.getElementById('essayMaxWords').value) || 500,
      };
      if (selectedType === 'interview') return { note: document.getElementById('interviewNote').value };
      return {};
    }

    function fillConfig(cfg) {
      if (!cfg) return;
      if (selectedType === 'quiz') {
        document.getElementById('qDuration').value = cfg.duration || 60;
        document.getElementById('qQuestions').value = cfg.question_count || 20;
        document.getElementById('qPassing').value = cfg.passing_score || 60;
        document.getElementById('qType').value = cfg.question_type || 'mcq';
        document.getElementById('qShuffle').checked = !!cfg.shuffle;
      } else if (selectedType === 'documents') {
        document.getElementById('docsList').value = (cfg.required_docs || []).join('\n');
      } else if (selectedType === 'essay') {
        document.getElementById('essayPrompt').value = cfg.prompt || '';
        document.getElementById('essayMaxWords').value = cfg.max_words || 500;
      } else if (selectedType === 'interview') {
        document.getElementById('interviewNote').value = cfg.note || '';
      }
    }

    function saveSection() {
      var title = document.getElementById('fTitle').value.trim();
      if (!title) { setMsg('يرجى إدخال اسم المرحلة', 'error'); return; }
      var payload = {
        title_ar: title,
        section_type: selectedType,
        config_json: buildConfig(),
        sort_order: parseInt(document.getElementById('fOrder').value) || 0,
        is_active: true,
      };
      var token = localStorage.getItem('admin_token');
      var url = editingId ? API + '/sections/' + editingId : API + '/sections';
      var method = editingId ? 'PUT' : 'POST';
      fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify(payload),
      })
      .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(function() {
        setMsg(editingId ? 'تم التحديث بنجاح' : 'تمت الإضافة بنجاح', 'success');
        resetForm();
        loadSections();
      })
      .catch(function() { setMsg('حدث خطأ أثناء الحفظ', 'error'); });
    }

    function editSection(id) {
      var sec = sections.find(function(s){ return s.id === id; });
      if (!sec) return;
      editingId = id;
      document.getElementById('formTitle').textContent = 'تعديل المرحلة';
      document.getElementById('cancelBtn').style.display = '';
      document.getElementById('fTitle').value = sec.title_ar;
      document.getElementById('fOrder').value = sec.sort_order;
      selectType(sec.section_type);
      fillConfig(sec.config_json);
    }

    function deleteSection(id) {
      if (!confirm('هل أنت متأكد من حذف هذه المرحلة؟')) return;
      var token = localStorage.getItem('admin_token');
      fetch(API + '/sections/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token },
      })
      .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
      .then(function() { loadSections(); })
      .catch(function() { alert('فشل في الحذف'); });
    }

    function toggleSection(id) {
      var token = localStorage.getItem('admin_token');
      fetch(API + '/sections/' + id + '/toggle', {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + token },
      })
      .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
      .then(function() { loadSections(); })
      .catch(function() { alert('فشل في تغيير الحالة'); });
    }

    function resetForm() {
      editingId = null;
      document.getElementById('formTitle').textContent = 'إضافة مرحلة جديدة';
      document.getElementById('cancelBtn').style.display = 'none';
      document.getElementById('fTitle').value = '';
      document.getElementById('fOrder').value = sections.length + 1;
      selectType('quiz');
      document.getElementById('formMsg').textContent = '';
    }

    function setMsg(msg, type) {
      var el = document.getElementById('formMsg');
      el.textContent = msg;
      el.style.color = type === 'error' ? '#f87171' : '#34d399';
      setTimeout(function(){ el.textContent = ''; }, 3000);
    }

    function renderSections() {
      var list = document.getElementById('sectionsList');
      if (!sections.length) {
        list.innerHTML = '<div class="ab-empty"><div class="ab-empty__icon">' + NTAIcons('clipboard', 32) + '</div><p class="ab-empty__text">لا توجد مراحل بعد. أضف أولى مراحل القبول من النموذج.</p></div>';
        return;
      }
      list.innerHTML = sections.map(function(s) {
        var icon = TYPE_ICONS[s.section_type] || NTAIcons('clipboard', 18);
        var label = TYPE_LABELS[s.section_type] || s.section_type;
        return '<div class="ab-section-card' + (!s.is_active ? ' inactive' : '') + '">' +
          '<div class="ab-card-header">' +
            '<div class="ab-card-icon ab-card-icon--' + s.section_type + '">' + icon + '</div>' +
            '<div class="ab-card-info">' +
              '<p class="ab-card-title">' + s.title_ar + '</p>' +
              '<p class="ab-card-type">' + label + '</p>' +
            '</div>' +
            '<div class="ab-card-actions">' +
              '<button class="ab-btn-icon" onclick="editSection(' + s.id + ')" title="تعديل">' +
                '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>' +
              '</button>' +
              '<button class="ab-btn-icon" onclick="toggleSection(' + s.id + ')" title="' + (s.is_active ? 'تعطيل' : 'تفعيل') + '">' +
                '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21"/></svg>' +
              '</button>' +
              '<button class="ab-btn-icon ab-btn-icon--danger" onclick="deleteSection(' + s.id + ')" title="حذف">' +
                '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>' +
              '</button>' +
            '</div>' +
          '</div>' +
          '<p class="ab-card-order">ترتيب: ' + s.sort_order + ' — ' + (s.is_active ? NTAIcons('check_circle',14) + ' مفعّل' : NTAIcons('pause',14) + ' معطّل') + '</p>' +
        '</div>';
      }).join('');
    }

    function renderSubmissions(rows) {
      var body = document.getElementById('submissionsBody');
      if (!rows.length) {
        body.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-subtle);padding:2rem;">لا توجد تقديمات بعد</td></tr>';
        return;
      }
      var STATUS_MAP = { pending: 'معلق', submitted: 'مقدّم', reviewed: 'مراجَع', passed: 'ناجح', failed: 'راسب' };
      body.innerHTML = rows.map(function(r, i) {
        var d = new Date(r.submitted_at).toLocaleDateString('ar-EG');
        var score = r.score != null ? r.score + '%' : '—';
        var st = r.status || 'pending';
        return '<tr>' +
          '<td>' + (i + 1) + '</td>' +
          '<td>' + (r.full_name_ar || '—') + '</td>' +
          '<td>' + (r.national_id || '—') + '</td>' +
          '<td>' + (r.section_title || '—') + '</td>' +
          '<td><span class="ab-status ab-status--' + st + '">' + (STATUS_MAP[st] || st) + '</span></td>' +
          '<td>' + score + '</td>' +
          '<td>' + d + '</td>' +
        '</tr>';
      }).join('');
    }

    function loadSections() {
      var token = localStorage.getItem('admin_token');
      fetch(API + '/sections', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          sections = data;
          renderSections();
          document.getElementById('fOrder').value = sections.length + 1;
        })
        .catch(function() {
          document.getElementById('sectionsList').innerHTML =
            '<div class="ab-empty"><div class="ab-empty__icon">' + NTAIcons('warning',32) + '</div><p class="ab-empty__text">فشل في التحميل</p></div>';
        });
    }

    function loadSubmissions() {
      var token = localStorage.getItem('admin_token');
      fetch(API + '/submissions', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(function(r) { return r.json(); })
        .then(function(data) { renderSubmissions(data); })
        .catch(function() {
          document.getElementById('submissionsBody').innerHTML =
            '<tr><td colspan="7" style="text-align:center;color:#f87171;padding:2rem;">فشل في التحميل</td></tr>';
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
      loadSections();
      loadSubmissions();
    });
  </script>
</body>
</html>
