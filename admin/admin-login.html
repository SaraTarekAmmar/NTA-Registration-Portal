<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script src="/common/js/theme.js"></script>
    <link rel="stylesheet" href="/common/css/theme.css?v=3" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل دخول المشرف - الأكاديمية الوطنية للتدريب</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      .login-role-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.35rem 0.9rem;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 700;
        background: rgba(99, 102, 241, 0.15);
        border: 1px solid rgba(99, 102, 241, 0.35);
        color: #a5b4fc;
        margin-bottom: 0.5rem;
        letter-spacing: 0.04em;
      }
      .login-role-badge svg { width: 14px; height: 14px; }
      .login-editor-link {
        display: block;
        text-align: center;
        margin-top: 1.25rem;
        font-size: 0.82rem;
        color: var(--text-subtle);
        text-decoration: none;
        transition: color 0.2s;
      }
      .login-editor-link:hover { color: var(--accent-hover); }
      .login-error-msg {
        background: rgba(239,68,68,0.1);
        border: 1px solid rgba(239,68,68,0.35);
        border-radius: 12px;
        padding: 0.7rem 1rem;
        font-size: 0.85rem;
        color: var(--color-error-soft, #fca5a5);
        margin-top: 0.75rem;
      }
    </style>
  </head>

  <body class="has-header">
    <div class="login-bg"></div>

    <div class="login-card" id="loginCard">
      <div class="logo-container">
        <img src="images/logo2.png" alt="الأكاديمية الوطنية للتدريب" class="login-logo" onerror="this.style.display='none'" />
        <div class="logo-subtitle">بوابة الإدارة</div>
      </div>

      <div style="text-align:center; margin-bottom:1rem;">
        <span class="login-role-badge">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
          Admin Login
        </span>
      </div>

      <h1>تسجيل دخول المشرف</h1>
      <p class="subtitle">بوابة إدارة المرشحين والمراحل</p>

      <form id="adminLoginForm" novalidate>
        <div class="form-group">
          <label for="adminEmail">البريد الإلكتروني</label>
          <div class="login-input-wrap">
            <span class="login-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 6h16v12H4V6Z"/><path d="m4 7 8 6 8-6"/>
              </svg>
            </span>
            <input type="email" id="adminEmail" name="email" required autocomplete="email" placeholder="admin@example.com"
              aria-describedby="adminEmailError" />
          </div>
          <p id="adminEmailError" class="field-error" style="display:none;" aria-live="polite">البريد الإلكتروني مطلوب.</p>
        </div>

        <div class="form-group">
          <label for="adminPassword">كلمة المرور</label>
          <div class="login-input-wrap">
            <span class="login-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 11V8a5 5 0 0 1 10 0v3"/><path d="M6 11h12v10H6V11Z"/><path d="M12 15v2"/>
              </svg>
            </span>
            <input type="password" id="adminPassword" name="password" required autocomplete="current-password"
              placeholder="أدخل كلمة المرور" aria-describedby="adminPasswordError" />
          </div>
          <p id="adminPasswordError" class="field-error" style="display:none;" aria-live="polite">كلمة المرور مطلوبة.</p>
        </div>

        <button type="submit" class="login-btn" id="adminLoginBtn">
          <span class="login-btn-text">دخول لوحة المشرف</span>
          <span class="arrow-icon">←</span>
          <span class="login-btn-loader" aria-hidden="true"></span>
        </button>
      </form>

      <div id="loginError" class="login-error-msg" role="alert" aria-live="assertive" style="display:none;"></div>
      <a href="/editor/editor-login.html" class="login-editor-link">هل أنت محرر محتوى؟ سجل دخول هنا ←</a>
    </div>

    <script>
      (function () {
        var ADMIN_TOKEN_KEY = "admin_token";

        // If already logged in as admin, redirect to dashboard
        var existingToken = sessionStorage.getItem(ADMIN_TOKEN_KEY);
        if (existingToken) {
          try {
            var p = JSON.parse(atob(existingToken.split(".")[1]));
            if (p && p.role === "admin" && (!p.exp || p.exp > Date.now() / 1000)) {
              window.location.replace("admin.html");
            }
          } catch (e) {}
        }

        var form = document.getElementById("adminLoginForm");
        var btn = document.getElementById("adminLoginBtn");
        var errorBox = document.getElementById("loginError");

        function showFieldError(id, msg) {
          var el = document.getElementById(id);
          if (el) { el.textContent = msg; el.style.display = "block"; }
        }
        function hideFieldError(id) {
          var el = document.getElementById(id);
          if (el) { el.style.display = "none"; }
        }
        function showError(msg) {
          errorBox.textContent = msg;
          errorBox.style.display = "block";
        }
        function clearErrors() {
          errorBox.style.display = "none";
          hideFieldError("adminEmailError");
          hideFieldError("adminPasswordError");
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          clearErrors();

          var email = document.getElementById("adminEmail").value.trim();
          var password = document.getElementById("adminPassword").value;
          var valid = true;

          if (!email) { showFieldError("adminEmailError", "البريد الإلكتروني مطلوب."); valid = false; }
          if (!password) { showFieldError("adminPasswordError", "كلمة المرور مطلوبة."); valid = false; }
          if (!valid) return;

          btn.classList.add("loading");
          btn.disabled = true;

          fetch("/api/admin/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, password: password })
          })
            .then(function (res) {
              if (!res.ok) return res.json().then(function (err) { throw new Error(err.detail || "فشل تسجيل الدخول"); });
              return res.json();
            })
            .then(function (data) {
              if (!data.access_token || data.role !== "admin") {
                throw new Error("هذا الحساب غير مصرح له بالوصول إلى بوابة المشرف.");
              }
              sessionStorage.setItem(ADMIN_TOKEN_KEY, data.access_token);
              window.location.replace("admin.html");
            })
            .catch(function (err) {
              btn.classList.remove("loading");
              btn.disabled = false;
              var msg = err.message || "خطأ في تسجيل الدخول";
              if (msg.toLowerCase().includes("not allowed") || msg.toLowerCase().includes("غير مصرح")) {
                showError("هذا الحساب غير مصرح له بالوصول إلى بوابة المشرف.");
              } else if (msg.includes("Invalid") || msg.includes("غير صحيحة") || msg.includes("401")) {
                showError("البريد الإلكتروني أو كلمة المرور غير صحيحة.");
              } else {
                showError(msg);
              }
            });
        });
      })();
    </script>
  </body>
</html>
