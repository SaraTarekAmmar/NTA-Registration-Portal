<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script src="/common/js/theme.js"></script>
    <link rel="stylesheet" href="/common/css/theme.css?v=4" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل دخول المشرف - الأكاديمية الوطنية للتدريب</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* ══ Premium dark navy background ══ */
      body.has-header {
        background: #030712 !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        align-items: center !important;
        min-height: 100vh !important;
        padding: 2rem 1rem !important;
      }

      .login-bg {
        background:
          radial-gradient(ellipse 80% 55% at 15% 10%, rgba(185,28,28,0.07), transparent 55%),
          radial-gradient(ellipse 55% 40% at 90% 85%, rgba(185,28,28,0.05), transparent 60%),
          radial-gradient(ellipse 60% 35% at 80% 5%,  rgba(30,40,80,0.4), transparent 65%) !important;
        animation: none !important;
      }

      /* ══ Premium glass card ══ */
      .login-card {
        max-width: 480px !important;
        background: rgba(5,8,20,0.88) !important;
        backdrop-filter: blur(42px) saturate(140%) !important;
        -webkit-backdrop-filter: blur(42px) saturate(140%) !important;
        border: 1px solid rgba(255,255,255,0.065) !important;
        border-top-color: rgba(185,28,28,0.38) !important;
        border-radius: 18px !important;
        box-shadow:
          0 0 0 1px rgba(185,28,28,0.06),
          0 32px 80px rgba(0,0,0,0.55),
          0 8px 24px rgba(0,0,0,0.4) !important;
      }


      /* ══ Background orbs ══ */
      .login-bg::before {
        content: "";
        position: fixed;
        top: -18%; right: -10%;
        width: 560px; height: 560px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(185,28,28,0.07) 0%, transparent 65%);
        pointer-events: none;
        animation: loginOrbA 11s ease-in-out infinite alternate;
      }
      .login-bg::after {
        content: "";
        position: fixed;
        bottom: -14%; left: -10%;
        width: 460px; height: 460px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(30,40,100,0.12) 0%, transparent 65%);
        pointer-events: none;
        animation: loginOrbA 14s ease-in-out infinite alternate-reverse;
      }
      @keyframes loginOrbA {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(32px, 20px) scale(1.1); }
      }

      /* ══ Heading override ══ */
      .login-card h1 {
        background: linear-gradient(135deg, #f87171 0%, #fca5a5 60%, #fecaca 100%) !important;
        -webkit-background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        background-clip: text !important;
        font-size: 1.28rem !important;
      }

      /* ══ Submit button — crimson ══ */
      .login-btn {
        background: linear-gradient(135deg, #991b1b 0%, #b91c1c 50%, #dc2626 100%) !important;
        box-shadow: 0 4px 20px rgba(185,28,28,0.38) !important;
      }
      .login-btn::before {
        background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%) !important;
      }
      .login-btn:hover:not(.loading) {
        box-shadow: 0 8px 28px rgba(185,28,28,0.52) !important;
      }


      /* ══ Error / bottom link ══ */
      .login-error-msg {
        background: rgba(239,68,68,0.1);
        border: 1px solid rgba(239,68,68,0.35);
        border-radius: 10px;
        padding: 0.65rem 1rem;
        font-size: 0.84rem;
        color: #fca5a5;
        margin-top: 0.75rem;
      }
      .login-editor-link {
        display: block;
        text-align: center;
        margin-top: 1.25rem;
        font-size: 0.82rem;
        color: rgba(148,163,184,0.55);
        text-decoration: none;
        transition: color 0.2s;
      }
      .login-editor-link:hover { color: #fca5a5; }

      /* ══ Input focus: crimson glow ══ */
      .login-input-wrap:focus-within {
        border-color: rgba(185,28,28,0.55) !important;
        box-shadow: 0 0 0 2px rgba(185,28,28,0.18) !important;
      }
      .login-input-wrap:focus-within .login-input-icon { color: #f87171 !important; }
    
      /* ══ Light mode overrides ══ */
      html.light-mode body.has-header {
        background: #f1f5f9 !important;
      }
      html.light-mode .login-bg {
        background:
          radial-gradient(ellipse 80% 55% at 15% 10%, rgba(185,28,28,0.04), transparent 55%),
          radial-gradient(ellipse 55% 40% at 90% 85%, rgba(185,28,28,0.03), transparent 60%) !important;
      }
      html.light-mode .login-card {
        background: rgba(255,255,255,0.97) !important;
        border: 1px solid rgba(0,0,0,0.08) !important;
        border-top-color: rgba(185,28,28,0.2) !important;
        box-shadow: 0 4px 32px rgba(0,0,0,0.1), 0 1px 4px rgba(0,0,0,0.06) !important;
      }
      html.light-mode .login-card h1 {
        background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%) !important;
        -webkit-background-clip: text !important;
        background-clip: text !important;
      }
      </style>
  </head>

  <body class="has-header">
<div class="login-bg"></div>

    <div class="login-card" id="loginCard">
      <div class="logo-container">
        <img src="images/logo2.png" alt="الأكاديمية الوطنية للتدريب" class="login-logo" onerror="this.style.display='none'" />
        <div class="logo-subtitle">بوابة الإدارة</div>
      </div>

      <h1>تسجيل دخول المشرف</h1>
      <p class="subtitle">بوابة إدارة المرشحين والمراحل</p>


      <form id="adminLoginForm" novalidate>
        <div class="form-group">
          <label for="adminEmail">البريد الإلكتروني</label>
          <div class="login-input-wrap">
            <span class="login-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 6h16v12H4V6Z"/><path d="m4 7 8 6 8-6"/>
              </svg>
            </span>
            <input type="email" id="adminEmail" name="email" required autocomplete="email" placeholder="admin@example.com"
              aria-describedby="adminEmailError" />
          </div>
          <p id="adminEmailError" class="field-error" style="display:none;" aria-live="polite">البريد الإلكتروني مطلوب.</p>
        </div>

        <div class="form-group">
          <label for="adminNationalId">الرقم القومي</label>
          <div class="login-input-wrap">
            <span class="login-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Zm6-10.125a1.875 1.875 0 1 1-3.75 0 1.875 1.875 0 0 1 3.75 0Zm1.294 6.336a6.721 6.721 0 0 1-3.17.789 6.721 6.721 0 0 1-3.168-.789 3.376 3.376 0 0 1 6.338 0Z"/>
              </svg>
            </span>
            <input type="text" id="adminNationalId" name="nationalId" required autocomplete="off"
              placeholder="14 رقماً" maxlength="14" inputmode="numeric" pattern="[0-9]{14}"
              aria-describedby="adminNationalIdError" />
          </div>
          <p id="adminNationalIdError" class="field-error" style="display:none;" aria-live="polite">الرقم القومي مطلوب (14 رقماً).</p>
        </div>

        <div class="form-group">
          <label for="adminPassword">كلمة المرور</label>
          <div class="login-input-wrap">
            <span class="login-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 11V8a5 5 0 0 1 10 0v3"/><path d="M6 11h12v10H6V11Z"/><path d="M12 15v2"/>
              </svg>
            </span>
            <input type="password" id="adminPassword" name="password" required autocomplete="current-password"
              placeholder="أدخل كلمة المرور" aria-describedby="adminPasswordError" />
          </div>
          <p id="adminPasswordError" class="field-error" style="display:none;" aria-live="polite">كلمة المرور مطلوبة.</p>
        </div>

        <button type="submit" class="login-btn" id="adminLoginBtn">
          <span class="login-btn-text">دخول لوحة المشرف</span>
          <span class="arrow-icon">←</span>
          <span class="login-btn-loader" aria-hidden="true"></span>
        </button>
      </form>

      <div id="loginError" class="login-error-msg" role="alert" aria-live="assertive" style="display:none;"></div>
    </div>

    <script>
      (function () {
        var ADMIN_TOKEN_KEY = "admin_token";

        // Always show the login form (no auto-skip): a fresh visit must log in.

        var form = document.getElementById("adminLoginForm");
        var btn = document.getElementById("adminLoginBtn");
        var errorBox = document.getElementById("loginError");

        function showFieldError(id, msg) {
          var el = document.getElementById(id);
          if (el) { el.textContent = msg; el.style.display = "block"; }
          var inputId = id.replace("Error", "");
          var inp = document.getElementById(inputId);
          if (inp) inp.setAttribute("aria-invalid", "true");
        }
        function hideFieldError(id) {
          var el = document.getElementById(id);
          if (el) { el.style.display = "none"; }
          var inputId = id.replace("Error", "");
          var inp = document.getElementById(inputId);
          if (inp) inp.removeAttribute("aria-invalid");
        }
        function showError(msg) {
          errorBox.textContent = msg;
          errorBox.style.display = "block";
        }
        function clearErrors() {
          errorBox.style.display = "none";
          hideFieldError("adminEmailError");
          hideFieldError("adminNationalIdError");
          hideFieldError("adminPasswordError");
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          clearErrors();

          var email = document.getElementById("adminEmail").value.trim();
          var nationalId = document.getElementById("adminNationalId").value.trim();
          var password = document.getElementById("adminPassword").value;
          var valid = true;

          if (!email) { showFieldError("adminEmailError", "البريد الإلكتروني مطلوب."); valid = false; }
          if (!nationalId || !/^\d{14}$/.test(nationalId)) { showFieldError("adminNationalIdError", "الرقم القومي مطلوب (14 رقماً)."); valid = false; }
          if (!password) { showFieldError("adminPasswordError", "كلمة المرور مطلوبة."); valid = false; }
          if (!valid) return;

          btn.classList.add("loading");
          btn.disabled = true;

          fetch("/api/admin/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, nationalId: nationalId, password: password, role: "admin" })
            // Note: superadmin users should log in via the superadmin portal
          })
            .then(function (res) {
              if (!res.ok) return res.json().then(function (err) { throw new Error(err.detail || "فشل تسجيل الدخول"); });
              return res.json();
            })
            .then(function (data) {
              if (!data.access_token || !["admin", "superadmin"].includes(data.role)) {
                throw new Error("هذا الحساب غير مصرح له بالوصول إلى بوابة المشرف.");
              }
              localStorage.setItem(ADMIN_TOKEN_KEY, data.access_token);
              window.location.replace("admin-dashboard.html");
            })
            .catch(function (err) {
              btn.classList.remove("loading");
              btn.disabled = false;
              var msg = err.message || "خطأ في تسجيل الدخول";
              if (msg.toLowerCase().includes("not allowed") || msg.toLowerCase().includes("غير مصرح")) {
                showError("هذا الحساب غير مصرح له بالوصول إلى بوابة المشرف.");
              } else if (msg.includes("Invalid") || msg.includes("غير صحيحة") || msg.includes("401")) {
                showError("البريد الإلكتروني أو كلمة المرور غير صحيحة.");
              } else {
                showError(msg);
              }
            });
        });
      })();
    </script>
  </body>
</html>
