<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script src="/common/js/theme.js"></script>
    <link rel="stylesheet" href="/common/css/theme.css?v=3" />
    <link rel="stylesheet" href="/admin/header/header.css?v=4" />
    <link rel="stylesheet" href="coordinator.css?v=2" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة الإذونات | المنسّق</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="js/coordinator-guard.js"></script>
    <style>
      .perm-reason { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
    </style>
  </head>
  <body data-page="permissions">
    <div id="coordinatorSidebar"></div>
    <main class="coordinator-main">
      <header class="coord-page-header">
        <h1 class="coord-page-header__title">إدارة الإذونات</h1>
        <p class="coord-page-header__sub">مراجعة واعتماد طلبات الاستئذان للمتدربين</p>
      </header>

      <div class="coord-filters">
        <select id="statusFilter" class="coord-select" onchange="loadPermissions()">
          <option value="">كل الحالات</option>
          <option value="pending" selected>معلق</option>
          <option value="accepted">مقبول</option>
          <option value="rejected">مرفوض</option>
        </select>
        <select id="courseSelect" class="coord-select" onchange="loadPermissions()">
          <option value="">كل الدورات</option>
        </select>
        <div class="coord-search">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" id="searchInput" placeholder="ابحث باسم المتدرب..." onkeyup="filterTable()" />
        </div>
      </div>

      <div class="coord-table-wrap">
        <table class="coord-table">
          <thead>
            <tr>
              <th>المتدرب</th>
              <th>الدورة</th>
              <th>التاريخ</th>
              <th>النوع</th>
              <th>السبب</th>
              <th>الحالة</th>
              <th style="text-align: center;">إجراء</th>
            </tr>
          </thead>
          <tbody id="permBody">
            <tr><td colspan="7" style="text-align:center; padding: 3rem;">جارٍ التحميل...</td></tr>
          </tbody>
        </table>
      </div>
    </main>

    <!-- Modal for viewing full reason -->
    <div id="reasonModal" class="coord-modal-overlay" style="display:none;" onclick="if(event.target===this) this.style.display='none'">
      <div class="coord-modal">
        <h2 class="coord-modal__title">سبب الاستئذان</h2>
        <div class="coord-modal__body" id="reasonText" style="white-space: pre-wrap;"></div>
        <div class="coord-modal__actions">
          <button class="btn btn--secondary" onclick="document.getElementById('reasonModal').style.display='none'">إغلاق</button>
        </div>
      </div>
    </div>

    <script src="js/coordinator-layout.js"></script>
    <script>
      var permissionsData = [];

      function loadCourses() {
        window.coordinatorAuth.fetch("/api/coordinator/permissions/courses")
          .then(function(r) { return r.json(); })
          .then(function(courses) {
            var sel = document.getElementById("courseSelect");
            sel.innerHTML = '<option value="">كل الدورات</option>';
            courses.forEach(function(c) {
              sel.innerHTML += '<option value="' + c.id + '">' + (c.title_ar || c.title) + '</option>';
            });
          })
          .catch(function(e) { console.error("Error loading courses:", e); });
      }

      function loadPermissions() {
        var status = document.getElementById("statusFilter").value;
        var courseId = document.getElementById("courseSelect").value;
        var tbody = document.getElementById("permBody");

        var qs = [];
        if (status) qs.push("status=" + encodeURIComponent(status));
        if (courseId) qs.push("course_id=" + encodeURIComponent(courseId));
        var url = "/api/coordinator/permissions" + (qs.length ? "?" + qs.join("&") : "");

        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 3rem;">جارٍ التحميل...</td></tr>';

        window.coordinatorAuth.fetch(url)
          .then(function(r) { return r.json(); })
          .then(function(data) {
            permissionsData = data;
            renderTable();
          })
          .catch(function(e) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 3rem; color: #fca5a5;">فشل تحميل البيانات</td></tr>';
          });
      }

      function renderTable() {
        var tbody = document.getElementById("permBody");
        var search = document.getElementById("searchInput").value.toLowerCase();
        
        var filtered = permissionsData.filter(function(p) {
          if (!search) return true;
          return (p.studentName && p.studentName.toLowerCase().indexOf(search) > -1) ||
                 (p.studentNationalId && p.studentNationalId.indexOf(search) > -1);
        });

        if (filtered.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 3rem;">لا توجد بيانات مطابقة</td></tr>';
          return;
        }

        var html = '';
        filtered.forEach(function(p) {
          var typeStr = p.type === 'full_day' ? 'يوم كامل' : (p.type === 'late' ? 'تأخير' : 'انصراف مبكر');
          var statBadge = '';
          if (p.status === 'pending') statBadge = '<span class="coord-badge coord-badge--pending">معلق</span>';
          else if (p.status === 'accepted') statBadge = '<span class="coord-badge coord-badge--accepted">مقبول</span>';
          else if (p.status === 'rejected') statBadge = '<span class="coord-badge coord-badge--rejected">مرفوض</span>';
          
          var d = new Date(p.date).toLocaleDateString("ar-EG", { year: 'numeric', month: 'short', day: 'numeric' });

          html += '<tr>';
          html += '<td><strong>' + (p.studentName || 'غير متوفر') + '</strong><br><small style="font-family:monospace; color:var(--text-subtle);">' + (p.studentNationalId || '') + '</small></td>';
          html += '<td>' + (p.courseNameAr || p.courseName) + '</td>';
          html += '<td><span dir="ltr">' + d + '</span></td>';
          html += '<td>' + typeStr + '</td>';
          html += '<td><div class="perm-reason" onclick="showReason(\'' + escapeHtml(p.reason) + '\')">' + escapeHtml(p.reason) + '</div></td>';
          html += '<td>' + statBadge + '</td>';
          
          html += '<td style="text-align: center;">';
          if (p.status === 'pending') {
            html += '<button class="btn btn--sm btn--success" style="margin-left:0.4rem;" onclick="updatePerm(' + p.id + ',\'accepted\', this)">قبول</button>';
            html += '<button class="btn btn--sm btn--danger" onclick="updatePerm(' + p.id + ',\'rejected\', this)">رفض</button>';
          } else {
            html += '<span style="color:var(--text-subtle); font-size:0.75rem;">تم ' + (p.status==='accepted'?'القبول':'الرفض') + '</span>';
          }
          html += '</td>';
          html += '</tr>';
        });

        tbody.innerHTML = html;
      }

      function filterTable() { renderTable(); }

      function showReason(reason) {
        document.getElementById("reasonText").textContent = reason;
        document.getElementById("reasonModal").style.display = "flex";
      }

      function updatePerm(id, status, btnEl) {
        btnEl.disabled = true;
        btnEl.textContent = '...';
        window.coordinatorAuth.fetch("/api/coordinator/permissions/" + id, {
          method: "PUT",
          body: JSON.stringify({ status: status })
        })
        .then(function(r) {
          if (!r.ok) throw new Error();
          loadPermissions();
        })
        .catch(function(e) {
          alert("فشل تحديث الحالة");
          btnEl.disabled = false;
          btnEl.textContent = status === 'accepted' ? 'قبول' : 'رفض';
        });
      }

      function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>"']/g, function(m) {
          return {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[m];
        });
      }

      // Init
      loadCourses();
      loadPermissions();
    </script>
  </body>
</html>
