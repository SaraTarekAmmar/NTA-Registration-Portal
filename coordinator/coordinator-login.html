<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <script src="/common/js/theme.js"></script>
    <link rel="stylesheet" href="/common/css/theme.css?v=4" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل دخول المنسّق - الأكاديمية الوطنية للتدريب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Tajawal', sans-serif;
        min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        background: radial-gradient(ellipse at top right, rgba(59,130,246,0.08), transparent 55%),
                    radial-gradient(ellipse at bottom left, rgba(30,50,100,0.1), transparent 55%),
                    var(--bg-main, #030712);
      }
      .login-card {
        width: 100%; max-width: 420px; padding: 2.5rem;
        border-radius: 22px;
        background: rgba(8,12,32,0.65);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(59,130,246,0.15);
        box-shadow: 0 0 0 1px rgba(5,8,20,0.85), 0 20px 60px rgba(0,0,0,0.35);
      }
      .login-card__logo { text-align: center; margin-bottom: 1.5rem; }
      .login-card__logo-icon {
        width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 0.75rem;
        display: flex; align-items: center; justify-content: center;
        background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.3);
        color: #93c5fd;
      }
      .login-card__logo-icon svg { width: 28px; height: 28px; }
      .login-card__title { font-size: 1.5rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.25rem; }
      .login-card__sub { font-size: 0.82rem; color: var(--text-subtle); }

      .form-group { margin-bottom: 1.25rem; }
      .form-group label { display: block; font-size: 0.82rem; font-weight: 700; color: var(--text-subtle); margin-bottom: 0.4rem; }
      .form-input {
        width: 100%; padding: 0.7rem 1rem; border-radius: 10px;
        background: rgba(8,12,32,0.6); border: 1px solid rgba(255,255,255,0.1);
        color: var(--text-main); font-size: 0.9rem; font-family: inherit; outline: none;
        transition: border-color 0.2s;
      }
      .form-input:focus { border-color: rgba(59,130,246,0.5); box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
      .form-input::placeholder { color: var(--text-subtle); }

      .login-btn {
        width: 100%; padding: 0.85rem; border-radius: 12px;
        background: linear-gradient(135deg, rgba(59,130,246,0.22), rgba(59,130,246,0.08));
        border: 1px solid rgba(59,130,246,0.4); color: #93c5fd;
        font-size: 0.95rem; font-weight: 800; font-family: inherit; cursor: pointer;
        transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
        position: relative;
      }
      .login-btn:hover { background: rgba(59,130,246,0.28); border-color: rgba(59,130,246,0.62); box-shadow: 0 4px 14px rgba(59,130,246,0.2); }
      .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .login-btn.loading .btn-text { opacity: 0; }
      .login-btn.loading::after { content: ""; position: absolute; width: 18px; height: 18px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }

      .login-error {
        display: none; padding: 0.75rem 1rem; border-radius: 10px;
        background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
        color: #fca5a5; font-size: 0.82rem; font-weight: 600; margin-bottom: 1rem;
        text-align: center;
      }

      /* Light mode */
      html.light-mode .login-card { background: rgba(255,255,255,0.9); border-color: var(--border-main); box-shadow: 0 20px 60px rgba(15,23,42,0.1); }
      html.light-mode .form-input { background: var(--bg-input, #f1f5f9); border-color: var(--border-main); color: var(--text-main); }
      html.light-mode .login-btn { background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(59,130,246,0.04)); border-color: rgba(59,130,246,0.35); color: #2563eb; }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="login-card__logo" style="text-align: center; margin-bottom: 1.5rem;">
        <img src="/images/logo2.png" alt="الأكاديمية الوطنية للتدريب" style="height: 60px; width: auto; margin-bottom: 0.5rem;" onerror="this.style.display='none'" />
        <h1 class="login-card__title">بوابة المنسّق</h1>
        <p class="login-card__sub">الأكاديمية الوطنية للتدريب</p>
      </div>

      <div id="loginError" class="login-error"></div>

      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input class="form-input" type="email" id="email" placeholder="coordinator@nta.edu.eg" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label>الرقم القومي</label>
          <input class="form-input" type="text" id="nationalId" placeholder="أدخل الرقم القومي (14 رقم)" maxlength="14" required dir="ltr" />
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input class="form-input" type="password" id="password" placeholder="أدخل كلمة المرور" required />
        </div>
        <button type="submit" class="login-btn" id="loginBtn">
          <span class="btn-text">تسجيل الدخول</span>
        </button>
      </form>
    </div>

    <script>
      var TOKEN_KEY = "coordinator_token";

      // If already logged in, redirect
      (function() {
        var t = localStorage.getItem(TOKEN_KEY);
        if (t) {
          try {
            var p = JSON.parse(atob(t.split(".")[1]));
            if (p.role === "coordinator" && p.exp > Date.now() / 1000) {
              location.href = "coordinator-dashboard.html";
            }
          } catch(e) {}
        }
      })();

      function handleLogin(e) {
        e.preventDefault();
        var btn = document.getElementById("loginBtn");
        var errEl = document.getElementById("loginError");
        errEl.style.display = "none";
        btn.disabled = true;
        btn.classList.add("loading");

        fetch("/api/coordinator/auth/login", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            email: document.getElementById("email").value.trim(),
            nationalId: document.getElementById("nationalId").value.trim(),
            password: document.getElementById("password").value,
          })
        })
        .then(function(r) {
          if (!r.ok) return r.json().then(function(d) { throw new Error(d.detail || "فشل تسجيل الدخول"); });
          return r.json();
        })
        .then(function(data) {
          localStorage.setItem(TOKEN_KEY, data.access_token);
          location.href = "coordinator-dashboard.html";
        })
        .catch(function(err) {
          errEl.textContent = err.message;
          errEl.style.display = "block";
          btn.disabled = false;
          btn.classList.remove("loading");
        });
        return false;
      }
    </script>
  </body>
</html>
