<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>ملخص اللجنة - المنسق</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      body { font-family: 'Tajawal', sans-serif; background: #080c20; color: #fff; margin:0; padding:20px; }
      .container { max-width: 900px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; }
      .header { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 20px; }
      table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
      th, td { border: 1px solid rgba(255,255,255,0.1); padding: 10px; text-align: center; }
      th { background: rgba(255,255,255,0.1); }
      .form-group { margin-top: 15px; }
      .form-group label { display: block; margin-bottom: 5px; color: #aaa; }
      textarea, select, input { width: 100%; padding: 10px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 6px; }
      .btn-submit { background: #b01a2e; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h2>الخلاصة النهائية للجنة</h2>
        <p>إجمالي المتوسطات المحسوبة تلقائيًا لجميع أعضاء اللجنة</p>
      </div>
      
      <table>
        <thead>
          <tr>
            <th>المعيار</th>
            <th>المتوسط</th>
          </tr>
        </thead>
        <tbody id="summaryTableBody">
          <tr><td colspan="2">جاري التحميل...</td></tr>
        </tbody>
        <tfoot>
          <tr>
            <th>الإجمالي الكلي</th>
            <th id="finalTotal">0</th>
          </tr>
        </tfoot>
      </table>
      
      <div class="form-group">
        <label>قرار اللجنة النهائي</label>
        <select id="final_recommendation">
          <option value="Accepted">مقبول</option>
          <option value="Waitlist">قائمة انتظار</option>
          <option value="Unsuitable">غير مناسب</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>أسباب القرار</label>
        <textarea id="reasons" rows="3"></textarea>
      </div>
      
      <div class="form-group">
        <label>ملاحظات إضافية</label>
        <textarea id="notes" rows="2"></textarea>
      </div>
      
      <button class="btn-submit" onclick="submitFinalSummary()">اعتماد القرار النهائي</button>
    </div>
    
    <script>
      let appId = new URLSearchParams(window.location.search).get('appId') || 1;
      let stepId = new URLSearchParams(window.location.search).get('stepId') || 1;
      
      function loadSummary() {
        fetch(`/api/interviews/committee/committee-summary/${appId}/${stepId}`, {
          headers: { 'Authorization': 'Bearer ' + localStorage.getItem('coord_token') }
        })
        .then(r => r.json().then(data => ({ok: r.ok, data})))
        .then(res => {
          if (!res.ok) {
            alert(res.data.detail || 'حدث خطأ');
            return;
          }
          let tbody = document.getElementById('summaryTableBody');
          tbody.innerHTML = '';
          let avgs = res.data.averages || {};
          for(let k in avgs) {
            tbody.innerHTML += `<tr><td>${k}</td><td>${avgs[k].toFixed(2)}</td></tr>`;
          }
          document.getElementById('finalTotal').textContent = (res.data.average_total || 0).toFixed(2);
        })
        .catch(err => console.error(err));
      }
      
      function submitFinalSummary() {
        const payload = {
          application_id: parseInt(appId),
          step_id: parseInt(stepId),
          final_recommendation: document.getElementById('final_recommendation').value,
          reasons: document.getElementById('reasons').value,
          notes: document.getElementById('notes').value
        };
        
        fetch('/api/interviews/committee/submit-final-summary', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + localStorage.getItem('coord_token')
          },
          body: JSON.stringify(payload)
        })
        .then(r => r.json().then(data => ({ok: r.ok, data})))
        .then(res => {
          if(!res.ok) alert(res.data.detail || 'حدث خطأ');
          else {
            alert('تم اعتماد القرار النهائي بنجاح.');
            window.location.href = 'coordinator-interviews.html';
          }
        })
        .catch(err => alert(err));
      }
      
      loadSummary();
    </script>
  </body>
</html>
